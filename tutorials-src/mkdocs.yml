site_name: MaterialX Playground — Tutorials
site_description: Tutorials and guides for the MaterialX Playground.
docs_dir: docs
site_dir: ../tutorials
use_directory_urls: false
theme:
  name: material
  custom_dir: overrides
  favicon: ../favicon.ico         # use the root SPA's favicon.ico (one dir up), not Material's default
  font: false                     # match the site's system sans stack
  palette:
    scheme: slate                 # dark; recolored in extra.css
  features: [navigation.tabs, navigation.sections, toc.follow, content.code.copy, content.tabs.link, search.suggest, search.highlight]
  # NOT navigation.top: its back-to-top button is top-centered; we ship a custom
  # bottom-right one instead (assets/mtlx-backtotop.js + .mtlx-totop in extra.css).
  # navigation.tabs: top-level sections become a secondary nav strip below the
  # shared header (rendered by base.html's `{% block tabs %}`, which main.html
  # leaves intact — only `{% block header %}` is overridden) AND collapse the
  # primary sidebar to just the ACTIVE section's pages. Styled dark + sticky in
  # extra.css. NOT navigation.tabs.sticky (that path renders the strip inside
  # `{% block header %}`, which we override). NOT navigation.instant (its XHR
  # swap won't reliably re-run the injected header script).
extra_css: [assets/extra.css, assets/mtlx-run.css]
extra_javascript: [assets/mtlx-run.js, assets/mtlx-nav-mobile.js, assets/mtlx-backtotop.js]   # runnable-JS footer + mobile section-nav fold-in + back-to-top; header scripts still injected by main.html
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc: { permalink: true }
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight: { anchor_linenums: true }
  - pymdownx.inlinehilite
  - pymdownx.tabbed: { alternate_style: true }
  - pymdownx.snippets: { base_path: [tutorials-src/snippets, snippets], check_paths: true }
  - pymdownx.tasklist: { custom_checkbox: true }
plugins: [search]
nav:
  - Getting Started:
    - Home: index.md
    - What Is MaterialX?: what-is-materialx.md
    - Where Do I Start?: where-to-start.md
    - Tour the Playground: getting-started.md
    - FAQ: faq.md
  - Foundations:
    - Your First Node Graph: your-first-node-graph.md
    - Anatomy of a .mtlx File: foundations/anatomy-of-mtlx.md
    - The Standard Node Library: foundations/node-library-tour.md
    - standard_surface vs OpenPBR: foundations/standard-surface-vs-openpbr.md
    - Color Management: foundations/color-management.md
    - Glossary & Cheat-Sheet: foundations/glossary.md
  - For Artists:
    - For Artists: personas/for-artists.md
    - Previewing Materials: personas/previewing.md
    - Editing Materials: personas/editing.md
  - For Developers:
    - Language Bindings: personas/bindings.md
    - Authoring With the API: personas/programmer-authoring.md
    - Rendering .mtlx Files: personas/programmer-rendering.md
    - Building From Source: advanced/building-from-source.md
  - In Your DCC:
