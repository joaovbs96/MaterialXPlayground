    - Transparency, Glass & Refraction: intermediate/transparency-and-glass.md
    - Displacement: intermediate/displacement.md
    - Looks, Variants & Assignment: intermediate/looks-and-variants.md
    - Subgraphs & Custom Nodedefs: intermediate/subgraphs-and-nodedefs.md
