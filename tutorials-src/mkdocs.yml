    - Maya: dcc/maya.md
    - 3ds Max: dcc/3ds-max.md
    - Blender: dcc/blender.md
    - Substance 3D: dcc/substance-3d.md
    - Omniverse: dcc/omniverse.md
    - Katana: dcc/katana.md
