                    return Object.keys(byCat).sort().map((k) => {
                        const e = byCat[k];
                        e.signatures = groupSignatures(e.defs);
                        return e;
                    });
                });
                nodeCatalogPromise.catch(() => { nodeCatalogPromise = null; }); // allow retry
            }
            return nodeCatalogPromise;
        };

        // Every keyboard shortcut and mouse interaction currently live in
        // the editor — kept as one list so it can't silently drift from
        // reality; update it alongside whatever handler it documents.
        const KEYBINDS = [
            { keys: 'Click', desc: 'Select a node — opens the parameter panel and the preview' },
            { keys: 'Shift/Ctrl/Cmd + Click', desc: 'Toggle a node into/out of the current multi-selection' },
            { keys: 'Drag (empty canvas)', desc: 'Box-select every node inside the marquee' },
            { keys: 'Middle-drag', desc: 'Pan the canvas' },
            { keys: 'Drag a node', desc: 'Move it (Auto Layout re-lays out afterward if it’s on)' },
            { keys: 'Drag between ports', desc: 'Connect an output to an input' },
            { keys: 'Drag an edge end off', desc: 'Disconnect it' },
            { keys: 'Double-click a nodegraph', desc: 'Open (enter) its scope' },
            { keys: 'Del / Backspace', desc: 'Delete the selected node(s), or disconnect the selected edge' },
            { keys: 'F', desc: 'Fit the whole graph in view' },
            { keys: 'A', desc: 'Re-run the automatic layout once' },
            { keys: 'Tab', desc: 'Open the add-node search (inside a nodegraph: also add interface inputs/outputs)' },
            { keys: 'Ctrl/Cmd + C', desc: 'Copy the selected node(s)' },
            { keys: 'Ctrl/Cmd + V', desc: 'Paste the copied node(s)' },
            { keys: 'Ctrl/Cmd + G', desc: 'Encapsulate the selected nodes into a nodegraph' },
            { keys: 'Ctrl/Cmd + Z', desc: 'Undo the last document edit' },
            { keys: 'Ctrl/Cmd + Shift + Z (or Ctrl/Cmd + Y)', desc: 'Redo' },
            { keys: 'Esc', desc: 'Close the add-node search, or exit full screen' },
            { keys: 'Drag & drop files', desc: 'Import a .mtlx / .zip / companion files anywhere on the page' },
        ];

        function KeybindsHelp({ onClose }) {
            React.useEffect(() => {
                const onKey = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, [onClose]);
            return (
                <div className="absolute inset-0 z-50 flex items-center justify-center bg-gray-950/70"
                    onMouseDown={onClose}>
                    <div className="bg-gray-800/95 backdrop-blur border border-gray-600 rounded-lg shadow-2xl w-[26rem] max-w-[90%] max-h-[80%] overflow-hidden flex flex-col"
                        onMouseDown={(e) => e.stopPropagation()}>
                        <div className="flex items-center justify-between px-4 py-2.5 border-b border-gray-700 bg-gray-900/70">
                            <div className="text-sm font-bold text-gray-100">Keyboard shortcuts</div>
                            <button onClick={onClose} title="Close" className="text-gray-400 hover:text-gray-200 leading-none text-lg px-1">{'×'}</button>
                        </div>
                        <div className="overflow-y-auto custom-scrollbar px-4 py-3">
                            <table className="w-full text-[11px] font-mono">
                                <tbody>
                                    {KEYBINDS.map((k) => (
                                        <tr key={k.keys} className="align-top">
                                            <td className="py-1 pr-3 whitespace-nowrap text-blue-300">{k.keys}</td>
                                            <td className="py-1 text-gray-300">{k.desc}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // In-tab docs viewer: opens index.html?embed=1#/<lib>/<group>/<name>
        // in an iframe instead of a new tab. Stays MOUNTED while closed (just
        // hidden) so the iframe keeps its state warm across re-opens; the src
        // is only navigated imperatively when the requested URL changes.
        function DocsDialog({ url, fullUrl, label, open, onClose }) {
            const iframeRef = React.useRef(null);
            const lastUrlRef = React.useRef(null);
            const openRef = React.useRef(open);
            openRef.current = open;
            const [frameLoaded, setFrameLoaded] = React.useState(false);

            // Tell the embed page whether it's visible so it can pause its WebGL
            // render loop while hidden (display:none does not stop rAF).
            const postVisibility = (visible) => {
                const iframe = iframeRef.current;
                if (!iframe || !iframe.contentWindow) return;
                try { iframe.contentWindow.postMessage({ type: 'mtlx-embed-visible', visible: !!visible }, '*'); } catch (e) { /* best-effort */ }
            };

            React.useEffect(() => {
                const onKey = (e) => { if (open && e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, [open, onClose]);

            React.useEffect(() => { postVisibility(open); }, [open]);

            React.useEffect(() => {
                const iframe = iframeRef.current;
                if (!iframe || !url) return;
                if (!lastUrlRef.current) {
                    iframe.src = url;
                } else if (url !== lastUrlRef.current) {
                    try {
                        // Same-document (hash-only) navigation: the embed page
                        // swaps content in place — no reload, no `load` event —
                        // so the previous loaded state stays valid; don't reset.
                        iframe.contentWindow.location.replace(url);
                    } catch (err) {
                        // Full reload fallback — this WILL fire `load`.
                        setFrameLoaded(false);
                        iframe.src = url;
                    }
                }
                lastUrlRef.current = url;
            }, [url]);

            return (
                <div className={'absolute inset-0 z-50 flex items-center justify-center bg-gray-950/70' + (open ? '' : ' hidden')}
                    onMouseDown={onClose}>
                    <div className="bg-gray-800/95 backdrop-blur border border-gray-600 rounded-lg shadow-2xl w-[min(64rem,94%)] h-[90%] overflow-hidden flex flex-col"
                        onMouseDown={(e) => e.stopPropagation()}>
                        <div className="flex items-center justify-between px-4 py-2.5 border-b border-gray-700 bg-gray-900/70">
                            <span className="text-[13px] font-bold text-gray-100">{label}</span>
                            <div className="flex items-center gap-2">
                                <a href={fullUrl} target="_blank" rel="noopener noreferrer" title="Open in a new tab"
                                    className="text-gray-400 hover:text-gray-200 leading-none text-sm px-1">{'↗'}</a>
                                <button onClick={onClose} title="Close" className="text-gray-400 hover:text-gray-200 leading-none text-lg px-1">{'×'}</button>
                            </div>
                        </div>
                        <div className="relative flex-1 min-h-0">
                            <iframe ref={iframeRef} title="Node documentation"
                                className="absolute inset-0 w-full h-full border-0 bg-gray-950"
                                onLoad={() => { setFrameLoaded(true); postVisibility(openRef.current); }} />
                            {!frameLoaded && (
                                <div className="absolute inset-0 flex items-center justify-center text-xs text-gray-500 animate-pulse">
                                    {'Loading documentation…'}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // The Tab search palette: type-to-filter over the catalog,
        // arrows + Enter to add, Esc (or Tab again, or clicking away)
        // to close.
        // Value types offered for a new interface input/output — every
        // scalar/aggregate MaterialX data type plus the shader-ish ones a
        // nodegraph's boundary can carry.
        const IFACE_VALUE_TYPES = ['boolean', 'color3', 'color4', 'filename', 'float', 'integer',
            'matrix33', 'matrix44', 'string', 'vector2', 'vector3', 'vector4',
            'surfaceshader', 'displacementshader', 'volumeshader', 'BSDF', 'EDF', 'VDF', 'lightshader', 'material'];

        function AddNodeSearch({ catalog, ifaceMode, onAddInterface, onPick, onClose }) {
            const [q, setQ] = React.useState('');
            const [hi, setHi] = React.useState(0);
            const inputRef = React.useRef(null);
            const listRef = React.useRef(null);
            // Second step for the two synthetic "interface input"/"output"
            // rows below — picking one doesn't add anything yet, it swaps
            // the palette body to this small name+type form.
            const [ifaceDraft, setIfaceDraft] = React.useState(null); // { kind, name, type }
            const nameRef = React.useRef(null);
            React.useEffect(() => {
                const t = setTimeout(() => { if (inputRef.current) inputRef.current.focus(); }, 0);
                return () => clearTimeout(t);
            }, []);
            React.useEffect(() => {
                if (!ifaceDraft) return;
                const t = setTimeout(() => { if (nameRef.current) nameRef.current.focus(); }, 0);
                return () => clearTimeout(t);
            }, [!!ifaceDraft]);
            const items = React.useMemo(() => {
                const s = q.trim().toLowerCase();
                const synth = [];
                if (ifaceMode) {
                    if (!s || 'interface input'.indexOf(s) !== -1 || 'input'.indexOf(s) !== -1) {
                        synth.push({ synthetic: 'iface-input', category: 'interface input' });
                    }
                    if (!s || 'output'.indexOf(s) !== -1) {
                        synth.push({ synthetic: 'iface-output', category: 'output' });
                    }
                }
                if (!catalog) return synth;
                const match = s ? catalog.filter((c) =>
                    c.category.toLowerCase().indexOf(s) !== -1 ||
                    (c.group || '').toLowerCase().indexOf(s) !== -1) : catalog;
                const rank = (c) => {
                    if (!s) return 2;
                    const n = c.category.toLowerCase();
                    if (n === s) return 0;
                    if (n.indexOf(s) === 0) return 1;
                    if (n.indexOf(s) !== -1) return 2;
                    return 3; // matched on the group only
                };
                return synth.concat(match.slice()
                    .sort((a, b) => rank(a) - rank(b) || a.category.localeCompare(b.category))
                    .slice(0, 60));
            }, [catalog, q, ifaceMode]);
            React.useEffect(() => { setHi(0); }, [q]);
            React.useEffect(() => { // keep the highlighted row in view
                const el = listRef.current && listRef.current.children[hi];
                if (el && el.scrollIntoView) el.scrollIntoView({ block: 'nearest' });
            }, [hi, items]);
            const pick = (c) => {
                if (c.synthetic) setIfaceDraft({ kind: c.synthetic, name: '', type: 'color3' });
                else onPick(c);
            };
            const confirmIface = () => {
                if (!ifaceDraft) return;
                onAddInterface(ifaceDraft.kind, ifaceDraft.name, ifaceDraft.type);
                onClose();
            };
            const onKeyDown = (e) => {
                if (e.key === 'ArrowDown') { e.preventDefault(); setHi((h) => Math.min(h + 1, Math.max(items.length - 1, 0))); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); setHi((h) => Math.max(h - 1, 0)); }
                else if (e.key === 'Enter') { e.preventDefault(); if (items[hi]) pick(items[hi]); }
                else if (e.key === 'Escape' || e.key === 'Tab') { e.preventDefault(); onClose(); }
            };
            const onDraftKeyDown = (e) => {
                if (e.key === 'Enter') { e.preventDefault(); confirmIface(); }
                else if (e.key === 'Escape') { e.preventDefault(); setIfaceDraft(null); }
            };
            return (
                <div className="absolute inset-0 z-40" onMouseDown={onClose}>
                    <div
                        className="absolute left-1/2 -translate-x-1/2 top-16 w-[22rem] max-w-[90%] bg-gray-800/95 backdrop-blur border border-gray-600 rounded-lg shadow-2xl overflow-hidden"
                        onMouseDown={(e) => e.stopPropagation()}
                    >
                        {ifaceDraft ? (
                            <div onKeyDown={onDraftKeyDown}>
                                <div className="px-3 py-2 border-b border-gray-700 text-[11px] text-gray-400 italic">
                                    New {ifaceDraft.kind === 'iface-input' ? 'interface input' : 'output'}
                                </div>
                                <div className="px-3 py-2.5 space-y-2">
                                    <input
                                        ref={nameRef}
                                        className="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1 text-[12px] font-mono text-gray-100 placeholder-gray-500 focus:border-blue-500 focus:outline-none"
                                        placeholder={'name (optional — auto)'}
                                        value={ifaceDraft.name}
                                        spellCheck={false}
                                        onChange={(e) => setIfaceDraft(Object.assign({}, ifaceDraft, { name: e.target.value }))}
                                    />
                                    <select
                                        className="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1 text-[12px] font-mono text-gray-200 focus:border-blue-500 focus:outline-none"
                                        value={ifaceDraft.type}
                                        onChange={(e) => setIfaceDraft(Object.assign({}, ifaceDraft, { type: e.target.value }))}
                                    >
                                        {IFACE_VALUE_TYPES.map((t) => (
                                            <option key={t} value={t} style={{ color: typeColor(t) }}>{t}</option>
                                        ))}
                                    </select>
                                    <div className="flex items-center gap-2 pt-0.5">
                                        <button
                                            onClick={confirmIface}
                                            className="h-7 text-[11px] px-2.5 rounded border bg-blue-600/80 border-blue-500 text-gray-100 hover:bg-blue-600 transition-colors"
                                        >Add</button>
                                        <button
                                            onClick={() => setIfaceDraft(null)}
                                            className="h-7 text-[11px] px-2.5 rounded border bg-gray-800/80 border-gray-600 text-gray-300 hover:bg-gray-700/80 transition-colors"
                                        >Back</button>
                                    </div>
                                </div>
                                <div className="px-3 py-1.5 border-t border-gray-700 text-[10px] text-gray-500">
                                    Enter add {'·'} Esc back
                                </div>
                            </div>
                        ) : (<React.Fragment>
                        <input
                            ref={inputRef}
                            className="w-full bg-gray-900 border-b border-gray-700 px-3 py-2 text-sm font-mono text-gray-100 placeholder-gray-500 focus:outline-none"
                            placeholder={'Add a node — type to search…'}
                            value={q}
                            spellCheck={false}
                            onChange={(e) => setQ(e.target.value)}
                            onKeyDown={onKeyDown}
                        />
                        <div ref={listRef} className="max-h-72 overflow-y-auto custom-scrollbar">
                            {!catalog && !items.length && (
                                <div className="px-3 py-3 text-[11px] text-gray-500 animate-pulse">Loading the node library {'…'}</div>
                            )}
                            {catalog && !items.length && (
                                <div className="px-3 py-3 text-[11px] text-gray-500">No node matches {'“'}{q}{'”'}.</div>
                            )}
                            {items.map((c, i) => (
                                <button
                                    key={(c.synthetic || 'n') + ':' + c.category}
                                    onMouseEnter={() => setHi(i)}
                                    onClick={() => pick(c)}
                                    className={'w-full flex items-center gap-2 px-3 py-1.5 text-left text-[12px] font-mono transition-colors '
                                        + (i === hi ? 'bg-blue-600/30 text-gray-100' : 'text-gray-300 hover:bg-gray-700/60')}
                                >
                                    {c.synthetic ? (
                                        <React.Fragment>
                                            <span className="w-2 h-2 rotate-45 flex-none border" style={{ background: 'transparent', borderColor: '#94a3b8' }} />
                                            <span className="truncate italic">{c.category}</span>
                                            <span className="ml-auto flex-none text-[8px] uppercase tracking-wider text-gray-500 border border-gray-600 border-dashed rounded px-1">interface</span>
                                        </React.Fragment>
                                    ) : (
                                        <React.Fragment>
                                            <span className="w-2 h-2 rounded-full flex-none" style={{ background: typeColor((c.signatures[0] || {}).type || '') }} />
                                            <span className="truncate">{c.category}</span>
                                            {c.signatures.length > 1 && (
                                                <span className="ml-auto flex-none text-[9px] text-gray-500" title="This category has several signatures — pick one in the properties panel after adding">{c.signatures.length} sigs</span>
                                            )}
                                            {c.group && <span className={(c.signatures.length > 1 ? '' : 'ml-auto ') + 'flex-none text-[9px] text-gray-500 uppercase tracking-wider'}>{c.group}</span>}
                                        </React.Fragment>
                                    )}
                                </button>
                            ))}
                        </div>
                        <div className="px-3 py-1.5 border-t border-gray-700 text-[10px] text-gray-500">
                            {'↑↓'} select {'·'} Enter add {'·'} Esc close
                        </div>
                        </React.Fragment>)}
                    </div>
                </div>
            );
        }

        // "0.8, 0.8, 0.8" (color3/color4) → CSS color for a preview swatch;
        // null when the value doesn't parse.
        // ---- Typed parameter controls --------------------------------------
        // Mirrors the docs-page node previewer: color3/4 → color picker +
        // per-channel spinners (both speak LINEAR 0-1; rgbToHex/hexToRgb are
        // a plain byte↔float map, no sRGB transfer); vectorN → per-component
        // spinners; float/integer → spinner (+ slider when the nodedef
        // declares a UI range); enums → dropdowns; boolean → checkbox;
        // strings/filenames → text committed on blur/Enter.
        const VEC_SIZE = { color3: 3, color4: 4, vector2: 2, vector3: 3, vector4: 4 };
        const parseComps = (s, n) => {
            const parts = String(s || '').split(',').map((x) => parseFloat(x));
            const out = [];
            for (let i = 0; i < n; i++) out.push(isFinite(parts[i]) ? parts[i] : 0);
            return out;
        };
        const numStr = (x) => {
            const n = Number(x);
            return isFinite(n) ? String(parseFloat(n.toFixed(6))) : '0';
        };
        const splitList = (s) => String(s || '').split(',').map((x) => x.trim()).filter((x) => x.length);

        // One parameter row. Connected inputs show — and jump to — the node
        // feeding them. Unconnected ones edit the literal value. Text-ish
        // fields commit on blur or Enter; the structured controls (picker,
        // spinners, sliders) commit through a short debounce, because every
        // commit writes the document and recompiles the shader — per-tick
        // commits while dragging a slider would thrash the generator.
        // Continuous controls also fire onLive per input tick for a GPU-side
        // live preview, while the debounced commit owns the document write.
        function ParamRow({ nodeId, inp, readOnly, sourceId, onJump, onCommit, onLive, onPickFile, onSetColorspace }) {
            const [draft, setDraft] = React.useState(inp.value || '');
            React.useEffect(() => { setDraft(inp.value || ''); }, [nodeId, inp.name, inp.value]);
            const onCommitRef = React.useRef(onCommit);
            onCommitRef.current = onCommit;
            const inpValRef = React.useRef(inp.value || '');
            inpValRef.current = inp.value || '';
            const timerRef = React.useRef(null);
            const pendingRef = React.useRef(null);
            const flush = () => {
                if (timerRef.current) { clearTimeout(timerRef.current); timerRef.current = null; }
                if (pendingRef.current !== null && pendingRef.current !== inpValRef.current) {
                    onCommitRef.current(pendingRef.current);
                }
                pendingRef.current = null;
            };
            const commitSoon = (v) => {
                setDraft(v);
                if (onLive) onLive(v);
                pendingRef.current = v;
                if (timerRef.current) clearTimeout(timerRef.current);
                timerRef.current = setTimeout(flush, 300);
            };
            const commitNow = (v) => { setDraft(v); pendingRef.current = v; flush(); };
            React.useEffect(() => flush, []); // unmount: don't drop a pending edit
            const commit = () => { flush(); if (draft !== (inp.value || '')) onCommit(draft); };

            const vecN = VEC_SIZE[inp.type] || 0;
            const isColor = inp.type === 'color3' || inp.type === 'color4';
            const enumNames = splitList(inp.enumNames);
            const enumValues = splitList(inp.enumValues);
            const boxCls = 'bg-gray-900 border border-gray-600 rounded text-[11px] font-mono text-gray-200 focus:border-blue-500 focus:outline-none';

            // color3/color4 VALUE inputs can also carry a colorspace, but
            // it's rarely touched — the picker starts collapsed and only
            // auto-expands when the instance (or a signature/version swap)
            // already authors one, so it doesn't compete for space with
            // the swatch on every color row.
            const [csOpen, setCsOpen] = React.useState(!!inp.colorspace);
            React.useEffect(() => { setCsOpen(!!inp.colorspace); }, [nodeId, inp.name, inp.colorspace]);

            // Shared colorspace <select> row — used by the filename branch
            // (always) and the color3/color4 branch (behind the collapse
            // toggle) so the two don't drift apart.
            const colorspaceRow = () => (
                <div className="flex items-center gap-1.5">
                    <span className="flex-none text-[9px] text-gray-500" title="Color space of the image — baked into the generated shader">colorspace</span>
                    <select
                        className={'flex-1 min-w-0 px-1 py-0.5 ' + boxCls}
                        value={inp.colorspace || ''}
                        onChange={(e) => { if (onSetColorspace) onSetColorspace(e.target.value); }}
                    >
                        <option value="">{'(default' + (inp.defColorspace ? ': ' + inp.defColorspace : '') + ')'}</option>
                        {COLORSPACES.map((cs) => <option key={cs} value={cs}>{cs}</option>)}
                    </select>
                </div>
            );

            const textField = () => (
                <input
                    className={'flex-1 min-w-0 px-1.5 py-0.5 placeholder-gray-600 ' + boxCls}
                    value={draft}
                    placeholder="(no value)"
                    spellCheck={false}
                    onChange={(e) => setDraft(e.target.value)}
                    onBlur={commit}
                    onKeyDown={(e) => {
                        if (e.key === 'Enter') { commit(); e.target.blur(); }
                        if (e.key === 'Escape') { setDraft(inp.value || ''); e.target.blur(); }
                    }}
                />
            );

            const control = () => {
                // Enum → dropdown. Numeric enums map names onto enumvalues
                // (or the index); string enums: the name IS the value.
                if (enumNames.length) {
                    const isNum = inp.type === 'integer' || inp.type === 'float';
                    const useValues = isNum && enumValues.length === enumNames.length;
                    const valOf = (i) => useValues ? enumValues[i] : (isNum ? String(i) : enumNames[i]);
                    let sel = -1;
                    for (let i = 0; i < enumNames.length; i++) {
                        if (isNum ? parseFloat(valOf(i)) === parseFloat(draft) : valOf(i) === draft) { sel = i; break; }
                    }
                    return (
                        <select
                            className={'w-full px-1.5 py-0.5 ' + boxCls}
                            value={sel === -1 ? '' : String(sel)}
                            onChange={(e) => {
                                const i = parseInt(e.target.value, 10);
                                if (!isNaN(i)) commitNow(valOf(i));
                            }}
                        >
                            {sel === -1 && <option value="">({draft === '' ? 'unset' : draft})</option>}
                            {enumNames.map((nm, i) => <option key={i} value={String(i)}>{nm}</option>)}
                        </select>
                    );
                }
                if (inp.type === 'boolean') {
                    return (
                        <input
                            type="checkbox"
                            className="h-3.5 w-3.5 accent-blue-500"
                            checked={draft === 'true'}
                            onChange={(e) => commitNow(e.target.checked ? 'true' : 'false')}
                        />
                    );
                }
                // color3/4 and vector2/3/4: per-component spinners; colors
                // additionally get the native picker on the RGB part.
                if (vecN) {
                    const comps = parseComps(draft, vecN);
                    const setComp = (i, s) => {
                        const n = parseFloat(s);
                        if (isNaN(n)) return;
                        const nv = comps.slice();
                        nv[i] = isColor ? Math.max(0, Math.min(1, n)) : n;
                        commitSoon(nv.map(numStr).join(', '));
                    };
                    const chan = isColor ? 'RGBA' : 'XYZW';
                    const fmt = (n) => Math.round(Number(n) * 1000) / 1000; // display only
                    return (
                        <div>
                            <div className="flex items-center gap-1">
                                {isColor && (
                                    <button
                                        type="button"
                                        onClick={() => setCsOpen((v) => !v)}
                                        title="Colorspace…"
                                        className="flex-none text-gray-400 hover:text-gray-200 text-[10px] leading-none px-0.5 self-stretch"
                                    >{csOpen ? '▾' : '▸'}</button>
                                )}
                                {isColor && (
                                    <input
                                        type="color"
                                        className="w-full self-stretch h-6 min-w-0 p-0 bg-transparent border border-gray-600 rounded cursor-pointer"
                                        title="Linear RGB — hex bytes map 1:1 onto the 0-1 values to the right"
                                        value={rgbToHex(comps.slice(0, 3))}
                                        onChange={(e) => {
                                            const nv = hexToRgb(e.target.value);
                                            if (vecN === 4) nv.push(comps[3]);
                                            commitSoon(nv.map(numStr).join(', '));
                                        }}
                                    />
                                )}
                                {comps.map((c, i) => (
                                    <input
                                        key={i} type="number"
                                        min={isColor ? 0 : undefined} max={isColor ? 1 : undefined}
                                        step={0.01}
                                        title={chan[i] + (isColor ? ' (linear, 0-1)' : '')}
                                        className={'w-full min-w-0 px-1 py-0.5 ' + boxCls}
                                        value={fmt(c)}
                                        onChange={(e) => setComp(i, e.target.value)}
                                        onBlur={(e) => { e.target.value = String(fmt(c)); }}
                                    />
                                ))}
                            </div>
                            {isColor && csOpen && (
                                <div className="mt-1">{colorspaceRow()}</div>
                            )}
                        </div>
                    );
                }
                if (inp.type === 'float' || inp.type === 'integer') {
                    const lo = parseFloat(inp.uisoftmin !== '' && inp.uisoftmin != null ? inp.uisoftmin : inp.uimin);
                    const hi = parseFloat(inp.uisoftmax !== '' && inp.uisoftmax != null ? inp.uisoftmax : inp.uimax);
                    const hasRange = isFinite(lo) && isFinite(hi) && hi > lo;
                    const step = inp.type === 'integer' ? 1 : (hasRange ? Math.max((hi - lo) / 200, 0.001) : 0.01);
                    const parse = (s) => (inp.type === 'integer' ? parseInt(s, 10) : parseFloat(s));
                    const cur = parseFloat(draft);
                    const curN = isFinite(cur) ? cur : 0;
                    return (
                        <div className="flex items-center gap-1.5">
                            {hasRange && (
                                <input
                                    type="range" className="flex-1 min-w-0 accent-blue-500"
                                    min={lo} max={hi} step={step}
                                    value={Math.max(lo, Math.min(hi, curN))}
                                    onChange={(e) => commitSoon(numStr(parse(e.target.value)))}
                                />
                            )}
                            <input
                                type="number"
                                className={(hasRange ? 'w-16 flex-none' : 'w-full min-w-0') + ' px-1 py-0.5 ' + boxCls}
                                step={step} value={curN}
                                onChange={(e) => {
                                    const n = parse(e.target.value);
                                    if (!isNaN(n)) commitSoon(numStr(n));
                                }}
                                onBlur={(e) => { e.target.value = String(curN); }}
                            />
                        </div>
                    );
                }
                // Filename → image picker (joins the session's file map,
                // bound onto the shader like a dropped file) + editable
                // name field, with the COLORSPACE select right underneath.
                // Colorspace is a codegen decision (the CMS bakes the
                // transform into the shader), so picking one recompiles.
                if (inp.type === 'filename') {
                    return (
                        <div className="space-y-1">
                            <div className="flex items-center gap-1.5">
                                <label
                                    className="flex-none text-[10px] px-1.5 py-0.5 rounded bg-gray-700 hover:bg-gray-600 text-gray-200 cursor-pointer"
                                    title="Load an image file — it joins the session files and binds by name"
                                >
                                    Choose{'\u2026'}
                                    <input
                                        type="file" accept="image/png,image/jpeg,image/webp,image/gif"
                                        className="hidden"
                                        onChange={(e) => {
                                            const f = e.target.files && e.target.files[0];
                                            if (f && onPickFile) onPickFile(f);
                                            // Clear so re-picking the SAME file
                                            // still fires a change event.
                                            e.target.value = '';
                                        }}
                                    />
                                </label>
                                {textField()}
                            </div>
                            {/* Colorspace is only meaningful when the node's
                                resolved output is color3/color4 — never hide
                                it, though, when the instance already
                                authors one (e.g. after a signature/version
                                swap that no longer resolves to a color
                                output but left the attribute in place). */}
                            {(inp.colorManaged || inp.colorspace) && colorspaceRow()}
                        </div>
                    );
                }
                // string / matrices / everything else.
                return <div className="flex items-center gap-1.5">{textField()}</div>;
            };

            return (
                <div className="py-1.5 border-b border-gray-700/60 last:border-b-0">
                    <div className="flex items-center gap-1.5 text-[11px] font-mono">
                        <span className="w-2 h-2 rounded-full flex-none" style={{ background: typeColor(inp.type) }} />
                        <span className="text-gray-300 truncate">{inp.name}</span>
                        <span className="ml-auto flex-none text-[9px]" style={{ color: typeColor(inp.type) }}>{inp.type}</span>
                    </div>
                    {inp.connected ? (
                        sourceId ? (
                            <button
                                onClick={() => onJump(sourceId)}
                                title="Select and show the node this input is connected to"
                                className="mt-1 ml-3.5 max-w-[calc(100%-0.875rem)] text-left text-[10px] text-blue-300 hover:text-blue-200 font-mono underline decoration-dotted truncate block"
                            >{'\u2190'} from {sourceId.slice(2)}</button>
                        ) : (
                            <div className="mt-1 ml-3.5 text-[10px] text-gray-500 font-mono">{'\u2190'} set by connection</div>
                        )
                    ) : readOnly ? (
                        <div className="mt-1 ml-3.5 text-[11px] text-gray-400 font-mono truncate" title={inp.value}>
                            {inp.value !== '' ? inp.value : '\u2014'}
                        </div>
                    ) : (
                        <div className="mt-1 ml-3.5">{control()}</div>
                    )}
                </div>
            );
        }

        // Descriptors + layout → React Flow nodes/edges.
        // Input display, per node: 'authored' (only inputs written in the
        // document — "set") or 'all' (plus every nodedef input at its
        // default value). Connected inputs are ALWAYS visible so no edge
        // ever dangles.
        const visiblePortsFor = (all, mode) => all.filter((inp) =>
            inp.connected || mode === 'all' || inp.authored !== false);

        const toFlow = (descs, edges, opts) => {
            const o = opts || {};
            const mode = o.portMode || 'authored';
            const connectedIn = new Set(edges.map((e) => e.target + '|' + e.targetHandle));
            // Filter BEFORE layout: nodeHeight() counts the rows that will
            // actually render. data.inputs = the visible rows; data.allInputs
            // = everything (the parameter panel edits from the full list).
            const shaped = descs.map((d) => {
                const withConn = d.inputs.map((inp) => Object.assign({}, inp, {
                    connected: connectedIn.has(d.id + '|in:' + inp.name),
                }));
                return Object.assign({}, d, {
                    allInputs: withConn,
                    inputs: visiblePortsFor(withConn, mode),
                    portMode: mode,
                    onOpen: (d.kind === 'nodegraph' && o.onOpenScope)
                        ? () => o.onOpenScope(d.name) : undefined,
                    onTogglePorts: o.onTogglePorts ? () => o.onTogglePorts(d.id) : undefined,
                });
            });
            const posOf = layoutScope(shaped, edges);
            const nodes = shaped.map((d) => ({
                id: d.id,
                type: 'mtlx',
                position: posOf[d.id],
                data: d,
            }));
            const rfEdges = edges.map(toRfEdge);
            return { nodes, edges: rfEdges };
        };

        // One flow edge, styled by its MaterialX type — used by toFlow AND by
        // onConnect (live drag-connections), so the two always look identical.
        const toRfEdge = (e) => ({
            id: e.id, source: e.source, sourceHandle: e.sourceHandle,
            target: e.target, targetHandle: e.targetHandle,
            data: { type: e.type || '' },
            style: { stroke: typeColor(e.type), strokeWidth: 1.5 },
            markerEnd: { type: MarkerType.ArrowClosed, color: typeColor(e.type), width: 14, height: 14 },
        });

        // The attributes that make an <input> (or <output>) element a
        // CONNECTION in MaterialX. Clearing all of them = disconnecting.
        const CONN_ATTRS = ['interfacename', 'nodegraph', 'nodename', 'output'];

        // ---- App ---------------------------------------------------------------

        function NodeGraphApp() {
            const [fileMap, setFileMap] = React.useState({});
            const fileMapRef = React.useRef({});
            const [mtlxPaths, setMtlxPaths] = React.useState([]);
            const [chosenMtlx, setChosenMtlx] = React.useState(null);
            const [parsed, setParsed] = React.useState(null); // { mx, doc, nodegraphs, label }
            const [scope, setScope] = React.useState('');     // '' = document root
            const [flow, setFlow] = React.useState({ nodes: [], edges: [] });
            const [status, setStatus] = React.useState('Drop a .mtlx (or a folder / .zip containing one) to begin.');
            const [error, setError] = React.useState(null);
            const [dragOver, setDragOver] = React.useState(false);
            const [busy, setBusy] = React.useState(false);
            // The type-color legend (bottom left) can be collapsed to a chip.
            const [legendOpen, setLegendOpen] = React.useState(true);
            // Legend "+" toggle: show every known TYPE_COLORS entry, not just
            // the types present in the current scope.
            const [legendShowAll, setLegendShowAll] = React.useState(false);
            // Node input display: 'authored' ("set") or 'all'. The global
            // mode seeds every rebuild; individual nodes toggle in place via
            // their corner +/− badge.
            const [globalPorts, setGlobalPorts] = React.useState('authored');
            const globalPortsRef = React.useRef('authored');
            globalPortsRef.current = globalPorts;
            // auto-layout: OFF by default — loading a document and entering
            // or leaving nodegraphs keep the stored (or once-computed)
            // layout, and only the Arrange button re-lays out. ON: every
            // rebuild (new document, scope change) and every port-mode
            // change re-runs the automatic layout. Remembered per browser.
            const [autoLayout, setautoLayout] = React.useState(() => {
                try { return localStorage.getItem('mtlx-graph-auto-layout') === '1'; } catch (e) { return false; }
            });
            const autoLayoutRef = React.useRef(false);
            autoLayoutRef.current = autoLayout;
            React.useEffect(() => {
                try { localStorage.setItem('mtlx-graph-auto-layout', autoLayout ? '1' : '0'); } catch (e) { /* storage unavailable */ }
            }, [autoLayout]);
            // Parameter panel (right): the clicked node's id, and whether the
            // panel is expanded or collapsed to a chip.
            const [selectedId, setSelectedId] = React.useState(null);
            // Click-to-edit node/graph/interface/output name in the panel
            // header. Draft text lives here; reset whenever the displayed
            // element changes so a stale edit never leaks onto another node.
            const [nameEditing, setNameEditing] = React.useState(false);
            const [nameDraft, setNameDraft] = React.useState('');
            // The selected EDGE (single selection, mutually exclusive with
            // the node selection) — Del/Backspace disconnects it.
            const [selectedEdgeId, setSelectedEdgeId] = React.useState(null);
            const [paramsOpen, setParamsOpen] = React.useState(true);
            // The LAST node the preview showed — { scope, id } — so the
            // preview stays on it when the selection is cleared. Reset per
            // document.
            const [previewSel, setPreviewSel] = React.useState(null);
            // Tab quick-add: whether the search palette is open, and the
            // stdlib node catalog once loaded.
            const [addOpen, setAddOpen] = React.useState(false);
            // Keybinds reference popup ("?" button, top-right).
            const [helpOpen, setHelpOpen] = React.useState(false);
            // In-tab docs viewer (parameter panel "?" button): { url, fullUrl, label }
            // of the node whose docs are shown, and a separate open flag so the
            // dialog (and its iframe) can stay mounted-but-hidden between opens.
            const [docsDialog, setDocsDialog] = React.useState(null);
            const [docsDialogOpen, setDocsDialogOpen] = React.useState(false);
            const [catalog, setCatalog] = React.useState(null);
            // Bumped on every committed edit that reached the MaterialX
            // document — the material preview regenerates from the live doc.
            const [docRev, setDocRev] = React.useState(0);
            // Unsaved-changes tracking, deliberately SEPARATE from docRev:
            // docRev only bumps for edits that need a preview recompile, but
            // a dragged node's xpos/ypos or a freshly-added-but-unconnected
            // node also change what Export would write, without needing a
            // recompile. dirtyRev bumps at every docRev site PLUS those two
            // spatial/structural ones; isDirty compares it against the
            // revision last written out (export) or loaded (import).
            const [dirtyRev, setDirtyRev] = React.useState(0);
            const [savedRev, setSavedRev] = React.useState(0);
            const isDirty = dirtyRev !== savedRev;
            // Kept current every render so an async completion (export,
            // document load) can snap savedRev to whatever dirtyRev IS at
            // that moment, regardless of which render's closure it runs in.
            const dirtyRevRef = React.useRef(0);
            dirtyRevRef.current = dirtyRev;
            const markSaved = () => {
                setSavedRev(dirtyRevRef.current);
                undoStateRef.current.savedIndex = undoStateRef.current.index;
            };

            // ---- Undo / redo: coarse XML-snapshot history --------------
            // Every markDirty() edit schedules a debounced snapshot of the
            // full document (minus transient __pv_* preview nodes, same
            // guard exportMtlx uses — see serializeDocXml below). Snapshots
            // exclude the stdlib (setDataLibrary keeps it separate from the
            // owning doc), so they stay small even for big graphs.
            const parsedRef = React.useRef(null);
            parsedRef.current = parsed;
            // The live preview's createMtlxRenderView() handle, kept in sync
            // by NodePreview — lets a committed param edit push straight
            // into the view's uniforms instead of forcing a docRev rebuild.
            const previewViewRef = React.useRef(null);
            const scopeRef = React.useRef('');
            scopeRef.current = scope;
            // { stack: [{xml, scope, tag}], index, savedIndex }. index === -1
            // means an empty stack (no document loaded yet).
            const undoStateRef = React.useRef({ stack: [], index: -1, savedIndex: -1 });
            const snapshotTimerRef = React.useRef(null);
            // Transient __pv_* preview nodes can be alive for hundreds of ms
            // after a docRev bump (NodePreview cleans them up after an
            // awaited render) — exactly when the debounced flush fires. So a
            // failed serialize RETRIES on the same cadence instead of
            // silently dropping the undo step; the budget is reset by every
            // fresh pushUndoSnapshot.
            const snapshotRetryRef = React.useRef(0);
            // Set while a snapshot is being restored, so the restore itself
            // never schedules another snapshot (would corrupt the stack).
            const restoringRef = React.useRef(false);
            const UNDO_CAP = 50;
            const UNDO_DEBOUNCE_MS = 350;
            const UNDO_RETRY_MAX = 10;

            // Flush a pending debounced snapshot immediately (synchronous
            // body shared by the timer callback and undoDoc, so Ctrl+Z right
            // after an edit doesn't lose the edit that hasn't landed yet).
            const flushUndoSnapshot = (tag) => {
                if (restoringRef.current) return;
                if (!parsedRef.current) return;
                let xml;
                try {
                    xml = serializeDocXml(parsedRef.current);
                } catch (e) {
                    // Transient __pv_* nodes mid-generation (or any other
                    // serialize failure): retry on the same cadence until
                    // the budget runs out, rather than dropping the step.
                    if (snapshotRetryRef.current > 0) {
                        snapshotRetryRef.current--;
                        if (snapshotTimerRef.current) clearTimeout(snapshotTimerRef.current);
                        snapshotTimerRef.current = setTimeout(() => {
                            snapshotTimerRef.current = null;
                            flushUndoSnapshot(tag);
                        }, UNDO_DEBOUNCE_MS);
                    }
                    return;
                }
                const u = undoStateRef.current;
                u.stack.length = u.index + 1; // drop any redo branch
                if (u.savedIndex > u.index) u.savedIndex = -1;
                const top = u.stack[u.index];
                if (top && tag != null && top.tag === tag) {
                    // Coalesce: replace the top entry (e.g. a slow param drag
                    // collapses into a single undo step).
                    u.stack[u.index] = { xml, scope: scopeRef.current, tag };
                    if (u.savedIndex >= u.index) u.savedIndex = -1;
                } else {
                    u.stack.push({ xml, scope: scopeRef.current, tag: tag != null ? tag : null });
                    if (u.stack.length > UNDO_CAP + 1) {
                        u.stack.shift();
                        if (u.savedIndex >= 0) u.savedIndex--;
                    }
                    u.index = u.stack.length - 1;
                }
            };

            const pushUndoSnapshot = (tag) => {
                if (restoringRef.current) return;
                snapshotRetryRef.current = UNDO_RETRY_MAX;
                if (snapshotTimerRef.current) clearTimeout(snapshotTimerRef.current);
                snapshotTimerRef.current = setTimeout(() => {
                    snapshotTimerRef.current = null;
                    flushUndoSnapshot(tag);
                }, UNDO_DEBOUNCE_MS);
            };

            const markDirty = (undoTag) => {
                setDirtyRev((r) => r + 1);
                pushUndoSnapshot(undoTag || null);
            };

            const restoreSnapshot = async (entry) => {
                if (restoringRef.current) return;
                restoringRef.current = true;
                try {
                    const p = await parseMtlxDocument(entry.xml);
                    p.label = parsedRef.current ? parsedRef.current.label : 'document';
                    const nextScope = (entry.scope && p.nodegraphs && p.nodegraphs.indexOf(entry.scope) === -1)
                        ? '' : (entry.scope || '');
                    setParsed(p);
                    setScope(nextScope);
                    setDocRev((r) => r + 1);
                    const u = undoStateRef.current;
                    if (u.index === u.savedIndex) markSaved();
                    else setDirtyRev((r) => r + 1);
                } catch (e) {
                    console.error('undo restore failed', e);
                } finally {
                    restoringRef.current = false;
                }
            };

            const undoDoc = () => {
                const u = undoStateRef.current;
                if (snapshotTimerRef.current) {
                    clearTimeout(snapshotTimerRef.current);
                    snapshotTimerRef.current = null;
                    flushUndoSnapshot(null);
                    // If that synchronous flush failed (transients alive), a
                    // retry timer may have just been scheduled — kill it so a
                    // stale snapshot can't land after the restore below. The
                    // un-captured edit is being undone anyway.
                    if (snapshotTimerRef.current) {
                        clearTimeout(snapshotTimerRef.current);
                        snapshotTimerRef.current = null;
                    }
                    snapshotRetryRef.current = 0;
                }
                if (u.index > 0) {
                    u.index--;
                    restoreSnapshot(u.stack[u.index]);
                }
            };

            const redoDoc = () => {
                const u = undoStateRef.current;
                if (u.index >= 0 && u.index < u.stack.length - 1) {
                    u.index++;
                    restoreSnapshot(u.stack[u.index]);
                }
            };
            // React Flow instance, captured for programmatic viewport moves
            // (the panel's "from <node>" jump links).
            const rfInstRef = React.useRef(null);

            // Fullscreen for the graph panel (same helpers as the viewports).
            const panelRef = React.useRef(null);
            const [isFullscreen, setIsFullscreen] = React.useState(false);
            React.useEffect(() => watchFullscreen(
                (el) => setIsFullscreen(!!el && el === panelRef.current)
            ), []);

            // Warm the MaterialX WASM on mount (also resolves the header's
            // version badge right away).
            React.useEffect(() => { getMxEnv().catch(() => {}); }, []);

            // A new document invalidates the remembered preview target.
            React.useEffect(() => { setPreviewSel(null); }, [parsed]);

            // Open the quick-add palette (also kicks off the catalog load
            // the first time).
            const openAddSearch = () => {
                setAddOpen(true);
                buildNodeCatalog().then(setCatalog).catch((e) => {
                    setAddOpen(false);
                    setError(String((e && e.message) || e));
                });
            };
            const openAddRef = React.useRef(openAddSearch);
            openAddRef.current = openAddSearch;
            const parsedLiveRef = React.useRef(null);
            parsedLiveRef.current = parsed;

            // Tab, while the graph stage is the focus context, opens the
            // add-node search. Tab keeps its normal meaning inside inputs
            // and while keyboard-navigating the header links.
            React.useEffect(() => {
                const onKey = (e) => {
                    if (e.key !== 'Tab' || e.shiftKey || e.ctrlKey || e.altKey || e.metaKey) return;
                    const t = e.target;
                    const tag = ((t && t.tagName) || '').toLowerCase();
                    if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
                    if (t && t.isContentEditable) return;
                    const inStage = t === document.body
                        || (panelRef.current && t instanceof Node && panelRef.current.contains(t));
                    if (!inStage) return;
                    if (!parsedLiveRef.current) return;
                    e.preventDefault();
                    openAddRef.current();
                };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, []);

            // Double-click ANYWHERE on a nodegraph node opens it. Handled
            // natively on the stage — independent of React Flow's internal
            // event plumbing — so the header, the port rows and the body all
            // behave the same. Buttons/links inside the card keep their own
            // meaning. (React Flow's onNodeDoubleClick stays wired too; both
            // paths call setScope with the same name, which is idempotent.)
            React.useEffect(() => {
                const host = panelRef.current;
                if (!host) return;
                const onDbl = (e) => {
                    const t = e.target;
                    if (!(t instanceof Element)) return;
                    if (t.closest('button, a, input, select, textarea')) return;
                    const nodeEl = t.closest('.react-flow__node');
                    if (!nodeEl) return;
                    const id = nodeEl.getAttribute('data-id') || '';
                    if (id.indexOf('g:') === 0) setScope(id.slice(2));
                };
                host.addEventListener('dblclick', onDbl);
                return () => host.removeEventListener('dblclick', onDbl);
            }, []);

            // Del / Backspace: disconnect the selected edge, or delete the
            // selected node. Same focus rules as the Tab handler — typing in
            // an input keeps its normal meaning.
            const deleteSelectionRef = React.useRef(() => false);
            React.useEffect(() => {
                const onKey = (e) => {
                    if (e.key !== 'Delete' && e.key !== 'Backspace') return;
                    const t = e.target;
                    const tag = ((t && t.tagName) || '').toLowerCase();
                    if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
                    if (t && t.isContentEditable) return;
                    const inStage = t === document.body
                        || (panelRef.current && t instanceof Node && panelRef.current.contains(t));
                    if (!inStage) return;
                    if (deleteSelectionRef.current()) e.preventDefault();
                };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, []);

            // F: fit the whole graph in view. Same focus rules again.
            React.useEffect(() => {
                const onKey = (e) => {
                    if ((e.key !== 'f' && e.key !== 'F')
                        || e.shiftKey || e.ctrlKey || e.altKey || e.metaKey) return;
                    const t = e.target;
                    const tag = ((t && t.tagName) || '').toLowerCase();
                    if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
                    if (t && t.isContentEditable) return;
                    const inStage = t === document.body
                        || (panelRef.current && t instanceof Node && panelRef.current.contains(t));
                    if (!inStage) return;
                    const inst = rfInstRef.current;
                    if (!inst || typeof inst.fitView !== 'function') return;
                    e.preventDefault();
                    inst.fitView({ padding: 0.15, duration: 350 });
                };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, []);

            const loadDocument = async (path, mapArg) => {
                const map = mapArg || fileMapRef.current;
                setError(null);
                setBusy(true);
                setStatus('Parsing ' + path + ' \u2026');
                try {
                    let xml = await map[path].text();
                    if (/<xi:include\b/.test(xml)) {
                        const dir = path.indexOf('/') >= 0 ? path.slice(0, path.lastIndexOf('/')) : '';
                        xml = await resolveIncludes(xml, map, dir);
                    }
                    const p = await parseMtlxDocument(xml);
                    p.label = path;
                    setParsed(p);
                    setScope('');
                    setStatus(null);
                    if (snapshotTimerRef.current) { clearTimeout(snapshotTimerRef.current); snapshotTimerRef.current = null; }
                    try {
                        undoStateRef.current = { stack: [{ xml: serializeDocXml(p), scope: '', tag: null }], index: 0, savedIndex: 0 };
                    } catch (e) {
                        undoStateRef.current = { stack: [], index: -1, savedIndex: -1 };
                    }
                    markSaved(); // a freshly loaded document has no unsaved edits of its own
                } catch (e2) {
                    setStatus(null);
                    setError(String(e2 && e2.message || e2));
                } finally {
                    setBusy(false);
                }
            };

            // Start a brand-new, empty session: clears the file map and any
            // loaded document, then seeds the undo stack exactly like
            // loadDocument does for a freshly loaded file (so the very first
            // edit has a baseline to diff against).
            const newDocument = async () => {
                setError(null);
                setBusy(true);
                setStatus('Creating new document ' + '\u2026');
                try {
                    const xml = '<?xml version="1.0"?>\n<materialx version="1.39">\n</materialx>\n';
                    const p = await parseMtlxDocument(xml);
                    p.label = 'untitled.mtlx';
                    fileMapRef.current = {};
                    setFileMap({});
                    setMtlxPaths([]);
                    setChosenMtlx(null);
                    setSelectedId(null);
                    setParsed(p);
                    setScope('');
                    setStatus(null);
                    if (snapshotTimerRef.current) { clearTimeout(snapshotTimerRef.current); snapshotTimerRef.current = null; }
                    try {
                        undoStateRef.current = { stack: [{ xml: serializeDocXml(p), scope: '', tag: null }], index: 0, savedIndex: 0 };
                    } catch (e) {
                        undoStateRef.current = { stack: [], index: -1, savedIndex: -1 };
                    }
                    markSaved(); // a freshly created document has no unsaved edits of its own
                } catch (e2) {
                    setStatus(null);
                    setError(String(e2 && e2.message || e2));
                } finally {
                    setBusy(false);
                }
            };

            const ingest = async (map) => {
                setError(null);
                try {
                    await expandZips(map);
                } catch (e) {
                    setError(String(e && e.message || e));
                    return;
                }
                const droppedMtlx = Object.keys(map).filter((k) => /\.mtlx$/i.test(k));
                // Same session semantics as the material viewer: a drop with
                // a .mtlx replaces the session (unless none existed yet);
                // other files merge in — they may be xi:include targets.
                const hadSession = Object.keys(fileMapRef.current).some((k) => /\.mtlx$/i.test(k));
                let merged;
                if (droppedMtlx.length && hadSession) {
                    merged = Object.assign({}, map);
                    setParsed(null);
                    setScope('');
                    setFlow({ nodes: [], edges: [] });
                    if (snapshotTimerRef.current) { clearTimeout(snapshotTimerRef.current); snapshotTimerRef.current = null; }
                    undoStateRef.current = { stack: [], index: -1, savedIndex: -1 };
                } else {
                    merged = Object.assign({}, fileMapRef.current, map);
                }
                fileMapRef.current = merged;
                setFileMap(merged);
                const mtlx = Object.keys(merged).filter((k) => /\.mtlx$/i.test(k));
                setMtlxPaths(mtlx);
                if (!mtlx.length) {
                    setStatus('Files received — now drop the .mtlx document itself.');
                    return;
                }
                if (droppedMtlx.length) {
                    const pick = mtlx.length === 1 ? mtlx[0] : null;
                    setChosenMtlx(pick);
                    if (pick) loadDocument(pick, merged);
                    else setStatus('This drop contains several .mtlx files — pick one below.');
                } else if (chosenMtlx) {
                    loadDocument(chosenMtlx, merged); // includes may now resolve
                } else {
                    setStatus('Files added — pick a .mtlx below.');
                }
            };

            // ---- Unsaved-changes protection for actions that REPLACE the
            // current document (Import, drag-drop of a new .mtlx, switching
            // documents). The actual tab/window close is separately guarded
            // by the native beforeunload prompt below — browsers don't allow
            // a custom dialog or an async export in response to THAT one,
            // but in-app actions like these are fully ours to gate.
            const [confirmCloseOpen, setConfirmCloseOpen] = React.useState(false);
            const pendingActionRef = React.useRef(null);
            // `hasMtlx`: whether the pending action actually introduces a
            // new .mtlx (vs. e.g. dropping a missing texture to complete an
            // include) — only THAT actually discards the current session.
            const confirmReplace = (hasMtlx, action) => {
                if (isDirty && hasMtlx && parsed) {
                    pendingActionRef.current = action;
                    setConfirmCloseOpen(true);
                } else {
                    action();
                }
            };
            const guardedIngest = (map) => {
                const hasMtlx = Object.keys(map).some((k) => /\.mtlx$/i.test(k));
                confirmReplace(hasMtlx, () => ingest(map));
            };
            // Kept current every render for the [] -dep drag-drop effect
            // below (same trick as ingestRef).
            const guardedIngestRef = React.useRef(guardedIngest);
            guardedIngestRef.current = guardedIngest;
            // New Material always replaces the current session (there's
            // nothing to merge, unlike a plain include drop), so it's
            // always gated behind the same unsaved-changes dialog.
            const guardedNewDocument = () => confirmReplace(true, () => newDocument());

            // ---- Page-wide drag & drop (identical to the viewer's) ----
            const ingestRef = React.useRef(ingest);
            ingestRef.current = ingest;
            React.useEffect(() => {
                let depth = 0;
                const hasFiles = (e) => {
                    const t = e.dataTransfer && e.dataTransfer.types;
                    return !!t && Array.from(t).indexOf('Files') >= 0;
                };
                const onEnter = (e) => {
                    if (!hasFiles(e)) return;
                    e.preventDefault();
                    depth += 1;
                    setDragOver(true);
                };
                const onOver = (e) => { if (hasFiles(e)) e.preventDefault(); };
                const onLeave = (e) => {
                    if (!hasFiles(e)) return;
                    depth = Math.max(0, depth - 1);
                    if (depth === 0) setDragOver(false);
                };
                const onDropAnywhere = async (e) => {
                    if (!hasFiles(e)) return;
                    e.preventDefault();
                    depth = 0;
                    setDragOver(false);
                    const map = await readDroppedItems(e.dataTransfer);
                    guardedIngestRef.current(map);
                };
                window.addEventListener('dragenter', onEnter);
                window.addEventListener('dragover', onOver);
                window.addEventListener('dragleave', onLeave);
                window.addEventListener('drop', onDropAnywhere);
                return () => {
                    window.removeEventListener('dragenter', onEnter);
                    window.removeEventListener('dragover', onOver);
                    window.removeEventListener('dragleave', onLeave);
                    window.removeEventListener('drop', onDropAnywhere);
                };
            }, []);

            // Default document: fetched through the normal ingest() path so
            // the session behaves exactly as if the user dropped the file.
            // Skipped silently when offline or when the user was faster.
            React.useEffect(() => {
                setBusy(true);
                fetch(DEFAULT_GRAPH_URL)
                    .then((r) => {
                        if (!r.ok) throw new Error('HTTP ' + r.status);
                        return r.text();
                    })
                    .then((xml) => {
                        const hasSession = Object.keys(fileMapRef.current)
                            .some((k) => /\.mtlx$/i.test(k));
                        if (hasSession) return;
                        ingestRef.current({
                            'standard_surface_marble_solid.mtlx': new Blob([xml], { type: 'application/xml' }),
                        });
                    })
                    .catch(() => { setBusy(false); });
            }, []);

            const onPickFiles = (e) => {
                const map = {};
                for (const f of Array.from(e.target.files || [])) {
                    map[f.webkitRelativePath || f.name] = f;
                }
                e.target.value = '';
                guardedIngest(map);
            };

            // (Re)build the flow whenever the document or the scope changes.
            // Port-mode changes (per node or global) update nodes IN PLACE —
            // positions are preserved; the Arrange button re-lays out.
            React.useEffect(() => {
                if (!parsed) return;
                setSelectedId(null); // the old selection belongs to the old scope
            }, [parsed, scope]);
            // Where we came from: whether this rebuild is ENTERING or
            // LEAVING a nodegraph (a scope change within the same document)
            // rather than a new document load. With auto-layout ON, every
            // rebuild re-runs the layout; with it OFF nothing is rearranged
            // — a scope change just brings the kept layout into view.
            const lastScopeRef = React.useRef({ parsed: null, scope: '' });
            React.useEffect(() => {
                const cameFrom = lastScopeRef.current;
                lastScopeRef.current = { parsed, scope };
                if (!parsed) return;
                const switchedScope = cameFrom.parsed === parsed
                    && cameFrom.scope !== scope;
                try {
                    const { descs, edges } = buildScope(parsed, scope);
                    setFlow(toFlow(descs, edges, {
                        portMode: globalPortsRef.current,
                        onOpenScope: setScope,
                        onTogglePorts: (id) => togglePortsRef.current(id),
                    }));
                    setError(null);
                    // Queued after the setFlow above, so it acts on the flow
                    // we just built.
                    if (autoLayoutRef.current) reorganize();
                    else if (switchedScope) fitViewSoon({ padding: 0.15, duration: 350 });
                } catch (e) {
                    setFlow({ nodes: [], edges: [] });
                    setError(String(e && e.message || e));
                }
            }, [parsed, scope]);

            // Toggle ONE node between 'authored' and 'all' — in place, no
            // re-layout. Kept behind a ref so node data callbacks never go
            // stale.
            const togglePortsRef = React.useRef(() => {});
            togglePortsRef.current = (id) => {
                setFlow((prev) => ({
                    edges: prev.edges,
                    nodes: prev.nodes.map((n) => {
                        if (n.id !== id) return n;
                        const mode = n.data.portMode === 'all' ? 'authored' : 'all';
                        return Object.assign({}, n, {
                            data: Object.assign({}, n.data, {
                                portMode: mode,
                                inputs: visiblePortsFor(n.data.allInputs || [], mode),
                            }),
                        });
                    }),
                }));
                // The node's height changed — with auto-layout on, re-flow.
                if (autoLayoutRef.current) reorganize();
            };

            // Global set/all — applies to every node in place.
            const setAllPorts = (mode) => {
                setGlobalPorts(mode);
                setFlow((prev) => ({
                    edges: prev.edges,
                    nodes: prev.nodes.map((n) => Object.assign({}, n, {
                        data: Object.assign({}, n.data, {
                            portMode: mode,
                            inputs: visiblePortsFor(n.data.allInputs || [], mode),
                        }),
                    })),
                }));
                // Every node's height changed — with auto-layout on, re-flow.
                if (autoLayoutRef.current) reorganize();
            };

            // Re-run the automatic layout on the CURRENT node sizes (visible
            // rows) — for after nodes were expanded/collapsed or dragged.
            const reorganize = () => {
                setFlow((prev) => {
                    const descsLike = prev.nodes.map((n) => ({
                        id: n.id,
                        inputs: (n.data && n.data.inputs) || [],
                        outputs: (n.data && n.data.outputs) || [],
                        pos: null, // ignore stored editor positions: full re-layout
                    }));
                    const posOf = layoutScope(descsLike, prev.edges);
                    return {
                        edges: prev.edges,
                        nodes: prev.nodes.map((n) => Object.assign({}, n, { position: posOf[n.id] })),
                    };
                });
                // Glide the viewport to the fresh layout once it's applied.
                // fitView returns false while nodes have no measured size yet
                // — which is the case for a couple of frames right after a
                // scope change remounts the graph — so retry until it lands.
                fitViewSoon({ padding: 0.15, duration: 350 });
            };
            // Kept current every render so the [] -dep 'A' keydown handler
            // below never calls a stale closure (same trick as
            // openAddRef/deleteSelectionRef).
            const reorganizeRef = React.useRef(reorganize);
            reorganizeRef.current = reorganize;

            // A: re-run the automatic layout once (the old "Arrange" button,
            // now keyboard-only). Same focus rules as F/Tab.
            React.useEffect(() => {
                const onKey = (e) => {
                    if ((e.key !== 'a' && e.key !== 'A')
                        || e.shiftKey || e.ctrlKey || e.altKey || e.metaKey) return;
                    const t = e.target;
                    const tag = ((t && t.tagName) || '').toLowerCase();
                    if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
                    if (t && t.isContentEditable) return;
                    const inStage = t === document.body
                        || (panelRef.current && t instanceof Node && panelRef.current.contains(t));
                    if (!inStage) return;
                    e.preventDefault();
                    reorganizeRef.current();
                };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, []);

            // Best-effort native "leave site?" prompt for the actual tab/
            // window close — the browser owns the wording and there is no
            // way to run an async export or show custom buttons in response
            // to it. In-app actions (Import, drag-drop, switching documents)
            // get the full custom dialog instead — see confirmReplace above.
            React.useEffect(() => {
                const onBeforeUnload = (e) => {
                    if (!isDirty) return;
                    e.preventDefault();
                    e.returnValue = '';
                };
                window.addEventListener('beforeunload', onBeforeUnload);
                return () => window.removeEventListener('beforeunload', onBeforeUnload);
            }, [isDirty]);

            const fitViewSoon = (opts, tries = 40) => {
                const attempt = (left) => {
                    const inst = rfInstRef.current;
                    const ok = inst && typeof inst.fitView === 'function'
                        && inst.fitView(opts) !== false;
                    if (!ok && left > 0) requestAnimationFrame(() => attempt(left - 1));
                };
                requestAnimationFrame(() => attempt(tries));
            };

            const onNodeDoubleClick = (evt, node) => {
                if (node.data && node.data.kind === 'nodegraph') setScope(node.data.name);
            };

            // Select a node — parameter panel + selection ring — and, for the
            // panel's jump links, glide the viewport to it. Used by
            // programmatic jump-to-node call sites (no pointer event behind
            // them), so it forces exactly this one node selected — unlike
            // onNodeClick below, which lets React Flow's own click handling
            // (single-select on a plain click, toggle on Shift/Ctrl/Cmd)
            // own the .selected flags for real pointer clicks.
            const focusNode = (id, pan) => {
                setSelectedId(id);
                setSelectedEdgeId(null); // node and edge selection are exclusive
                setParamsOpen(true);
                // Real nodes, nodegraphs, and interface input/output
                // pseudo-nodes all become the remembered preview target —
                // buildPreviewRenderable knows how to tap an interface
                // input's literal value or an output's upstream source.
                if (id && (id.indexOf('n:') === 0 || id.indexOf('g:') === 0
                        || id.indexOf('i:') === 0 || id.indexOf('o:') === 0)) {
                    setPreviewSel((prev) =>
                        (prev && prev.id === id && prev.scope === scope) ? prev : { scope, id });
                }
                setFlow((prev) => ({
                    edges: prev.edges,
                    nodes: prev.nodes.map((n) =>
                        n.selected === (n.id === id) ? n : Object.assign({}, n, { selected: n.id === id })),
                }));
                if (pan) {
                    const inst = rfInstRef.current;
                    if (inst && typeof inst.fitView === 'function') {
                        inst.fitView({ nodes: [{ id }], duration: 400, padding: 0.4, maxZoom: 1.2 });
                    }
                }
            };

            // Click a node in the graph → React Flow's own click handling
            // has ALREADY updated .selected by the time this fires (plain
