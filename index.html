                                // Bridge the tapped output into a color3 emission.
                                const conv = doc.addNode('convert', 'preview_convert', 'color3');
                                connectToPreview(addTypedInput(conv, 'in', outType), 'preview_node');
                                createdNodes.push(conv);
                                srcName = 'preview_convert';
                            }
                            renderable = doc.addNode('surface_unlit', 'preview_surface', 'surfaceshader');
                            createdNodes.push(renderable);
                            // surface_unlit's `emission` port is a FLOAT weight
                            // (default 1.0); the color3 belongs on `emission_color`.
                            // Adding an `emission` input typed color3 mismatches
                            // the nodedef's declared float, so NO nodedef matches
                            // the node instance → "Could not find a nodedef for
                            // node 'preview_surface'" for every color-kind node.
                            addTypedInput(renderable, 'emission_color', 'color3').setNodeName(srcName);
                        } else {
                            const shown = (types || []).join(', ') || 'unknown';
                            const eN = new Error(`No preview for "${nodeName}" — it outputs ${shown}, which isn't a viewable color surface.`);
                            eN.isNotice = true; // informational, not a failure
                            throw eN;
                        }

                        // Every preview graph carries a material so the doc is
                        // directly renderable and exports as-is. (Translation
                        // previews created theirs above.)
                        if (kind !== 'translation') {
                            try {
                                const mat0 = doc.addNode('surfacematerial', 'preview_material', 'material');
                                addTypedInput(mat0, 'surfaceshader', 'surfaceshader').setNodeName('preview_surface');
                                createdNodes.push(mat0);
                            } catch (matErr) { /* export falls back to wrapper-less doc */ }
                        }

                        // Doc-based export source: the LIVE pre-generation
                        // document + the nodes we created. The export writes UI
                        // values into these and serializes the DOCUMENT — never
                        // the generated shader's uniform view.
                        exportDocRef.current = {
                            mx, doc,
                            instance: previewInstance,
                            created: createdNodes,
                            // Closure keeps doc/nodedef context alive for export.
                            ensureInput: (n2, t2) => ensureTypedInput(previewInstance, n2, t2),
                        };

                        // Before generating: dump the constructed graph and run
                        // validate(), so graph-construction mistakes (bad convert
                        // wiring, multi-output taps, missing defaults) surface
                        // with a document-level message instead of only a deep
                        // generation failure.
                        if (DEBUG_SHADERS && typeof mx.writeToXmlString === 'function') {
                            try {
                                console.log(`MTLX preview graph for "${nodeName}":\n` + mx.writeToXmlString(doc));
                            } catch (xmlErr) {
                                console.warn('writeToXmlString failed:', mxErr(mx, xmlErr));
                            }
                        }
                        if (typeof doc.validate === 'function') {
                            try {
                                if (!doc.validate()) {
                                    console.warn(`MaterialX document failed validate() for "${nodeName}" — generation will likely fail.`);
                                }
                            } catch (vErr) {
                                console.warn('doc.validate() threw:', mxErr(mx, vErr));
                            }
                        }

                        // Generate the shader from the renderable surface node.
                        // OFFICIAL PARITY: per-material generation options.
                        // Transparency detection switches the generated blending
                        // path (glass etc.); COMPLETE interface exposes every
                        // input as a uniform for the editor.
                        try {
                            if (typeof mx.isTransparentSurface === 'function') {
                                genContext.getOptions().hwTransparency =
                                    mx.isTransparentSurface(renderable, gen.getTarget());
                            }
                        } catch (e) { /* keep previous value */ }
                        try {
                            if (mx.ShaderInterfaceType) {
                                genContext.getOptions().shaderInterfaceType =
                                    mx.ShaderInterfaceType.SHADER_INTERFACE_COMPLETE;
                            }
                        } catch (e) { /* default interface */ }

                        let mxShader;
                        try {
                            mxShader = gen.generate('PreviewShader', renderable, genContext);
                        } catch (genErr) {
                            // Decode the REAL MaterialX error (Emscripten throws
                            // numeric pointers) instead of a generic string.
                            throw new Error(`Shader generation failed for "${nodeName}": ${mxErr(mx, genErr)}`);
                        }

                        // Stage identifiers: some JS builds don't expose the
                        // mx.Stage enum object (hence "Cannot read ... 'VERTEX'").
                        // The underlying constant values are just the strings
                        // "vertex" and "pixel", which getSourceCode accepts.
                        const VERTEX_STAGE = (mx.Stage && mx.Stage.VERTEX) || 'vertex';
                        const PIXEL_STAGE = (mx.Stage && mx.Stage.PIXEL) || 'pixel';
                        const vs = stripVersion(mxShader.getSourceCode(VERTEX_STAGE));
                        // hwSrgbEncodeOutput makes MaterialX emit its own sRGB
                        // encode (visible as srgb-named code in the source). Only
                        // inject our fallback when the option didn't take in this
                        // wasm build — double-encoding would wash everything out.
                        let fs = stripVersion(mxShader.getSourceCode(PIXEL_STAGE));
                        if (!/srgb/i.test(fs)) fs = encodeDisplay(fs);
                        else if (DEBUG_SHADERS) console.log('generator emitted sRGB encode (hwSrgbEncodeOutput) — no injection');

                        // --- three.js scene (WebGL2) ---
                        let canvas = canvasRef.current;
                        if (!canvas) {
                            // A message row from the PREVIOUS node may still be
                            // committed; give React one frame to remount/reveal
                            // the canvas, then re-read.
                            await new Promise((r) => requestAnimationFrame(r));
                            canvas = canvasRef.current;
                            if (!canvas || !mounted) return;
                        }
                        // clientWidth can be 0 before layout; fall back so the
                        // viewport isn't 0×0 (which renders nothing → black).
                        const cw = canvas.clientWidth || (canvas.parentElement && canvas.parentElement.clientWidth) || 400;
                        const ch = canvas.clientHeight || 256;
                        renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
                        renderer.setSize(cw, ch, false);
                        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                        renderer.debug.checkShaderErrors = true;
                        // NOTE: outputEncoding/toneMapping are NO-OPS for
                        // RawShaderMaterial (built-in-material shader chunks).
                        // The actual display transform is injected into the
                        // generated pixel shader by encodeDisplay() above.
                        if ('outputEncoding' in renderer) renderer.outputEncoding = THREE.sRGBEncoding;
                        renderer.toneMapping = THREE.ACESFilmicToneMapping;
                        renderer.toneMappingExposure = 1.0;

                        const scene = new THREE.Scene();
                        const camera = new THREE.PerspectiveCamera(45, cw / ch, 0.1, 100);
                        // Was z=2.6 — too tight on a radius-1 shape. Slightly
                        // elevated three-quarter framing with breathing room.
                        camera.position.set(0, 0.5, 3.6);

                        // Orbit + zoom + auto-rotate. Rotating the CAMERA (not
                        // the mesh) lets manual orbiting, zooming, and the
                        // pause button all compose naturally.
                        let controls = null;
                        if (THREE.OrbitControls) {
                            controls = new THREE.OrbitControls(camera, canvas);
                            controls.enableDamping = true;
                            controls.dampingFactor = 0.08;
                            controls.enablePan = false;
                            controls.minDistance = 1.4;
                            controls.maxDistance = 9;
                            controls.autoRotate = !paused;
                            controls.autoRotateSpeed = 1.5;
                            controlsRef.current = controls;
                        }

                        // Keep the drawing buffer + aspect in sync with layout:
                        // the params panel appears after init (flex reflow), and
                        // mobile rotation/resizes change the canvas CSS size.
                        // Without this the sphere stretches on any reflow.
                        const syncSize = () => {
                            const w = canvas.clientWidth || cw;
                            const h = canvas.clientHeight || ch;
                            renderer.setSize(w, h, false);
                            camera.aspect = w / h;
                            camera.updateProjectionMatrix();
                        };
                        if (window.ResizeObserver) {
                            resizeObs = new ResizeObserver(syncSize);
                            resizeObs.observe(canvas);
                        }

                        // MaterialX-generated shaders expect their own attribute
                        // names (i_position, i_normal, i_texcoord_0, i_tangent)
                        // and transform uniforms (u_*), so we use RawShaderMaterial
                        // (no three.js built-in injection) and feed both manually.
                        const uniforms = {
                            u_worldMatrix: { value: new THREE.Matrix4() },
                            u_viewProjectionMatrix: { value: new THREE.Matrix4() },
                            u_worldInverseTransposeMatrix: { value: new THREE.Matrix4() },
                            u_viewPosition: { value: new THREE.Vector3() },
                        };

                        // --- Upload MaterialX's uniform DEFAULTS (introspection) ---
                        // GLSL ES 3.0 forbids `uniform float x = 1.0;` initializers,
                        // so the generated ESSL declares bare uniforms and expects
                        // the app to upload each default from the shader's uniform
                        // blocks. In WebGL an UNSET uniform reads as 0 — so
                        // surface_unlit's unconnected `emission` WEIGHT (default
                        // 1.0) was 0, multiplying every unlit preview to black,
                        // and every PBR weight/color default was 0 too, blacking
                        // out lit nodes. Mirrors the official viewer (§7.1).
                        let introspected = [];
                        for (const stageName of [VERTEX_STAGE, PIXEL_STAGE]) {
                            let st = null;
                            try { st = mxShader.getStage(stageName); } catch (e) { /* stage absent */ }
                            if (st) introspected = introspected.concat(collectMxUniforms(st));
                        }
                        for (const u of introspected) {
                            if (uniforms[u.name] || u.data == null) continue; // explicit bindings win; no default → leave for WebGL 0
                            const tu = mxValueToThreeUniform(u.type, u.data);
                            if (tu) uniforms[u.name] = tu;
                        }
                        // Bind the default checker to every `filename` sampler
                        // so image/tiledimage nodes render out of the box —
                        // an unbound sampler reads black. (Env samplers are
                        // bound later by name and are not `filename` ports.)
                        for (const u of introspected) {
                            if (u.type === 'filename' && !uniforms[u.name]) {
                                uniforms[u.name] = { value: getDefaultTexture() };
                            }
                        }
                        if (DEBUG_SHADERS) {
                            console.log('introspected uniforms:',
                                introspected.map((u) => `${u.type} ${u.name}${u.data != null ? ' (default uploaded)' : ''}`));
                            if (!introspected.length) {
                                console.warn('Shader introspection found NO uniform blocks — defaults not uploaded; expect black. (Binding API mismatch — report the mxShader/stage method names.)');
                            }
                        }

                        // ---- Dynamic parameter UI ----
                        // The panel is built from the NODE'S OWN nodedef inputs
                        // (the authoritative list), NOT from shader uniforms —
                        // string inputs (e.g. `space`) never become GLSL uniforms,
                        // so a uniform-driven panel drops them and leaks the
                        // wrapper's (surface_unlit) inputs instead. For each input
                        // we attach the matching live uniform when one exists
                        // (numeric/vector/color/bool/filename → edit in place); a
                        // string/enum input has no uniform, so editing it
                        // regenerates the shader (see `overrides`).
                        const targetNode = (kind === 'color' || kind === 'translation') ? 'preview_node'
                            : (kind === 'bsdf' ? 'preview_bsdf' : 'preview_surface');

                        // Map introspected public uniforms back to input names,
                        // for live editing. Match by the element path's LAST
                        // segment (the input name) or the u_-stripped uniform
                        // name — leniently, because we only ever CONSUME a match
                        // for an input name that belongs to the previewed node's
                        // own nodedef, so wrapper uniforms can't leak in. (The
                        // earlier strict "path must start with preview_surface"
                        // test failed for many surface shaders, wrongly routing
                        // every numeric edit through shader regeneration → the
                        // "Could not find a nodedef for node 'preview_surface'"
                        // error when an override was applied to the instance.)
                        const uniformByInput = {};
                        for (const u of introspected) {
                            if (!uniforms[u.name]) continue;
                            const pathStr = u.path || '';
                            let inName;
                            if (pathStr) {
                                inName = pathStr.split('/').pop();
                            } else {
                                const stripped = u.name.replace(/^u_/, '');
                                inName = stripped.indexOf(targetNode + '_') === 0
                                    ? stripped.slice(targetNode.length + 1) : stripped;
                            }
                            if (!inName) continue;
                            const underTarget = pathStr === targetNode || pathStr.indexOf(targetNode + '/') === 0;
                            if (!uniformByInput[inName] || underTarget) uniformByInput[inName] = u;
                        }

                        const firstNum = (...cands) => {
                            for (const c of cands) {
                                if (c == null) continue;
                                const n = parseFloat(c);
                                if (!isNaN(n)) return n;
                            }
                            return null;
                        };
                        const threeToPlain = (type, val) => {
                            switch (type) {
                                case 'float': case 'integer': return Number(val);
                                case 'boolean': return !!val;
                                case 'vector2': return [val.x, val.y];
                                case 'color3': case 'vector3': return [val.x, val.y, val.z];
                                case 'color4': case 'vector4': return [val.x, val.y, val.z, val.w];
                                default: return null;
                            }
                        };
                        // Parse a MaterialX value string into a plain JS value by
                        // type. Returns undefined when it isn't parseable as that
                        // type (e.g. a geometric stream name like "Vworld").
                        const NCOMP = { vector2: 2, vector3: 3, color3: 3, vector4: 4, color4: 4 };
                        const parseDefault = (type, s) => {
                            if (s == null || s === '') return undefined;
                            if (type === 'float') { const n = parseFloat(s); return isNaN(n) ? undefined : n; }
                            if (type === 'integer') { const n = parseInt(s, 10); return isNaN(n) ? undefined : n; }
                            if (type === 'boolean') return /^true$/i.test(s.trim());
                            if (type === 'string' || type === 'filename') return s;
                            if (NCOMP[type]) {
                                const parts = s.split(',').map((x) => parseFloat(x.trim()));
                                if (parts.length !== NCOMP[type] || parts.some(isNaN)) return undefined;
                                return parts;
                            }
                            return undefined;
                        };

                        const LIVE_TYPES = ['float', 'integer', 'boolean', 'vector2', 'vector3', 'vector4', 'color3', 'color4', 'filename'];
                        const attrOf = (inp, a) => { try { const s2 = inp.getAttribute(a); return s2 || null; } catch (e) { return null; } };

                        const buildInputParam = (inp) => {
                            const inputName = inp.getName();
                            const type = inp.getType();
                            const label = attrOf(inp, 'uiname') || inputName;
                            let valueStr = null;
                            try { valueStr = inp.getValueString ? inp.getValueString() : null; } catch (e) { /* none */ }
                            const enumAttr = attrOf(inp, 'enum');
                            const enumValsAttr = attrOf(inp, 'enumvalues');
                            const u = uniformByInput[inputName];

                            // STRING — a fixed set of accepted values → dropdown;
                            // otherwise a free-text field. Both regenerate.
                            if (type === 'string') {
                                const options = enumAttr ? enumAttr.split(',').map((e2) => e2.trim()).filter(Boolean) : null;
                                const def = (valueStr != null ? valueStr : (options && options[0])) || '';
                                return { uniform: 'in::' + inputName, input: inputName, label, type: 'string',
                                    def, options, regen: true, live: false };
                            }

                            // FILENAME — needs a live sampler uniform to preview.
                            if (type === 'filename') {
                                if (!u || !uniforms[u.name]) return null;
                                return { uniform: u.name, input: inputName, label, type: 'filename', def: null,
                                    colorspace: attrOf(inp, 'colorspace'), live: true };
                            }

                            // NUMERIC / VECTOR / COLOR / BOOLEAN.
                            if (LIVE_TYPES.indexOf(type) === -1) return null;
                            // Numeric enum (name→value) → existing select control.
                            let enumNames = null, enumValues = null;
                            if (enumAttr && (type === 'integer' || type === 'float')) {
                                enumNames = enumAttr.split(',').map((e2) => e2.trim()).filter(Boolean);
                                if (enumValsAttr) enumValues = enumValsAttr.split(',').map((e2) => parseFloat(e2));
                            }
                            let min = firstNum(attrOf(inp, 'uisoftmin'), attrOf(inp, 'uimin'));
                            let max = firstNum(attrOf(inp, 'uisoftmax'), attrOf(inp, 'uimax'));

                            if (u && uniforms[u.name]) {
                                // Live: default comes from the actual uniform value.
                                const def = threeToPlain(type, uniforms[u.name].value);
                                if (def == null || (typeof def === 'number' && isNaN(def))) return null;
                                if (type === 'float' || type === 'integer') {
                                    if (min == null) min = Math.min(0, def);
                                    if (max == null) max = Math.max(1, Math.abs(def) * 2);
                                    if (max <= min) max = min + 1;
                                }
                                return { uniform: u.name, input: inputName, label, type, def, min, max,
                                    enumNames, enumValues, live: true };
                            }

                            // No uniform (e.g. an input with a geometric default
                            // like Vworld/Nworld, or one not exposed as a uniform).
                            // Show it read-only rather than editing it via a
                            // shader regeneration that can invalidate the node —
                            // only string/enum inputs (which have no uniform by
                            // nature) take the regen path.
                            const parsed = parseDefault(type, valueStr);
                            return { uniform: 'in::' + inputName, input: inputName, label, type,
                                def: parsed === undefined ? (valueStr || '(geometry)') : parsed,
                                readonly: true, live: false };
                        };

                        // Enumerate the node's inputs. Prefer the nodedef whose
                        // output type matches the previewed one (overloaded nodes
                        // like `mix` differ per signature); dedup by input name.
                        const preferType = kind === 'color' ? (multiOutput ? null : outType)
                            : (kind === 'bsdf' ? 'BSDF' : 'surfaceshader');
                        const defsAll = vecToArray(doc.getMatchingNodeDefs(nodeName));
                        defsAll.sort((a, b) => {
                            const am = (a.getType && a.getType() === preferType) ? 0 : 1;
                            const bm = (b.getType && b.getType() === preferType) ? 0 : 1;
                            return am - bm;
                        });
                        let uiParams = [];
                        const seenInput = new Set();
                        try {
                            for (const def of defsAll) {
                                const inputs = vecToArray(def.getActiveInputs ? def.getActiveInputs()
                                    : (def.getInputs ? def.getInputs() : null));
                                for (const inp of inputs) {
                                    const nm = inp.getName();
                                    if (seenInput.has(nm)) continue;
                                    seenInput.add(nm);
                                    const p = buildInputParam(inp);
                                    if (p) uiParams.push(p);
                                }
                            }
                        } catch (inputErr) {
                            if (DEBUG_SHADERS) console.warn('nodedef input enumeration failed:', mxErr(mx, inputErr));
                        }

                        uniformsRef.current = uniforms;
                        if (mounted) {
                            setParams(uiParams);
                            const initVals = {};
                            for (const p of uiParams) {
                                if (p.readonly) continue;
                                initVals[p.uniform] = Array.isArray(p.def) ? p.def.slice() : p.def;
                            }
                            if (sameNode) {
                                // Re-apply preserved edits: values back onto the
                                // fresh uniforms, picked textures back onto their
                                // samplers, colorspace selections back into view.
                                for (const p of uiParams) {
                                    if (p.readonly) continue;
                                    if (p.type === 'filename') {
                                        const t = pickedTexRef.current[p.uniform];
                                        if (t && uniforms[p.uniform]) uniforms[p.uniform].value = t;
                                        const nm2 = valuesRef.current[p.uniform];
                                        if (nm2 !== undefined) initVals[p.uniform] = nm2;
                                        continue;
                                    }
                                    const pv = valuesRef.current[p.uniform];
                                    if (pv === undefined) continue;
                                    initVals[p.uniform] = Array.isArray(pv) ? pv.slice() : pv;
                                    if (p.live) setUniformFromPlain(p, pv);
                                }
                                for (const k of Object.keys(valuesRef.current)) {
                                    if (k.indexOf('cs::') === 0) initVals[k] = valuesRef.current[k];
                                }
                            }
                            valuesRef.current = initVals;
                            setValues(initVals);
                        }
                        if (DEBUG_SHADERS) console.log('UI params:', uiParams.map((p) => `${p.type} ${p.input}${p.live ? '' : p.readonly ? ' (read-only)' : ' (regen)'}`));

                        // Discover what the generated shader actually declares,
                        // so we bind by real names rather than assumptions.
                        const declared = parseUniforms(fs).concat(parseUniforms(vs));
                        const declaredNames = new Set(declared.map((u) => u.name));
                        const has = (n) => declaredNames.has(n);
                        // Find a declared sampler whose name matches a pattern.
                        const findSampler = (re) =>
                            declared.find((u) => /sampler/i.test(u.type) && re.test(u.name));

                        if (DEBUG_SHADERS) {
                            console.group(`MaterialX preview: ${nodeName}`);
                            console.log('kind:', kind, 'needsLighting:', needsLighting);
                            console.log('declared uniforms:', declared.map((u) => `${u.type} ${u.name}`));
                            console.log('VERTEX SHADER\n', vs);
                            console.log('PIXEL SHADER\n', fs);
                            console.groupEnd();
                        }

                        // Image-based lighting for lit surfaces/BSDFs. Bind the
                        // env textures to whatever sampler names the shader really
                        // uses (u_envRadiance / u_envIrradiance in current builds,
                        // but matched loosely so version drift doesn't leave them
                        // unbound → black).
                        if (needsLighting) {
                            const env = await getEnvironment();
                            if (!mounted) return;
                            let radiance, irradiance, mips;
                            if (env) {
                                radiance = env.radiance; irradiance = env.irradiance; mips = env.mips;
                            } else {
                                radiance = makeEnvTexture(256, 128, false);
                                irradiance = makeEnvTexture(64, 32, true);
                                mips = Math.floor(Math.log2(256)) + 1;
                            }
                            const radSampler = findSampler(/radiance|specular|prefilter/i);
                            const irrSampler = findSampler(/irradiance|diffuse/i);
                            if (radSampler) uniforms[radSampler.name] = { value: radiance };
                            if (irrSampler) uniforms[irrSampler.name] = { value: irradiance };
                            // OFFICIAL PARITY: env matrix is ALWAYS a +90° Y
                            // rotation (getLightRotation in main.js) — identity
                            // orients the environment differently from the
                            // reference render.
                            if (has('u_envMatrix')) uniforms.u_envMatrix = { value: new THREE.Matrix4().makeRotationY(Math.PI / 2) };
                            if (has('u_envRadianceMips')) uniforms.u_envRadianceMips = { value: mips };
                            if (has('u_envRadianceSamples')) uniforms.u_envRadianceSamples = { value: 16 };
                            if (has('u_envLightIntensity') && !uniforms.u_envLightIntensity) uniforms.u_envLightIntensity = { value: 1.0 };
                            if (has('u_refractionEnv')) uniforms.u_refractionEnv = { value: true };
                            // Direct light rig (struct-array uniform; three maps
                            // {type,direction,color,intensity} onto the generated
                            // LightData struct members by name).
                            const nLights = (lightData && lightData.length) || 0;
                            if (has('u_numActiveLightSources')) uniforms.u_numActiveLightSources = { value: nLights };
                            if (nLights && has('u_lightData')) uniforms.u_lightData = { value: lightData };
                            if (DEBUG_SHADERS) {
                                console.log('env bound → radiance:', radSampler && radSampler.name,
                                            '| irradiance:', irrSampler && irrSampler.name,
                                            env ? (env.prefilteredIrr ? '(radiance + prefiltered irradiance files)' : '(radiance file; irradiance downsampled — drop ./irradiance.hdr for official parity)') : '(synthesized)',
                                            '| direct lights:', (lightData && lightData.length) || 0);
                                const envUnbound = declared.filter((u) => /sampler/i.test(u.type) && /env/i.test(u.name) && !uniforms[u.name]);
                                if (envUnbound.length) console.warn('UNBOUND env samplers (likely cause of black):', envUnbound.map((u) => u.name));
                            }
                        }

                        const material = new THREE.RawShaderMaterial({
                            vertexShader: vs,
                            fragmentShader: fs,
                            glslVersion: THREE.GLSL3,
                            uniforms,
                            side: THREE.DoubleSide,
                        });

                        // Selected preview geometry (sphere/cube/shaderball),
                        // attributes aliased to MaterialX names + tangents.
                        const geometry = prepGeometry(await buildPreviewGeometry(geom));
                        if (!mounted) return;

                        const mesh = new THREE.Mesh(geometry, material);
                        scene.add(mesh);

                        const vp = new THREE.Matrix4();
                        const setUniforms = () => {
                            mesh.updateMatrixWorld();
                            camera.updateMatrixWorld();
                            camera.matrixWorldInverse.copy(camera.matrixWorld).invert();
                            uniforms.u_worldMatrix.value.copy(mesh.matrixWorld);
                            vp.multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);
                            uniforms.u_viewProjectionMatrix.value.copy(vp);
                            uniforms.u_worldInverseTransposeMatrix.value
                                .copy(mesh.matrixWorld).invert().transpose();
                            camera.getWorldPosition(uniforms.u_viewPosition.value);
                        };

                        // Compile now and surface any GLSL error to the UI instead
                        // of failing to a silent black canvas.
                        setUniforms();
                        renderer.compile(scene, camera);
                        const badProg = (renderer.info.programs || []).find(
                            (p) => p.diagnostics && p.diagnostics.runnable === false
                        );
                        if (badProg) {
                            const d = badProg.diagnostics;
                            const log = (d.programLog || '') + '\n' +
                                (d.fragmentShader && d.fragmentShader.log ? 'FRAG: ' + d.fragmentShader.log : '') +
                                (d.vertexShader && d.vertexShader.log ? ' VERT: ' + d.vertexShader.log : '');
                            console.error('MaterialX shader compile error:', log);
                            throw new Error(`Shader compile error for "${nodeName}". See console. ${log.slice(0, 160)}`);
                        }

                        setLoading(false);

                        const animate = () => {
                            if (!mounted) return;
                            reqId = requestAnimationFrame(animate);
                            if (controls) {
                                controls.update(); // damping + autoRotate
                            } else {
                                // OrbitControls script blocked → old behavior.
                                mesh.rotation.y += 0.005;
                            }
                            setUniforms();
                            renderer.render(scene, camera);
                        };
                        animate();

                    } catch (err) {
                        if (err && err.isNotice) {
                            if (mounted) {
                                setNotice(err.message);
                                setLoading(false);
                            }
                            return;
                        }
                        const msg = mxErr(mxRef, err);
                        console.error('MaterialX Preview Error:', msg, err);
                        if (mounted) {
                            setError(msg);
                            setLoading(false);
                        }
                    }
                };

                initViewer();

                return () => {
                    mounted = false;
                    if (reqId) cancelAnimationFrame(reqId);
                    if (resizeObs) resizeObs.disconnect();
                    if (controlsRef.current) { controlsRef.current.dispose(); controlsRef.current = null; }
                    if (renderer) renderer.dispose();
                };
            }, [nodeName, enabled, geom, overrides]);

            // Disabled state: cheap placeholder instead of the canvas/panel.
            if (enabled === false) {
                return (
                    <div className="flex items-center justify-between gap-3 bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 my-6 text-sm text-gray-400">
                        <span>3D previews are disabled (global setting).</span>
                        {onEnable && (
                            <button
                                onClick={onEnable}
                                className="text-xs px-2 py-1 rounded bg-gray-700 hover:bg-gray-600 text-gray-200 transition-colors flex-none"
                            >
                                Enable previews
                            </button>
                        )}
                    </div>
                );
            }

            // Render one control per parameter, by MaterialX type:
            // enum → select; boolean → checkbox; float/integer → slider +
            // number field; color3/4 → color picker (+ alpha slider);
            // vector2/3/4 → per-component number fields.
            const renderControl = (p) => {
                const cur = values[p.uniform] !== undefined ? values[p.uniform] : p.def;
                const numCls = 'w-16 bg-gray-800 border border-gray-600 rounded px-1 py-0.5 text-xs text-gray-200';
                // Read-only input (e.g. a geometric default like Vworld) — shown
                // so the input isn't "missing", but not editable.
                if (p.readonly) {
                    return <span className="text-xs text-gray-500 italic font-mono">{String(cur)}</span>;
                }
                // String with a fixed set of accepted values → dropdown. The
                // value IS the selected string (unlike numeric enums below).
                if (p.type === 'string' && p.options && p.options.length) {
                    return (
                        <select
                            className="w-full bg-gray-800 border border-gray-600 rounded px-1 py-1 text-xs text-gray-200"
                            value={String(cur)}
                            onChange={(e) => onParamChange(p, e.target.value)}
                        >
                            {p.options.map((opt) => <option key={opt} value={opt}>{opt}</option>)}
                        </select>
                    );
                }
                // Free-form string → text field (regenerates on change).
                if (p.type === 'string') {
                    return (
                        <input
                            type="text"
                            className="w-full bg-gray-800 border border-gray-600 rounded px-2 py-1 text-xs text-gray-200"
                            value={String(cur)}
                            onChange={(e) => onParamChange(p, e.target.value)}
                        />
                    );
                }
                if (p.enumNames && p.enumNames.length && (p.type === 'integer' || p.type === 'float')) {
                    const valOf = (i) => (p.enumValues && p.enumValues.length === p.enumNames.length ? p.enumValues[i] : i);
                    let selIdx = 0;
                    for (let i = 0; i < p.enumNames.length; i++) {
                        if (valOf(i) === Number(cur)) { selIdx = i; break; }
                    }
                    return (
                        <select
                            className="w-full bg-gray-800 border border-gray-600 rounded px-1 py-1 text-xs text-gray-200"
                            value={selIdx}
                            onChange={(e) => onParamChange(p, valOf(parseInt(e.target.value, 10)))}
                        >
                            {p.enumNames.map((nm, i) => <option key={i} value={i}>{nm}</option>)}
                        </select>
                    );
                }
                if (p.type === 'filename') {
                    const csVal = values['cs::' + p.input] || '';
                    return (
                        <div className="space-y-1">
                            <div className="flex items-center gap-2">
                                <label className="text-xs px-2 py-1 rounded bg-gray-700 hover:bg-gray-600 text-gray-200 cursor-pointer flex-none">
                                    Choose image…
                                    <input
                                        type="file" accept="image/png,image/jpeg,image/webp,image/gif"
                                        className="hidden"
                                        onChange={(e) => {
                                            onFilePick(p, e.target.files && e.target.files[0]);
                                            // Clear so choosing the SAME file later
                                            // still fires change (a value-unchanged
                                            // pick emits no event).
                                            e.target.value = '';
                                        }}
                                    />
                                </label>
                                <span className="text-xs text-gray-400 truncate min-w-0">
                                    {cur || 'default checker'}
                                </span>
                            </div>
                            {/* Colorspace: a codegen decision (CMS transform baked
                                into the shader), so picking one regenerates. */}
                            <div className="flex items-center gap-2">
                                <span className="text-[10px] text-gray-500 flex-none">colorspace</span>
                                <select
                                    className="flex-1 min-w-0 bg-gray-800 border border-gray-600 rounded px-1 py-0.5 text-[11px] text-gray-200"
                                    value={csVal}
                                    onChange={(e) => onColorspacePick(p, e.target.value)}
                                >
                                    <option value="">{'(nodedef default' + (p.colorspace ? ': ' + p.colorspace : '') + ')'}</option>
                                    {COLORSPACES.map((cs) => <option key={cs} value={cs}>{cs}</option>)}
                                </select>
                            </div>
                        </div>
                    );
                }
                if (p.type === 'boolean') {
                    return (
                        <input
                            type="checkbox"
                            className="h-4 w-4 accent-blue-500"
                            checked={!!cur}
                            onChange={(e) => onParamChange(p, e.target.checked)}
                        />
                    );
                }
                if (p.type === 'float' || p.type === 'integer') {
                    const step = p.type === 'integer' ? 1 : Math.max((p.max - p.min) / 200, 0.001);
                    const parse = (s) => (p.type === 'integer' ? parseInt(s, 10) : parseFloat(s));
                    return (
                        <div className="flex items-center gap-2">
                            <input
                                type="range" className="flex-1 accent-blue-500 min-w-0"
                                min={p.min} max={p.max} step={step} value={Number(cur)}
                                onChange={(e) => onParamChange(p, parse(e.target.value))}
                            />
                            <input
                                type="number" className={numCls} step={step} value={Number(cur)}
                                onChange={(e) => {
                                    const n = parse(e.target.value);
                                    if (!isNaN(n)) onParamChange(p, n);
                                }}
                                onBlur={(e) => { e.target.value = String(Number(cur)); }}
                            />
                        </div>
                    );
                }
                if (p.type === 'color3' || p.type === 'color4') {
                    const rgb = cur.slice(0, 3);
                    return (
                        <div className="flex items-center gap-2">
                            <input
                                type="color"
                                className="h-7 w-10 bg-transparent border border-gray-600 rounded cursor-pointer"
                                value={rgbToHex(rgb)}
                                onChange={(e) => {
                                    const nv = hexToRgb(e.target.value);
                                    onParamChange(p, p.type === 'color4' ? nv.concat([cur[3]]) : nv);
                                }}
                            />
                            {p.type === 'color4' && (
                                <input
                                    type="range" className="flex-1 accent-blue-500 min-w-0"
                                    min="0" max="1" step="0.01" value={cur[3]}
                                    title="alpha"
                                    onChange={(e) => onParamChange(p, rgb.concat([parseFloat(e.target.value)]))}
                                />
                            )}
                        </div>
                    );
                }
                // vector2 / vector3 / vector4
                return (
                    <div className="flex gap-1">
                        {cur.map((c, i) => (
                            <input
                                key={i} type="number" step="0.01"
                                className="w-full min-w-0 bg-gray-800 border border-gray-600 rounded px-1 py-0.5 text-xs text-gray-200"
                                value={c}
                                onChange={(e) => {
                                    const n = parseFloat(e.target.value);
                                    if (isNaN(n)) return;
                                    const nv = cur.slice(); nv[i] = n;
                                    onParamChange(p, nv);
                                }}
                                onBlur={(e) => { e.target.value = String(cur[i]); }}
                            />
                        ))}
                    </div>
                );
            };

            // Desktop (lg+): panel sits to the RIGHT of the preview.
            // Mobile: flex-col stacks it BELOW.
            // Notice/error render as a slim row; the viewport layout is then
            // HIDDEN (not unmounted — the canvas ref must survive).
            const suppressed = !!(notice || error);
            return (
                <div className="my-6">
                {notice && (
                    <div className="text-sm text-gray-400 bg-gray-900 border border-gray-700 rounded-lg px-4 py-3">
                        {notice}
                    </div>
                )}
                {!notice && error && (
                    <div className="text-sm text-amber-500/90 bg-gray-900 border border-amber-700/40 rounded-lg px-4 py-3">
                        {error}
                    </div>
                )}
                <div className={'flex flex-col lg:flex-row gap-4' + (suppressed ? ' hidden' : '')}>
                    <div className="relative w-full lg:flex-1 lg:min-w-0 h-64 sm:h-80 bg-gray-900 border border-gray-700 rounded-lg overflow-hidden">
                        {loading && (
                            <div className="absolute inset-0 flex items-center justify-center text-gray-400 z-10 bg-gray-900/80">
                                <span className="animate-pulse">Generating 3D Preview...</span>
                            </div>
                        )}
                        {/* Viewport controls: geometry picker + rotation pause.
                            Drag orbits, wheel/pinch zooms (OrbitControls). */}
                        {(
                            <div className="absolute top-2 right-2 z-20 flex items-center gap-1">
                                {['sphere', 'cube', 'shaderball'].map((g) => (
                                    <button
                                        key={g}
                                        onClick={() => pickGeom(g)}
                                        title={'Preview on ' + g}
                                        className={`text-[11px] px-2 py-1 rounded border transition-colors ${
                                            geom === g
                                                ? 'bg-blue-600/80 border-blue-500 text-white'
                                                : 'bg-gray-800/80 border-gray-600 text-gray-300 hover:bg-gray-700/80'
                                        }`}
                                    >
                                        {g}
                                    </button>
                                ))}
                                <button
                                    onClick={togglePaused}
                                    title={paused ? 'Resume auto-rotation' : 'Pause auto-rotation (drag to orbit, wheel to zoom)'}
                                    className="text-[11px] px-2 py-1 rounded border bg-gray-800/80 border-gray-600 text-gray-300 hover:bg-gray-700/80 transition-colors"
                                >
                                    {paused ? '\u{25B6}\u{FE0E}' : '\u{23F8}\u{FE0E}'}
                                </button>
                            </div>
                        )}
                        <canvas ref={canvasRef} className="w-full h-full block cursor-grab active:cursor-grabbing" />
                    </div>
                    {params.length > 0 && (
                        <div className="w-full lg:w-80 lg:flex-none bg-gray-900 border border-gray-700 rounded-lg flex flex-col max-h-80 lg:h-80 lg:max-h-none">
                            <div className="flex items-center justify-between px-3 py-2 border-b border-gray-700 flex-none">
                                <span className="text-sm font-semibold text-gray-200">Parameters</span>
                                <div className="flex items-center gap-1.5">
                                    <button
                                        onClick={onExportMtlx}
                                        title="Download this node with the current values as a .mtlx document"
                                        className="text-xs px-2 py-1 rounded bg-gray-700 hover:bg-gray-600 text-gray-200 transition-colors"
                                    >
                                        Export .mtlx
                                    </button>
                                    <button
                                        onClick={onResetDefaults}
                                        className="text-xs px-2 py-1 rounded bg-gray-700 hover:bg-gray-600 text-gray-200 transition-colors"
                                    >
                                        Reset to default
                                    </button>
                                </div>
                            </div>
                            <div className="overflow-y-auto p-3 space-y-3 flex-1">
                                {params.map((p) => (
                                    // Key includes nodeName: different nodes often
                                    // expose SAME-named inputs (image/hextiledimage
                                    // both have `file`), and a reused DOM file
                                    // input still holding the old File emits no
                                    // change event when the same file is re-picked.
                                    <div key={nodeName + ':' + p.uniform + ':' + resetNonce}>
                                        <label className="block text-xs text-gray-400 mb-1">
                                            {p.label} <span className="text-gray-600">({p.type})</span>
                                        </label>
                                        {renderControl(p)}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
                </div>
            );
        };

        // Auto-generated port table for nodes with no spec documentation:
        // reads inputs/outputs (name, type, default, enum) directly from the
        // node's nodedefs in the loaded standard library. Clearly disclaimed
        // as machine-generated, since it is NOT part of the official docs.
        const NodeDefPortsTable = ({ nodeName }) => {
            const [rows, setRows] = React.useState(null); // null = loading
            React.useEffect(() => {
                let alive = true;
                setRows(null);
                getMxEnv().then(({ stdlib }) => {
                    if (!alive) return;
                    const byName = {};
                    const order = [];
                    const record = (el, kindLabel) => {
                        const nm = el.getName();
                        const key = kindLabel + ':' + nm;
                        let ty = '';
                        try { const t = el.getType && el.getType(); ty = (t && t.getName) ? t.getName() : String(t || ''); } catch (e) { ty = ''; }
                        let val = '';
                        try { val = (el.getValueString && el.getValueString()) || ''; } catch (e) { val = ''; }
                        let en = '';
                        try { en = (el.getAttribute && el.getAttribute('enum')) || ''; } catch (e) { en = ''; }
                        if (!byName[key]) {
                            byName[key] = { name: nm, kind: kindLabel, types: [], value: val, enums: en };
                            order.push(key);
                        }
                        if (ty && byName[key].types.indexOf(ty) === -1) byName[key].types.push(ty);
                    };
                    try {
                        for (const def of vecToArray(stdlib.getMatchingNodeDefs(nodeName))) {
                            for (const inp of vecToArray(def.getInputs ? def.getInputs() : null)) record(inp, 'input');
                            for (const out of vecToArray(def.getOutputs ? def.getOutputs() : null)) record(out, 'output');
                        }
                    } catch (e) { /* nodedef read is best-effort */ }
                    if (alive) setRows(order.map((k) => byName[k]));
                }).catch(() => { if (alive) setRows([]); });
                return () => { alive = false; };
            }, [nodeName]);
            if (rows === null) {
                return <div className="text-sm text-gray-500 italic">Reading ports from the nodedef…</div>;
            }
            if (!rows.length) {
                return (
                    <div className="bg-gray-900 border border-gray-700 rounded p-4 text-sm text-gray-500 italic">
                        No specific ports defined or extracted for this node.
                    </div>
                );
            }
            return (
                <div>
                    <div className="text-xs text-amber-400/80 bg-amber-950/30 border border-amber-800/40 rounded px-3 py-2 mb-3">
                        {'\u26A0'} This table was generated automatically from the node's nodedef in the standard library — it is not part of the official specification documents.
                    </div>
                    <div className="overflow-x-auto bg-gray-900 border border-gray-700 rounded-lg">
                        <table className="w-full text-sm">
                            <thead>
                                <tr className="text-left text-xs uppercase tracking-wider text-gray-400 border-b border-gray-700">
                                    <th className="px-3 py-2">Port</th>
                                    <th className="px-3 py-2">Kind</th>
                                    <th className="px-3 py-2">Type(s)</th>
                                    <th className="px-3 py-2">Default</th>
                                    <th className="px-3 py-2">Accepted values</th>
                                </tr>
                            </thead>
                            <tbody>
                                {rows.map((r) => (
                                    <tr key={r.kind + ':' + r.name} className="border-b border-gray-800 last:border-0 align-top">
                                        <td className="px-3 py-2 font-mono text-blue-300">{r.name}</td>
                                        <td className="px-3 py-2 text-gray-400">{r.kind}</td>
                                        <td className="px-3 py-2 font-mono text-purple-300">{r.types.join(', ')}</td>
                                        <td className="px-3 py-2 font-mono text-amber-300 break-all">{r.value}</td>
                                        <td className="px-3 py-2 font-mono text-green-300 break-words">{r.enums}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        function App() {
            const [jsonData, setJsonData] = React.useState(null);
            const [selectedNode, setSelectedNode] = React.useState(null);
            const [copied, setCopied] = React.useState(false);
            // Auto-generated port tables (from the nodedef) for undocumented
            // nodes: { name, status: 'loading'|'ready'|'unavailable', tables }.
            const [autoDoc, setAutoDoc] = React.useState(null);
            // MaterialX library version (from the JS API), shown in the top menu.
            const [mtlxVersion, setMtlxVersion] = React.useState(window.__mtlxVersion || null);
            React.useEffect(() => {
                if (window.__mtlxVersion) { setMtlxVersion(window.__mtlxVersion); return undefined; }
                const onVer = (e) => setMtlxVersion(e.detail || window.__mtlxVersion || null);
                window.addEventListener('mtlx-version', onVer);
                // Warm the MaterialX module so the version resolves even before a
                // preview renders (it caches; previews reuse it). One-time load
                // only — the resource cost the "3D previews" toggle guards is the
                // per-node render loop, not this.
                getMxEnv().catch(() => {});
                return () => window.removeEventListener('mtlx-version', onVer);
            }, []);

            // Resolve doc links that point at a spec #node-... anchor to a
            // node in the loaded database (anchors and node names both get
            // separators stripped so hyphenated and squashed conventions both
            // match). Known → select in-app; unknown → official page.
            React.useEffect(() => {
                if (!jsonData) return undefined;
                const index = {};
                for (const lib of Object.keys(jsonData)) {
                    for (const group of Object.keys(jsonData[lib])) {
                        for (const name of Object.keys(jsonData[lib][group])) {
                            const key = name.replace(/[-_]/g, '').toLowerCase();
                            if (!index[key]) index[key] = { lib, group, name, info: jsonData[lib][group][name] };
                        }
                    }
                }
                // Published so the doc renderer can mark <nodename> chips as
                // clickable only when they resolve to a known node.
                window.__mtlxNodeIndex = index;
                const onOpen = (e) => {
                    const hit = index[e.detail.key];
                    if (hit) {
                        setSelectedNode(hit);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } else if (e.detail.url) {
                        window.open(e.detail.url, '_blank', 'noopener');
                    } else {
                        console.warn('mtlx-open-node: no node matches key', e.detail.key);
                    }
                };
                window.addEventListener('mtlx-open-node', onOpen);
                return () => {
                    window.removeEventListener('mtlx-open-node', onOpen);
                    if (window.__mtlxNodeIndex === index) delete window.__mtlxNodeIndex;
                };
            }, [jsonData]);

            // KaTeX loads with `defer`; if React renders before it's ready,
            // poll briefly and re-render once it arrives so math spans
            // upgrade from raw text to rendered output.
            const [, setKatexReady] = React.useState(!!window.katex);
            React.useEffect(() => {
                if (window.katex) return;
                const timer = setInterval(() => {
                    if (window.katex) {
                        setKatexReady(true);
                        clearInterval(timer);
                    }
                }, 200);
                return () => clearInterval(timer);
            }, []);

            // State to keep track of which tree folders are open
            const [expandedLibs, setExpandedLibs] = React.useState({});
            const [expandedGroups, setExpandedGroups] = React.useState({});

            // Shared initialization for both auto-loaded and uploaded data.
            const applyData = (parsedData, source) => {
                setJsonData(parsedData);
                setSelectedNode(null);
                setDataSource(source);

                // A permalink (#/lib/group/name) wins over the default first node.
                const fromHash = hashToSel(parsedData, window.location.hash);
                if (fromHash) {
                    setExpandedLibs({ [fromHash.lib]: true });
                    setExpandedGroups({ [`${fromHash.lib}-${fromHash.group}`]: true });
                    setSelectedNode(fromHash);
                    return;
                }

                // Expand the first library and group by default for convenience
                const firstLib = Object.keys(parsedData)[0];
                if (firstLib) {
                    setExpandedLibs({ [firstLib]: true });
                    const firstGroup = Object.keys(parsedData[firstLib])[0];
                    if (firstGroup) {
                        setExpandedGroups({ [`${firstLib}-${firstGroup}`]: true });

                        // Select the first node
                        const firstNode = Object.keys(parsedData[firstLib][firstGroup])[0];
                        if (firstNode) {
                            setSelectedNode({
                                lib: firstLib,
                                group: firstGroup,
                                name: firstNode,
                                info: parsedData[firstLib][firstGroup][firstNode]
                            });
                        }
                    }
                }
            };

            // Keep the address bar in sync with the selection (permalink), and
            // react to back/forward + manual hash edits. pushState updates the
            // bar WITHOUT firing hashchange, so no feedback loop; popstate
            // handles history navigation.
            React.useEffect(() => {
                if (!selectedNode) return;
                const h = selToHash(selectedNode);
                if (window.location.hash !== h) {
                    try { history.pushState(null, '', h); } catch (e) { window.location.hash = h; }
                }
            }, [selectedNode]);
            React.useEffect(() => {
                if (!jsonData) return undefined;
                const onNav = () => {
                    const sel = hashToSel(jsonData, window.location.hash);
                    if (sel) {
                        setExpandedLibs((p) => Object.assign({}, p, { [sel.lib]: true }));
                        setExpandedGroups((p) => Object.assign({}, p, { [`${sel.lib}-${sel.group}`]: true }));
                        setSelectedNode(sel);
                    }
                };
                window.addEventListener('hashchange', onNav);
                window.addEventListener('popstate', onNav);
                return () => {
                    window.removeEventListener('hashchange', onNav);
                    window.removeEventListener('popstate', onNav);
                };
            }, [jsonData]);

            const copyPermalink = () => {
                const loc = window.location;
                const url = loc.origin + loc.pathname + loc.search + selToHash(selectedNode);
                const done = () => { setCopied(true); setTimeout(() => setCopied(false), 1500); };
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(url).then(done, () => {
                        window.prompt('Copy this link:', url);
                    });
                } else {
                    window.prompt('Copy this link:', url);
                }
            };

            // For nodes with NO documentation, read the ports/types straight
            // from the MaterialX nodedef (via the WASM API) and synthesize a
            // table on the fly. Guarded so a stale fetch can't overwrite a
            // newer selection.
            React.useEffect(() => {
                if (!selectedNode || !isUndocumented(selectedNode.info)) {
                    setAutoDoc(null);
                    return undefined;
                }
                const name = selectedNode.name;
                let alive = true;
                setAutoDoc({ name, status: 'loading', tables: [] });
                getMxEnv()
                    .then(({ mx, stdlib }) => {
                        if (!alive) return;
                        const doc = mx.createDocument();
                        // setDataLibrary REFERENCES the standard library
                        // (nodedef matching, validation, and shadergen all
                        // consult it) without making it part of the document —
                        // so a plain writeToXmlString(doc) contains only OUR
                        // nodes. importLibrary would bake megabytes of stdlib
                        // into the doc, and the JS binding of XmlWriteOptions
                        // exposes only writeXIncludeEnable (elementPredicate is
                        // NOT bound), so there is no way to filter at write
                        // time. Verified: all preview kinds generate and export
                        // cleanly through the data library.
                        if (typeof doc.setDataLibrary === 'function') {
                            doc.setDataLibrary(stdlib);
                        } else {
                            // Ancient binding without setDataLibrary — exports
                            // would include the library. Loud, not silent:
                            console.error('setDataLibrary is not bound in this MaterialX build — .mtlx exports will include the standard library.');
                            doc.importLibrary(stdlib);
                        }
                        const defs = vecToArray(doc.getMatchingNodeDefs(name));
                        const tables = buildAutoTablesFromDefs(defs);
                        if (!alive) return;
                        setAutoDoc({ name, status: tables.length ? 'ready' : 'unavailable', tables });
                    })
                    .catch(() => { if (alive) setAutoDoc({ name, status: 'unavailable', tables: [] }); });
                return () => { alive = false; };
            }, [selectedNode]);

            // Auto-load the JSON sitting next to the page (works on any web
            // host incl. GitHub Pages; fails silently on file:// or 404,
            // leaving the upload input as the way in).
            const [autoLoad, setAutoLoad] = React.useState('loading'); // loading | done | failed
            const [dataSource, setDataSource] = React.useState(null);
            React.useEffect(() => {
                fetch(DATA_URL)
                    .then(res => {
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        return res.json();
                    })
                    .then(parsed => {
                        applyData(parsed, DATA_URL);
                        setAutoLoad('done');
                    })
                    .catch(() => setAutoLoad('failed'));
            }, []);

            // (Manual upload removed: the page auto-loads DATA_URL only.)

            const toggleLib = (lib) => {
                setExpandedLibs(prev => ({ ...prev, [lib]: !prev[lib] }));
            };

            const toggleGroup = (lib, group) => {
                const key = `${lib}-${group}`;
                setExpandedGroups(prev => ({ ...prev, [key]: !prev[key] }));
            };

            // ----------------------------------------------------------------
            // Documentation stats + tristate doc filter + name search
            // ----------------------------------------------------------------
            // 'all' | 'documented' | 'undocumented'
            const [docFilter, setDocFilter] = React.useState('all');
            const [searchQuery, setSearchQuery] = React.useState('');
            // Global 3D-preview switch, persisted across sessions so slow
            // machines stay preview-free. localStorage is best-effort
            // (private mode etc. throws) — default is ON.
            const [showPreviews, setShowPreviews] = React.useState(() => {
                try { return localStorage.getItem('mtlx_show_previews') !== '0'; } catch (e) { return true; }
            });
            const togglePreviews = () => setShowPreviews((v) => {
                const nv = !v;
                try { localStorage.setItem('mtlx_show_previews', nv ? '1' : '0'); } catch (e) { /* best-effort */ }
                return nv;
            });

            const stats = React.useMemo(() => {
                if (!jsonData) return null;
                let total = 0, undoc = 0;
                Object.values(jsonData).forEach(groups =>
                    Object.values(groups).forEach(nodes =>
                        Object.values(nodes).forEach(info => {
                            total++;
                            if (isUndocumented(info)) undoc++;
                        })
                    )
                );
                return { total, undoc };
            }, [jsonData]);

            // The tree renders from treeData: the full data, narrowed by the
            // "no docs" filter and/or the search query, with empty
            // groups/libs pruned.
            const treeData = React.useMemo(() => {
                if (!jsonData) return jsonData;
                const query = searchQuery.trim().toLowerCase();
                if (docFilter === 'all' && !query) return jsonData;
                const filtered = {};
                Object.entries(jsonData).forEach(([lib, groups]) => {
                    Object.entries(groups).forEach(([group, nodes]) => {
                        const kept = {};
                        Object.entries(nodes).forEach(([name, info]) => {
                            if (docFilter === 'undocumented' && !isUndocumented(info)) return;
                            if (docFilter === 'documented' && isUndocumented(info)) return;
                            if (query && !name.toLowerCase().includes(query)) return;
                            kept[name] = info;
                        });
                        if (Object.keys(kept).length > 0) {
                            if (!filtered[lib]) filtered[lib] = {};
                            filtered[lib][group] = kept;
                        }
                    });
                });
                return filtered;
            }, [jsonData, docFilter, searchQuery]);

            // While searching, show all matches regardless of stored
            // expansion state; clearing the query restores the prior state.
            const forceOpen = searchQuery.trim() !== '';
            const matchCount = React.useMemo(() => {
                if (!treeData || !forceOpen) return null;
                let n = 0;
                Object.values(treeData).forEach(gs =>
                    Object.values(gs).forEach(ns => { n += Object.keys(ns).length; }));
                return n;
            }, [treeData, forceOpen]);

            // Expand/collapse the whole (visible) tree at once.
            const expandAll = () => {
                const libs = {}, groups = {};
                Object.entries(treeData || {}).forEach(([lib, gs]) => {
                    libs[lib] = true;
                    Object.keys(gs).forEach(g => { groups[`${lib}-${g}`] = true; });
                });
                setExpandedLibs(libs);
                setExpandedGroups(groups);
            };
            const collapseAll = () => {
                setExpandedLibs({});
                setExpandedGroups({});
            };

            const applyDocFilter = (mode) => {
                setDocFilter(mode);
                if (mode === 'undocumented' && jsonData) {
                    // The undocumented set is usually small: expand everything
                    // containing such nodes so the view is a complete overview.
                    const libs = {}, groups = {};
                    Object.entries(jsonData).forEach(([lib, gs]) => {
                        Object.entries(gs).forEach(([group, nodes]) => {
                            if (Object.values(nodes).some(isUndocumented)) {
                                libs[lib] = true;
                                groups[`${lib}-${group}`] = true;
                            }
                        });
                    });
                    setExpandedLibs(libs);
                    setExpandedGroups(groups);
                }
            };

            // Chevron icons for the tree view
            const ChevronRight = () => (
                <svg className="w-4 h-4 inline-block mr-1 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>
            );
            const ChevronDown = () => (
                <svg className="w-4 h-4 inline-block mr-1 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
            );

            const portTables = selectedNode ? getPortTables(selectedNode.info) : [];
            // For undocumented nodes, fall back to the nodedef-generated tables.
            const autoReady = autoDoc && selectedNode && autoDoc.name === selectedNode.name
                && autoDoc.status === 'ready';
            const isAutoTable = portTables.length === 0 && autoReady && autoDoc.tables.length > 0;
            const autoLoading = autoDoc && selectedNode && autoDoc.name === selectedNode.name
                && autoDoc.status === 'loading';
            const effectiveTables = portTables.length > 0 ? portTables
                : (isAutoTable ? autoDoc.tables : []);
            // One shared column set for all tables of the selected node,
            // so the stacked tables align perfectly.
            const columns = effectiveTables.length > 0 ? unionColumns(effectiveTables) : [];
            // Footnote references: map key -> {n, url, text}, numbered by
            // order of first appearance (the parser preserves that order).
            const references = (selectedNode && selectedNode.info.references) || [];
            const refs = {};
            references.forEach((r, i) => { refs[r.key] = { n: i + 1, url: r.url, text: r.text }; });

            return (
                <div className="space-y-4 sm:space-y-6">
                    <div className="border-b border-gray-700 pb-4 flex items-start justify-between gap-4 flex-wrap">
                        <div>
                            <h1 className="text-2xl sm:text-3xl font-bold text-blue-400">MaterialX Node Previewer</h1>
                            <p className="text-gray-400 mt-1 sm:mt-2 text-sm sm:text-base">Documentation browser for the MaterialX node libraries.</p>
                        </div>
                        <div className="flex items-center gap-2 flex-wrap mt-1">
                            <a
                                href={REPO_URL} target="_blank" rel="noopener noreferrer"
                                title="View the source code on GitHub"
                                className="text-xs px-3 py-1.5 rounded-lg border bg-gray-800 border-gray-600 text-gray-200 hover:bg-gray-700 transition-colors flex items-center gap-1.5"
                            >
                                <svg viewBox="0 0 16 16" className="w-3.5 h-3.5" fill="currentColor" aria-hidden="true">
                                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
                                </svg>
                                Source code
                            </a>
                            <a
                                href={ISSUES_URL} target="_blank" rel="noopener noreferrer"
                                title="Report a bug or request a feature"
                                className="text-xs px-3 py-1.5 rounded-lg border bg-gray-800 border-gray-600 text-gray-200 hover:bg-gray-700 transition-colors"
                            >
                                Feedback / issues
