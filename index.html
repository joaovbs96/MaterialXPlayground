<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaterialX Playground — Node Library, Viewer & Graph Editor</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <!-- SEO / link-preview metadata. og:image must stay an ABSOLUTE URL —
         social scrapers don't resolve relative paths. -->
    <meta name="description" content="Browse the MaterialX node library, preview materials in real-time 3D, and build shader node graphs — free, open source, in your browser.">
    <link rel="canonical" href="https://joaovbs96.github.io/MaterialXPlayground/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="MaterialX Playground">
    <meta property="og:title" content="MaterialX Playground">
    <meta property="og:description" content="Browse the MaterialX node library, preview materials in 3D, and build node graphs — free, open source, in your browser.">
    <meta property="og:url" content="https://joaovbs96.github.io/MaterialXPlayground/">
    <meta property="og:image" content="https://joaovbs96.github.io/MaterialXPlayground/images/og_image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="MaterialX Playground — node library documentation, 3D material viewer, and node graph editor in the browser">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Embed mode: iframed by the graph editor as
         index.html?embed=1#/<lib>/<group>/<name> to show a focused view of
         a single node's documentation (no header/footer/sidebar/chrome).
         Applied synchronously (before first paint) so there's no flash of
         the full chrome. -->
    <script>
        (function () {
            if (new URLSearchParams(location.search).get('embed') === '1') {
                document.documentElement.classList.add('embed-mode');
                window.__MTLX_EMBED = true;
            }
        })();
    </script>
    <style>
        /* Embed mode (the graph editor's docs dialog iframe): hide the
           shared chrome — the iframe shows only the focused docs view. */
        .embed-mode #site-header, .embed-mode #site-footer { display: none; }
    </style>

    <!-- Shared header/footer styling: plain CSS, no Tailwind — shared
         verbatim (vendored byte-for-byte) with the tutorials subsite and
         the VS Code webview. Loaded before Tailwind Play so its own
         low-specificity mini-reset never fights the utility classes used
         elsewhere on this page. -->
    <link rel="stylesheet" href="js/site-tokens.css">
    <link rel="stylesheet" href="js/site-header.css">

    <script src="vendor/tailwind/tailwind-play.min.js"></script>
    <script src="vendor/react/react.production.min.js"></script>
    <script src="vendor/react/react-dom.production.min.js"></script>
    <script src="vendor/babel/babel.min.js"></script>

    <!-- three.js r128 + add-ons: loaded eagerly (shared by the viewer and
         graph views, and cheap enough not to gate on lazy view selection).
         Vendored locally (see vendor/vendor-manifest.json for exact
         provenance/hashes) via `npm install && npm run vendor`, which pins
         versions in this repo's package.json devDependencies. -->
    <script src="vendor/three/three.min.js"></script>
    <script src="vendor/three/RGBELoader.js"></script>
    <!-- EXRLoader: self-hosted, patched copy at js/vendor/EXRLoader.js
         (see the provenance header in that file for full detail). It starts
         from three@0.147.0's examples/js UMD build — pinned newer than the
         r128 core because that's the newest version whose examples/js still
         carries the legacy non-module bundle (0.148.0+ dropped it; the
         legacy non-module bundle was discontinued around r147/r148) —
         verified source-compatible with the r128 THREE core: 0.147.0's
         EXRLoader.js only touches THREE.DataTextureLoader,
         THREE.FloatType/HalfFloatType, THREE.RGBAFormat/RedFormat,
         THREE.LinearEncoding, THREE.LinearFilter and
         THREE.DataUtils.toHalfFloat — all present with matching signatures
         in three@0.128.0/build/three.js.
         On top of that base, the DWA decode path is back-ported from three's
         current examples/jsm/loaders/EXRLoader.js (mrdoob/three.js PRs
         #27982/#30709/#33216) to fix "Cannot read properties of undefined
         (reading 'width') at lossyDctDecode" on real .exr files whose
         channels are layer-prefixed (e.g. "RGBA.R" — the default naming many
         DCC exporters use); r147's naive `cd.name==rule.name` channel-rule
         check never matched such names and then called lossyDctDecode()
         unconditionally.
         fflate: EXRLoader needs the global `fflate` (its ZIP/DWA-compressed
         decode paths call fflate.unzlibSync) — must load before
         js/vendor/EXRLoader.js. scripts/vendor.mjs pulls this file from the
         "three-147" alias (npm:three@0.147.0) in package.json, whose
         examples/js/libs/fflate.min.js is byte-identical to 0.128.0's (still
         fflate 0.6.9, same exports); sourced from the 0.147.0 package purely
         so the version tag matches what js/vendor/EXRLoader.js was forked
         from. -->
    <script src="vendor/three/fflate.min.js"></script>
    <script src="js/vendor/EXRLoader.js"></script>
    <script src="vendor/three/GLTFLoader.js"></script>
    <script src="vendor/three/OrbitControls.js"></script>
    <script src="js/mtlx-assets.js"></script>


</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans flex flex-col md:h-screen">
    <!-- Shared site shell: injected synchronously (plain JS, no Babel/React)
         so the header paints instantly and identically on every page. This
         MUST run here (after the div below), not in <head> — site-header.js
         mounts into #site-header via a null-checked getElementById and would
         silently no-op if run before the body has parsed. -->
    <div id="site-header"></div>
    <script src="js/site-header.js"></script>

    <!-- Full-bleed stage (node-graph.html's exact #root contract — the
         strictest of the three original pages, since the graph view's
         canvas is absolutely-positioned and needs an unpadded,
         `position: relative` container with a definite height to fill.
         The docs and viewer views reconstruct their OWN padded/max-width
         wrappers inside this, in js/shell.jsx. -->
    <div id="root" class="flex-1 relative min-h-0"></div>

    <!-- Shared footer: filled by js/site-header.js at DOMContentLoaded. -->
    <div id="site-footer" class="shrink-0"></div>

    <!-- Shared engine + shell (must load after #root exists). The per-view
         CDN/local dependencies (KaTeX, JSZip, React Flow, dagre, doc-ui.jsx,
         node-preview.jsx, docs-app.jsx/viewer-app.jsx/graph-app.jsx) are
         lazy-loaded by shell.jsx on first activation of each view.

         data-presets="react": babel-standalone's default presets for a
         bare text/babel tag are ["react","env"] — preset-env lowers
         js/mtlx-engine.js's WASM loader (a dynamic import()) to CommonJS
         require(), which doesn't exist in the browser and throws
         "require is not defined" the first time getMxEnv() runs. An
         explicit react-only preset matches loadJsxApp's own Babel config
         in js/shell.jsx (presets [['react', {runtime: 'classic'}]]) and
         leaves import() native. -->
    <script type="text/babel" data-presets="react" src="js/mtlx-engine.js"></script>
    <script type="text/babel" data-presets="react" src="js/shell.jsx"></script>
    <script type="text/babel" data-presets="react">
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Shell />);
    </script>

    <style>
        /* Port tables on small screens: enforce the per-table minimum
           width computed from their columns (set as --tbl-min inline),
           so the wrapper scrolls horizontally instead of crushing the
           columns together. Desktop (md+) keeps the fluid layout. */
        @media (max-width: 767px) {
            .port-table { min-width: var(--tbl-min, 46rem); }
        }

        /* KaTeX on small screens: display equations get their own
           horizontal scroll instead of overflowing the page, and the
           whole thing scales down a notch. */
        .katex-display {
            overflow-x: auto;
            overflow-y: hidden;
            padding: 0.25rem 0.1rem;
            margin: 0.5rem 0;
            -webkit-overflow-scrolling: touch;
        }
        .katex-display::-webkit-scrollbar {
            height: 6px;
        }
        .katex-display::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }
        @media (max-width: 640px) {
            .katex { font-size: 0.95em; }
            .katex-display .katex { font-size: 1em; }
        }

        /* Custom scrollbar to match the dark theme */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1f2937;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #4b5563;
        }

        /* Dark-theme the React Flow chrome to match the site (graph view). */
        input[type="number"], input[type="color"], input[type="range"] { color-scheme: dark; }
        .react-flow__minimap { border: 1px solid #374151; border-radius: 6px; }
        .react-flow__attribution {
            background: rgba(17, 24, 39, 0.6); color: #6b7280;
        }
        .react-flow__attribution a { color: #9ca3af; }
        .react-flow__edge.selected .react-flow__edge-path { stroke: #3b82f6 !important; }
        .react-flow__handle { cursor: crosshair; }
        .react-flow__handle::after { content: ''; position: absolute; inset: -5px; }
        /* The edge-updater circle sits on the edge's endpoint triangle —
           dragging it reconnects/detaches the edge, so advertise move
           instead of the generic connect-cursor. An occupied input port
           reads as "grab the existing connection" too — see the
           pointer-events rule below. */
        .react-flow__edgeupdater { cursor: move; }
        /* An OCCUPIED input's handle becomes click-through so hover/drag
           falls to the edge-updater circle beneath it (same spot, edges
           layer) — dragging there runs ReactFlow's real edge-update
           gesture: the wire detaches and follows the cursor; drop back on
           the port keeps the connection, drop in the void deletes it
           (onEdgeUpdateEnd), drop on another valid input reconnects it
           there (onEdgeUpdate). The move cursor over the port comes from
           ReactFlow's own .react-flow__edgeupdater rule (mirrored above).
           New connections can still be DROPPED on occupied ports: ReactFlow
           completes them by connectionRadius proximity, not by hovering the
           handle's DOM element. Known tradeoffs: port double-click no
           longer works on occupied inputs (it still works on empty ones),
           and the inner half of the dot (over the node body) drags the
           node. */
        .react-flow__handle.connectionindicator.mtlx-handle-connected { pointer-events: none; }
    </style>
</body>
</html>
