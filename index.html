<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaterialX Node Previewer</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Optional: enables loading .hdr equirectangular environment maps.
         Must match the three.js version above (r128 / 0.128.0). -->
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-2 sm:p-6 font-sans">
    <div id="root" class="max-w-[1600px] mx-auto"></div>

    <script type="text/babel">
        const DATA_URL = 'nodes.json';

        // Project links (shown in the top menu + footer).
        const REPO_URL = 'https://github.com/joaovbs96/MaterialXNodeDocs';
        const ISSUES_URL = REPO_URL + '/issues';
        const SPEC_DOCS_URL = 'https://github.com/AcademySoftwareFoundation/MaterialX/tree/main/documents/Specification';

        // Permalinks: a node is addressed by lib/group/name in the URL hash,
        // e.g. #/stdlib/math/add — hash routing needs no server config, so it
        // works as-is on GitHub Pages. These convert between a selection and
        // the hash both ways.
        const selToHash = (sel) =>
            sel ? '#/' + [sel.lib, sel.group, sel.name].map(encodeURIComponent).join('/') : '';
        const hashToSel = (data, hash) => {
            if (!data || !hash) return null;
            const body = hash.replace(/^#\/?/, '');
            if (!body) return null;
            const parts = body.split('/').map((s) => { try { return decodeURIComponent(s); } catch (e) { return s; } });
            if (parts.length < 3) return null;
            const name = parts.slice(2).join('/'); // names shouldn't contain '/', but be safe
            const [lib, group] = parts;
            if (data[lib] && data[lib][group] && data[lib][group][name]) {
                return { lib, group, name, info: data[lib][group][name] };
            }
            return null;
        };

        // Turn a normalized header key back into a display label,
        // e.g. "accepted_values" -> "Accepted Values".
        const headerLabel = (key) =>
            key.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

        // ------------------------------------------------------------------
        // Rich text: node prose may contain $inline$ / $$display$$ math
        // spans (preserved verbatim by the parser) and footnote references
        // like [^Oren1994]. Math renders via KaTeX; footnote refs render as
        // superscript numbered links into the node's reference list. If
        // KaTeX failed to load or a span doesn't parse, the raw text shows
        // instead so nothing is ever lost.
        // ------------------------------------------------------------------
        const RICH_SPLIT_RE = /(\$\$[^$]+\$\$|\$[^$\n]+\$|\[\^[^\]\s]+\])/g;
        const FOOTNOTE_RE = /^\[\^([^\]\s]+)\]$/;

        // Inline styling for plain prose: numeric vectors like
        // [0.001, 0.001, 0.01] and MaterialX node names in angle brackets like
        // <image> render in the monospace table font (a vector needs >=2
        // comma-separated numbers; an angle token must start with a letter, so
        // "a < b" isn't matched).
        const INLINE_STYLE_RE = /(\[\s*[+-]?\d[\d.eE+-]*(?:\s*,\s*[+-]?\d[\d.eE+-]*)+\s*\]|<[A-Za-z_][\w.:-]*>)/g;
        const MONO = 'font-mono text-[0.9em] bg-gray-900/70 border border-gray-700 rounded px-1 py-0.5';
        const styleInlinePlain = (text, kp) => {
            const parts = String(text).split(INLINE_STYLE_RE);
            return parts.map((part, i) => {
                if (!part) return null;
                if (part[0] === '[' && part[part.length - 1] === ']') {
                    return <code key={kp + 'v' + i} className={MONO + ' text-amber-300'}>{part}</code>;
                }
                if (part[0] === '<' && part[part.length - 1] === '>') {
                    // Cross-reference: a <nodename> token that matches a node in
                    // the loaded database navigates to it in-app. Unknown tokens
                    // (ports, placeholders like <geomname>) stay plain chips.
                    const inner = part.slice(1, -1);
                    const idx = window.__mtlxNodeIndex;
                    const key = /^[A-Za-z0-9_-]+$/.test(inner) ? inner.replace(/[-_]/g, '').toLowerCase() : null;
                    if (key && idx && idx[key]) {
                        return (
                            <code
                                key={kp + 'n' + i}
                                onClick={() => window.dispatchEvent(new CustomEvent('mtlx-open-node', { detail: { key } }))}
                                title={'Open node: ' + idx[key].name}
                                className={MONO + ' text-blue-300 underline decoration-blue-500/40 cursor-pointer hover:text-blue-200'}
                            >{part}</code>
                        );
                    }
                    return <code key={kp + 'n' + i} className={MONO + ' text-blue-300'}>{part}</code>;
                }
                return <React.Fragment key={kp + 't' + i}>{part}</React.Fragment>;
            });
        };
        // Markdown links preserved by the parser: [text](https://...).
        // Links into a spec's #node-... anchor open the node IN-APP when we
        // know it (via the mtlx-open-node event the App listens for); anything
        // else opens the official page in a new tab.
        const DOC_LINK_RE = /\[([^\]^][^\]]*)\]\((https?:[^)\s]+)\)/g;
        const SPEC_NODE_ANCHOR_RE = /documents\/Specification\/[^#)\s]*#(node-[A-Za-z0-9_-]+)/;
        const openDocLink = (url) => {
            const m = url.match(SPEC_NODE_ANCHOR_RE);
            if (m) {
                // Anchor conventions vary (hyphenated vs squashed); normalize
                // both sides by dropping separators and let the App resolve it.
                const key = m[1].slice(5).replace(/[-_]/g, '').toLowerCase();
                window.dispatchEvent(new CustomEvent('mtlx-open-node', { detail: { key, url } }));
                return;
            }
            window.open(url, '_blank', 'noopener');
        };
        const styleInline = (text, kp) => {
            const src = String(text);
            const out = [];
            let last = 0, m, i = 0;
            DOC_LINK_RE.lastIndex = 0;
            while ((m = DOC_LINK_RE.exec(src)) !== null) {
                if (m.index > last) out.push(...styleInlinePlain(src.slice(last, m.index), kp + 'p' + i + '-'));
                const url = m[2];
                out.push(
                    <a
                        key={kp + 'l' + i}
                        href={url}
                        onClick={(e) => { e.preventDefault(); openDocLink(url); }}
                        className="text-blue-400 hover:text-blue-300 underline decoration-blue-500/40 cursor-pointer"
                        title={url}
                    >{m[1]}</a>
                );
                last = m.index + m[0].length;
                i++;
            }
            if (last < src.length) out.push(...styleInlinePlain(src.slice(last), kp + 'e-'));
            return out;
        };

        function MathText({ text, refs }) {
            if (text == null || text === '') return null;
            const parts = String(text).split(RICH_SPLIT_RE);
            return (
                <React.Fragment>
                    {parts.map((part, i) => {
                        if (!part) return null;

                        // Footnote reference -> superscript link [n]
                        const fn = part.match(FOOTNOTE_RE);
                        if (fn) {
                            const ref = refs && refs[fn[1]];
                            if (ref) {
                                const marker = `[${ref.n}]`;
                                return (
                                    <sup key={i} className="text-blue-400">
                                        {ref.url ? (
                                            <a href={ref.url} target="_blank" rel="noreferrer"
                                               title={ref.text || fn[1]}
                                               className="hover:underline">{marker}</a>
                                        ) : (
                                            <span title={ref.text || fn[1]}>{marker}</span>
                                        )}
                                    </sup>
                                );
                            }
                            return <span key={i}>{part}</span>; // unknown key: keep raw
                        }

                        // Math span -> KaTeX
                        const isDisplay = part.length > 4 && part.startsWith('$$') && part.endsWith('$$');
                        const isInline = !isDisplay && part.length > 2 && part.startsWith('$') && part.endsWith('$');
                        if ((isDisplay || isInline) && window.katex) {
                            const src = isDisplay ? part.slice(2, -2) : part.slice(1, -1);
                            try {
                                const html = window.katex.renderToString(src, {
                                    displayMode: isDisplay,
                                    throwOnError: true,
                                });
                                return <span key={i} dangerouslySetInnerHTML={{ __html: html }} />;
                            } catch (err) {
                                return <span key={i}>{part}</span>;
                            }
                        }
                        return <span key={i}>{styleInline(part, i + '-')}</span>;
                    })}
                </React.Fragment>
            );
        }

        // Renders multi-paragraph prose (description / notes): paragraphs
        // are separated by \n\n; a paragraph starting with '#'s is a
        // sub-heading (e.g. "#### Reflectance Equations"); a standalone
        // "$$...$$" paragraph becomes a centered display equation.
        const SUBHEADING_RE = /^#{1,6}\s+(.*)$/;

        function RichBlocks({ text, refs, className }) {
            if (!text) return null;
            return (
                <div className={className}>
                    {text.split('\n\n').map((block, i) => {
                        const h = block.match(SUBHEADING_RE);
                        if (h) {
                            return (
                                <h4 key={i} className="text-sm font-semibold text-gray-200 uppercase tracking-wider mt-5 mb-2">
                                    {h[1]}
                                </h4>
                            );
                        }
                        return (
                            <p key={i} className="mb-3">
                                <MathText text={block} refs={refs} />
                            </p>
                        );
                    })}
                </div>
            );
        }

        // Normalize a node entry so the viewer supports both the new
        // schema ({ port_tables: [{headers, ports}, ...] }) and the old
        // one ({ ports: {...} }).
        const getPortTables = (nodeInfo) => {
            if (Array.isArray(nodeInfo.port_tables)) return nodeInfo.port_tables;
            if (nodeInfo.ports && Object.keys(nodeInfo.ports).length > 0) {
                const firstRow = Object.values(nodeInfo.ports)[0] || {};
                return [{ headers: ['port', ...Object.keys(firstRow)], ports: nodeInfo.ports }];
            }
            return [];
        };

        // Build port tables (same shape the viewer renders) directly from a
        // node's MaterialX nodedefs, for nodes with NO spec documentation. One
        // table per nodedef (overload/signature); inputs first, then outputs.
        // `vecToArray` normalizes the MaterialX vector<->array binding.
        const buildAutoTablesFromDefs = (defs) => {
            const tables = [];
            for (const def of defs) {
                const ports = {};
                let anyEnum = false;
                const inputs = vecToArray(def.getActiveInputs ? def.getActiveInputs()
                    : (def.getInputs ? def.getInputs() : null));
                for (const inp of inputs) {
                    let dv = '', enumv = '';
                    try { dv = (inp.getValueString && inp.getValueString()) || ''; } catch (e) { /* none */ }
                    try { enumv = (inp.getAttribute && inp.getAttribute('enum')) || ''; } catch (e) { /* none */ }
                    const row = { description: '', type: inp.getType(), default: dv };
                    if (enumv) { row.accepted_values = enumv; anyEnum = true; }
                    ports[inp.getName()] = row;
                }
                const outs = vecToArray(def.getActiveOutputs ? def.getActiveOutputs()
                    : (def.getOutputs ? def.getOutputs() : null));
                if (outs.length === 0) {
                    let t = 'output';
                    try { t = def.getType(); } catch (e) { /* keep */ }
                    ports['out'] = { description: 'Output', type: t, default: '' };
                } else {
                    for (const out of outs) {
                        ports[out.getName()] = { description: 'Output', type: out.getType(), default: '' };
                    }
                }
                if (Object.keys(ports).length) {
                    const headers = anyEnum
                        ? ['port', 'description', 'type', 'default', 'accepted_values']
                        : ['port', 'description', 'type', 'default'];
                    tables.push({ headers, ports });
                }
            }
            return tables;
        };

        // A node counts as undocumented when it has no port tables, no
        // notes, and no real description (the parser emits the fallback
        // string "No documentation available." for spec-less nodedefs).
        const isUndocumented = (info) => {
            if (getPortTables(info).length > 0) return false;
            if (info.notes) return false;
            const desc = (info.description || '').trim();
            return desc === '' || desc === 'No documentation available.';
        };

        // ------------------------------------------------------------------
        // Shared column layout: every table of a node renders the SAME
        // columns in the SAME order with FIXED widths, so stacked tables
        // line up instead of each computing its own widths.
        // ------------------------------------------------------------------
        const CANONICAL_ORDER = ['port', 'description', 'type', 'default', 'accepted_values'];
        const COL_WIDTHS = {
            port: 'w-40',
            type: 'w-48',
            default: 'w-36',
            accepted_values: 'w-44',
            // description gets whatever space is left
        };
        // Same widths in rem, used to compute each table's minimum width on
        // small screens (fixed columns + a readable minimum for description).
        const COL_REM = { port: 10, type: 12, default: 9, accepted_values: 11 };
        const DESCRIPTION_MIN_REM = 14;
        const EXTRA_COL_REM = 8;
        const CELL_STYLES = {
            port: 'font-medium text-blue-400 font-mono break-words',
            type: 'font-mono text-xs text-purple-400 break-words',
            default: 'font-mono text-xs text-yellow-300 break-words',
            accepted_values: 'font-mono text-xs text-green-400 break-words',
        };

        const unionColumns = (tables) => {
            const seen = new Set();
            tables.forEach(t => (t.headers || []).forEach(h => seen.add(h)));
            tables.forEach(t => Object.values(t.ports || {}).forEach(row =>
                Object.keys(row).forEach(k => seen.add(k))
            ));
            seen.add('port');
            const ordered = CANONICAL_ORDER.filter(c => seen.has(c));
            [...seen].sort().forEach(c => { if (!CANONICAL_ORDER.includes(c)) ordered.push(c); });
            return ordered;
        };

        // ------------------------------------------------------------------
        // Signature labels: derive "inputs → output" type summaries from
        // each table, resolving "Same as <port>" references, so headings
        // read e.g. "surfaceshader" or "boolean → float, integer"
        // ------------------------------------------------------------------
        const SAME_AS_RE = /^same as\s+(\S+?)(?:\s+or\s+(.+))?$/i;

        const resolveType = (ports, portName, seen) => {
            seen = seen || new Set();
            const row = ports[portName];
            if (!row || seen.has(portName)) return '';
            seen.add(portName);
            const t = (row.type || '').trim();
            const m = t.match(SAME_AS_RE);
            if (!m) return t;
            const resolved = resolveType(ports, m[1], seen);
            if (!resolved) return t; // unresolvable reference: keep raw text
            return m[2] ? `${resolved}, ${m[2]}` : resolved;
        };

        const isOutputPort = (name, row) =>
            name === 'out' || /^output\b/i.test(row.description || '');

        // Split resolved type strings ("colorN, vectorN") into individual
        // tokens and dedupe at token level, so "Same as in1 or float" on a
        // matrixNN input yields "matrixNN, float" rather than
        // "matrixNN, matrixNN, float".
        const uniqTypeTokens = (typeStrings) => {
            const seen = new Set();
            const out = [];
            typeStrings.filter(Boolean).forEach(s =>
                s.split(',').map(t => t.trim()).filter(Boolean).forEach(t => {
                    if (!seen.has(t)) { seen.add(t); out.push(t); }
                })
            );
            return out;
        };

        const signatureLabel = (table) => {
            const ports = table.ports || {};
            const names = Object.keys(ports);
            const inTypes = uniqTypeTokens(names
                .filter(n => !isOutputPort(n, ports[n]))
                .map(n => resolveType(ports, n)));
            const outTypes = uniqTypeTokens(names
                .filter(n => isOutputPort(n, ports[n]))
                .map(n => resolveType(ports, n)));
            if (!inTypes.length && !outTypes.length) return null;
            const inStr = inTypes.join(', ');
            const outStr = outTypes.join(', ');
            if (!outStr || inStr === outStr) return inStr || outStr;
            if (!inStr) return `→ ${outStr}`;
            return `${inStr} → ${outStr}`;
        };

        function PortTable({ table, columns, refs }) {
            // Minimum table width (small screens only, via the .port-table
            // media rule): sum of the fixed column widths plus a readable
            // minimum for the flexible description column. Below this the
            // wrapper scrolls horizontally instead of crushing columns.
            const minRem = columns.reduce(
                (sum, c) => sum + (c === 'description' ? DESCRIPTION_MIN_REM : (COL_REM[c] || EXTRA_COL_REM)),
                0
            );
            return (
                <div className="overflow-x-auto rounded-lg border border-gray-700">
                    <table
                        style={{ '--tbl-min': `${minRem}rem` }}
                        className="port-table w-full table-fixed text-sm text-left text-gray-300"
                    >
                        <colgroup>
                            {columns.map(col => (
                                <col key={col} className={COL_WIDTHS[col] || ''} />
                            ))}
                        </colgroup>
                        <thead className="text-xs text-gray-400 uppercase bg-gray-900 border-b border-gray-700">
                            <tr>
                                {columns.map(col => (
                                    <th key={col} scope="col" className="px-4 py-3">{headerLabel(col)}</th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {Object.entries(table.ports).map(([portName, portData]) => (
                                <tr className="border-b border-gray-700 last:border-b-0 hover:bg-gray-750" key={portName}>
                                    {columns.map(col => (
                                        <td key={col} className={`px-4 py-3 align-top ${CELL_STYLES[col] || ''}`}>
                                            {col === 'port'
                                                ? portName
                                                : <MathText text={portData[col] || ''} refs={refs} />}
                                        </td>
                                    ))}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        // ------------------------------------------------------------------
        // MaterialX 3D Preview Component
        // ------------------------------------------------------------------
        // IMPORTANT: load ONLY JsMaterialXGenShader.js. It is a SUPERSET of
        // JsMaterialXCore.js (core document model + shader generation). If you
        // also load and initialize JsMaterialXCore, embind tries to register
        // the shared C++ types (VectorBase, Vector2, ...) a second time and
        // throws "Cannot register public name 'VectorBase' twice". One module.
        //
        // The whole MaterialX runtime is initialized ONCE and cached at module
        // scope: re-initializing per node select would re-download the wasm and
        // reload the standard libraries every time.
        let mxEnvPromise = null;
        const getMxEnv = () => {
            if (!mxEnvPromise) {
                mxEnvPromise = import('./js/JsMaterialXGenShader.js')
                    .then((mod) => mod.default({
                        // .wasm and .data live next to the .js (in ./js/).
                        locateFile: (path) => './js/' + path,
                    }))
                    .then((mx) => {
                        // Expose the MaterialX library version (from the JS API)
                        // for the top-menu badge; broadcast so the UI can update
                        // whenever the WASM finishes loading.
                        try {
                            const ver = (mx.getVersionString && mx.getVersionString()) || null;
                            if (ver) {
                                window.__mtlxVersion = ver;
                                window.dispatchEvent(new CustomEvent('mtlx-version', { detail: ver }));
                            }
                        } catch (e) { /* version is optional */ }
                        // WebGL 2 targets ESSL (GLSL ES 3.00) — NOT the desktop
                        // GLSL generator, whose #version 400 output won't compile
                        // in a browser. Build the generator + context once and
                        // load the prepackaged standard libraries (from the .data
                        // virtual filesystem) through it. loadStandardLibraries
                        // also registers the source-code search path on the
                        // context, so no manual registerSourceCodeSearchPath call.
                        const gen = mx.EsslShaderGenerator.create();
                        const genContext = new mx.GenContext(gen);
                        const stdlib = mx.loadStandardLibraries(genContext);
                        // OFFICIAL PARITY: the viewer sets hwSrgbEncodeOutput so
                        // MaterialX itself emits the linear→sRGB encode in the
                        // pixel shader — it uses NO tone mapping at all. (If this
                        // build ignores the option, a fallback encode is injected
                        // at generation time — see the /srgb/ test there.)
                        try { genContext.getOptions().hwSrgbEncodeOutput = true; } catch (e) { /* option absent */ }

                        // Direct light, exactly like the official viewer's
                        // registerLights(): bind the directional_light nodedef to
                        // light-type id 1 and pass the light values as the
                        // u_lightData struct array. Values come from a local
                        // ./light_rig.mtlx when present (copy the official
                        // viewer's Lights/san_giuseppe_bridge_split.mtlx there
                        // for exact parity), else a neutral default.
                        return fetch('./environment_map.mtlx')
                            .then((r) => (r.ok ? r.text() : null))
                            .catch(() => null)
                            .then((rigXml) => {
                                const lightData = [];
                                try {
                                    const HwGen = mx.HwShaderGenerator;
                                    const ldef = stdlib.getNodeDef ? stdlib.getNodeDef('ND_directional_light') : null;
                                    if (HwGen && HwGen.bindLightShader && ldef) {
                                        try { HwGen.unbindLightShaders(genContext); } catch (e) { /* fresh ctx */ }
                                        HwGen.bindLightShader(ldef, 1, genContext);
                                        try {
                                            const opts = genContext.getOptions();
                                            opts.hwMaxActiveLightSources = Math.max(opts.hwMaxActiveLightSources || 0, 1);
                                        } catch (e) { /* keep default */ }
                                        // Parse directional_light instances from the rig.
                                        const rigLights = [];
                                        if (rigXml) {
                                            const blocks = rigXml.match(/<directional_light\b[\s\S]*?<\/directional_light>/g) || [];
                                            for (const bl of blocks) {
                                                const inp = (nm) => {
                                                    const m = bl.match(new RegExp('<input\\\\s+name="' + nm + '"[^>]*value="([^"]*)"'));
                                                    return m ? m[1] : null;
                                                };
                                                const v3 = (str, fb) => {
                                                    if (!str) return fb;
                                                    const p = str.split(',').map((x) => parseFloat(x.trim()));
                                                    return p.length === 3 && !p.some(isNaN) ? p : fb;
                                                };
                                                rigLights.push({
                                                    direction: v3(inp('direction'), [0, -1, 0]),
                                                    color: v3(inp('color'), [1, 1, 1]),
                                                    intensity: parseFloat(inp('intensity')) || 1.0,
                                                });
                                            }
                                        }
                                        if (!rigLights.length) {
                                            rigLights.push({ direction: [0.35, -0.85, -0.4], color: [1, 1, 1], intensity: 1.0 });
                                        }
                                        // Official rotates light directions by the
                                        // same +90° Y it applies to the env map.
                                        const rot = new THREE.Matrix4().makeRotationY(Math.PI / 2);
                                        for (const l of rigLights) {
                                            const dir = new THREE.Vector3(l.direction[0], l.direction[1], l.direction[2])
                                                .normalize().transformDirection(rot);
                                            lightData.push({
                                                type: 1,
                                                direction: dir,
                                                color: new THREE.Vector3(l.color[0], l.color[1], l.color[2]),
                                                intensity: l.intensity,
                                            });
                                        }
                                    }
                                } catch (e) {
                                    console.warn('direct-light registration unavailable:', e);
                                    lightData.length = 0;
                                }
                                return { mx, gen, genContext, stdlib, lightData };
                            });
                    });
            }
            return mxEnvPromise;
        };

        // Flip to true to log the generated GLSL + discovered uniforms to the
        // console — the fastest way to diagnose a black/!runnable shader.
        const DEBUG_SHADERS = true;

        // ---- Official spec deep-links ----
        // Prefer a parser-provided `spec_url` (new JSON schema regenerated
        // from spec_parser.py). For older JSON, derive it: the spec file
        // follows the node's library, and the heading anchors in the spec MD
        // follow the hyphenated "node-<name>" convention observed in the MD
        // (e.g. oren_nayar_diffuse_bsdf → #node-oren-nayar-diffuse-bsdf).
        // GitHub resolves those fragments to user-content-prefixed ids.
        const SPEC_BASE = 'https://github.com/AcademySoftwareFoundation/MaterialX/blob/main/documents/Specification/';
        const specFileForLib = (lib) => {
            const base = (lib || '').split('/')[0];
            if (base === 'pbrlib' || base === 'bxdf') return 'MaterialX.PBRSpec.md';
            if (base === 'nprlib') return 'MaterialX.NPRSpec.md';
            if (base === 'stdlib') return 'MaterialX.StandardNodes.md';
            return 'MaterialX.Specification.md';
        };
        const specUrlForNode = (node) => {
            if (node.info && node.info.spec_url) return node.info.spec_url;
            return SPEC_BASE + specFileForLib(node.lib) + '#node-' + node.name.replace(/_/g, '-');
        };

        // Parse `uniform <type> <name>;` declarations out of generated GLSL so
        // we can bind by the shader's ACTUAL names (which vary by MaterialX
        // version) instead of guessing. Returns [{ type, name }, ...].
        const parseUniforms = (src) => {
            const out = [];
            const re = /uniform\s+(\w+)\s+(u_\w+)\s*(?:\[\s*\d+\s*\])?\s*;/g;
            let m;
            while ((m = re.exec(src)) !== null) out.push({ type: m[1], name: m[2] });
            return out;
        };

        // three.js RawShaderMaterial + glslVersion:GLSL3 prepends its own
        // "#version 300 es"; MaterialX ESSL output already has one. Strip the
        // generated version line to avoid a duplicate-directive compile error.
        const stripVersion = (src) => src.replace(/^\s*#version[^\n]*\n/, '');

        // Inject a display transform at the end of the generated PIXEL shader.
        // three.js's renderer.outputEncoding / toneMapping only affect BUILT-IN
        // materials (they're shader-chunk features) — RawShaderMaterial output
        // is written to the sRGB display completely raw, so MaterialX's linear
        // radiance looks much too dark (mid-tones roughly halved). We find the
        // shader's `out vec4` variable and append a linear→sRGB encode just
        // before main()'s closing brace (MaterialX emits main last, so the
        // file's last '}' closes it).
        const encodeDisplay = (src) => {
            const m = src.match(/\bout\s+vec4\s+(\w+)\s*;/);
            if (!m) return src;
            const v = m[1];
            const idx = src.lastIndexOf('}');
            if (idx === -1) return src;
            // FALLBACK ONLY (when hwSrgbEncodeOutput isn't honored): the
            // OFFICIAL viewer applies NO tone mapping — just MaterialX's own
            // linear→sRGB encode. Match its piecewise IEC 61966-2-1 curve
            // exactly; an ACES (or any) tone map here makes highlights and
            // overall response visibly diverge from the reference.
            const inject =
                '\n    // Injected by previewer: linear -> sRGB (official-parity, no tonemap).\n' +
                '    {\n' +
                '        vec3 _c = max(' + v + '.rgb, vec3(0.0));\n' +
                '        vec3 _lo = _c * 12.92;\n' +
                '        vec3 _hi = 1.055 * pow(_c, vec3(1.0 / 2.4)) - 0.055;\n' +
                '        ' + v + ' = vec4(mix(_hi, _lo, step(_c, vec3(0.0031308))), ' + v + '.a);\n' +
                '    }\n';
            return src.slice(0, idx) + inject + src.slice(idx);
        };

        // Emscripten throws C++ exceptions as NUMBERS (raw exception pointers),
        // not Error objects — a bare catch that stringifies one shows "5247184"
        // or "undefined" instead of the real MaterialX message. Decode the
        // pointer via mx.getExceptionMessage when available; otherwise fall
        // back to normal Error/String handling. ALWAYS route caught MaterialX
        // errors through this.
        const mxErr = (mx, e) => {
            try {
                if (typeof e === 'number' && mx && typeof mx.getExceptionMessage === 'function') {
                    const msg = mx.getExceptionMessage(e);
                    // getExceptionMessage may return a string or [type, message]
                    if (Array.isArray(msg)) return msg.filter(Boolean).join(': ');
                    if (msg) return String(msg);
                }
            } catch (_) { /* fall through to generic handling */ }
            if (e && e.message) return e.message;
            return String(e);
        };

        // CRITICAL WRITE PRIMITIVE — verified against the deployed
        // wasm: the JS binding of setValueString is the TYPED
        // setValue(value, type="string"), so writing a value RETYPES the
        // input to "string". This single binding quirk caused every
        // string-typed export and the colorspace nodedef failures. Writing
        // the raw `value` attribute never touches the type.
        const mxWriteValue = (inp, str, type) => {
            try {
                if (typeof inp.setAttribute === 'function') {
                    inp.setAttribute('value', String(str));
                    return;
                }
            } catch (e) { /* fall through */ }
            try {
                // Two-arg form sets value AND the correct type explicitly.
                inp.setValueString(String(str), type || inp.getType());
                return;
            } catch (e) { /* fall through */ }
            inp.setValueString(String(str));
            try { if (type) inp.setType(type); } catch (e) { /* best-effort */ }
        };

        // MaterialX JS marshals std::vector either as a real JS array or as a
        // {size(), get(i)} object depending on the binding; normalize to array.
        const vecToArray = (v) => {
            if (!v) return [];
            if (Array.isArray(v)) return v;
            if (typeof v.size === 'function') {
                const out = [];
                for (let i = 0; i < v.size(); i++) out.push(v.get(i));
                return out;
            }
            return [];
        };

        // Enumerate a ShaderStage's uniform variables via MaterialX shader
        // introspection — the official viewer's approach (§7.1). Returns
        // [{ name, type, data }] where data is the raw getData() payload of
        // the recorded default (null when the uniform has no default, e.g.
        // the per-frame transform matrices). Every access is defensive:
        // exact embind shapes vary across MaterialX JS builds.
        const collectMxUniforms = (stage) => {
            const out = [];
            const blocks = []; // { key, blk }
            let blockMap = null;
            try { blockMap = stage.getUniformBlocks && stage.getUniformBlocks(); } catch (e) { /* older binding */ }
            if (blockMap) {
                if (typeof blockMap.keys === 'function') {
                    for (const k of vecToArray(blockMap.keys())) {
                        try { blocks.push({ key: String(k), blk: blockMap.get(k) }); } catch (e) { /* skip */ }
                    }
                } else {
                    for (const k of Object.keys(blockMap)) blocks.push({ key: k, blk: blockMap[k] });
                }
            } else {
                // HW shader generators register exactly these two blocks
                // (HW::PUBLIC_UNIFORMS / HW::PRIVATE_UNIFORMS).
                for (const name of ['PublicUniforms', 'PrivateUniforms']) {
                    try { const b = stage.getUniformBlock(name); if (b) blocks.push({ key: name, blk: b }); } catch (e) { /* absent */ }
                }
            }
            for (const entry of blocks) {
                const b = entry.blk;
                let n = 0;
                try { n = (typeof b.size === 'function') ? b.size() : 0; } catch (e) { /* skip block */ }
                for (let i = 0; i < n; i++) {
                    try {
                        const v = b.get(i);
                        const name = (v.getVariable && v.getVariable()) || (v.getName && v.getName());
                        if (!name) continue;
                        let type = null;
                        try {
                            const t = v.getType && v.getType();
                            type = t ? ((t.getName && t.getName()) || String(t)) : null;
                        } catch (e) { /* type unreadable */ }
                        let data = null;
                        try {
                            const val = v.getValue && v.getValue();
                            if (val && val.getData) data = val.getData();
                        } catch (e) { /* no default recorded */ }
                        // The MaterialX element path (e.g. "preview_node/amplitude")
                        // ties the uniform back to a node input — used by the
                        // dynamic parameter UI.
                        let path = null;
                        try { path = (v.getPath && v.getPath()) || null; } catch (e) { /* absent */ }
                        out.push({ name, type, data, path, block: entry.key });
                    } catch (e) { /* skip unreadable entry */ }
                }
            }
            return out;
        };

        // Convert a MaterialX default value (by MaterialX type name) into a
        // three.js uniform. Returns null for types that can't be a plain
        // default (filename/sampler/string) — env samplers are bound
        // separately and the rest are safely skipped.
        const mxValueToThreeUniform = (type, data) => {
            const arr = (d) => {
                if (Array.isArray(d)) return d;
                if (d && typeof d.data === 'function') { try { return Array.from(d.data()); } catch (e) { /* not iterable */ } }
                if (d && typeof d.size === 'function') { const o = []; for (let i = 0; i < d.size(); i++) o.push(d.get(i)); return o; }
                return null;
            };
            switch (type) {
                case 'float': { const n = Number(data); return { value: isNaN(n) ? 0 : n }; }
                case 'integer': { const n = Number(data); return { value: isNaN(n) ? 0 : (n | 0) }; }
                case 'boolean': return { value: !!data };
                case 'vector2': { const a = arr(data) || [0, 0]; return { value: new THREE.Vector2(a[0], a[1]) }; }
                case 'color3':
                case 'vector3': { const a = arr(data) || [0, 0, 0]; return { value: new THREE.Vector3(a[0], a[1], a[2]) }; }
                case 'color4':
                case 'vector4': { const a = arr(data) || [0, 0, 0, 0]; return { value: new THREE.Vector4(a[0], a[1], a[2], a[3]) }; }
                case 'matrix33': { const a = arr(data); const m = new THREE.Matrix3(); if (a && a.length === 9) m.fromArray(a); return { value: m }; }
                case 'matrix44': { const a = arr(data); const m = new THREE.Matrix4(); if (a && a.length === 16) m.fromArray(a); return { value: m }; }
                default: return null;
            }
        };

        // sRGB <-> linear for the parameter UI's color pickers: MaterialX
        // color values are LINEAR, while <input type="color"> speaks 8-bit
        // sRGB hex. Converting at the picker boundary keeps the uniform
        // values in the space the shader expects.
        const linToSrgb = (c) => {
            const x = Math.max(0, Math.min(1, c));
            return x <= 0.0031308 ? x * 12.92 : 1.055 * Math.pow(x, 1 / 2.4) - 0.055;
        };
        const srgbToLin = (c) => (c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4));
        const rgbToHex = (rgb) => '#' + rgb.slice(0, 3).map((c) => {
            const h = Math.round(linToSrgb(c) * 255).toString(16);
            return h.length === 1 ? '0' + h : h;
        }).join('');
        const hexToRgb = (hex) => [1, 3, 5].map((i) => srgbToLin(parseInt(hex.slice(i, i + 2), 16) / 255));

        // Shared default texture for `filename` (image) inputs: a UV checker
        // generated on a canvas, so image nodes preview out of the box instead
        // of sampling an unbound (black) sampler. One instance is reused for
        // every filename uniform and restored by "Reset to default".
        let defaultTexture = null;
        const getDefaultTexture = () => {
            if (defaultTexture) return defaultTexture;
            const c = document.createElement('canvas');
            c.width = c.height = 256;
            const ctx = c.getContext('2d');
            const n = 8, sz = 256 / n;
            for (let y = 0; y < n; y++) {
                for (let x = 0; x < n; x++) {
                    ctx.fillStyle = (x + y) % 2 ? '#7d7d7d' : '#c8c8c8';
                    ctx.fillRect(x * sz, y * sz, sz, sz);
                }
            }
            // Orientation markers so UV flips are visible at a glance.
            ctx.fillStyle = '#d33'; ctx.fillRect(0, 0, sz, sz);                    // U0 V0
            ctx.fillStyle = '#36c'; ctx.fillRect((n - 1) * sz, 0, sz, sz);         // U1 V0
            const t = new THREE.CanvasTexture(c);
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
            t.flipY = false; // MaterialX image convention; keep loads consistent
            t.needsUpdate = true;
            defaultTexture = t;
            return t;
        };
        // Configure a user-loaded texture the same way as the default.
        const configureLoadedTexture = (t) => {
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
            t.flipY = false;
            t.needsUpdate = true;
            return t;
        };

        // ---- Preview geometry ----
        // Alias three's attributes to the names the MaterialX vertex shader
        // expects, and provide tangents (real ones when computable, constant
        // +X fallback otherwise). Works on any BufferGeometry.
        const prepGeometry = (geometry) => {
            if (!geometry.getAttribute('uv')) {
                // MaterialX shaders read texcoords; give degenerate UVs
                // rather than an unbound attribute.
                const count = geometry.getAttribute('position').count;
                geometry.setAttribute('uv', new THREE.BufferAttribute(new Float32Array(count * 2), 2));
            }
            geometry.setAttribute('i_position', geometry.getAttribute('position'));
            geometry.setAttribute('i_normal', geometry.getAttribute('normal'));
            geometry.setAttribute('i_texcoord_0', geometry.getAttribute('uv'));
            let iTangent = null;
            // r128's computeTangents CONSOLE.ERRORs (rather than throwing) when
            // index/position/normal/uv are missing — precheck so a geometry
            // that can't have real tangents goes straight to the fallback
            // without the scary log.
            const canTangent = !!(geometry.getIndex()
                && geometry.getAttribute('position')
                && geometry.getAttribute('normal')
                && geometry.getAttribute('uv'));
            if (canTangent) {
                try {
                    geometry.computeTangents();
                    const t = geometry.getAttribute('tangent'); // vec4 (may be absent on silent failure)
                    if (t) {
                        const tri = new Float32Array(t.count * 3);
                        for (let i = 0; i < t.count; i++) {
                            tri[i * 3] = t.getX(i); tri[i * 3 + 1] = t.getY(i); tri[i * 3 + 2] = t.getZ(i);
                        }
                        iTangent = new THREE.BufferAttribute(tri, 3);
                    }
                } catch (e) { /* fall through to constant tangent */ }
            }
            if (!iTangent) {
                const vcount = geometry.getAttribute('position').count;
                const tangents = new Float32Array(vcount * 3);
                for (let i = 0; i < vcount; i++) tangents[i * 3] = 1;
                iTangent = new THREE.BufferAttribute(tangents, 3);
            }
            geometry.setAttribute('i_tangent', iTangent);
            return geometry;
        };

        // Center a geometry at the origin and scale it to bounding radius 1
        // so all preview shapes frame identically.
        const normalizeGeometry = (geometry) => {
            geometry.computeBoundingSphere();
            const bs = geometry.boundingSphere;
            if (bs && bs.radius > 0) {
                geometry.translate(-bs.center.x, -bs.center.y, -bs.center.z);
                const s = 1 / bs.radius;
                geometry.scale(s, s, s);
            }
            return geometry;
        };

        // The official MaterialX shaderball, fetched once and cached. The GLB
        // may contain several meshes (ball, base, ...) with node transforms —
        // bake each mesh's world matrix and concatenate into one non-indexed
        // BufferGeometry so it can share the single preview material.
        const SHADERBALL_URL = 'https://raw.githubusercontent.com/AcademySoftwareFoundation/MaterialX/gh-pages/Geometry/shaderball.glb';
        let shaderballPromise = null;
        const getShaderballGeometry = () => {
            if (!shaderballPromise) {
                shaderballPromise = new Promise((resolve) => {
                    if (!THREE.GLTFLoader) return resolve(null);
                    new THREE.GLTFLoader().load(SHADERBALL_URL, (gltf) => {
                        try {
                            const parts = [];
                            gltf.scene.updateMatrixWorld(true);
                            gltf.scene.traverse((obj) => {
                                if (obj.isMesh && obj.geometry) {
                                    const g = obj.geometry.clone().toNonIndexed();
                                    g.applyMatrix4(obj.matrixWorld);
                                    parts.push(g);
                                }
                            });
                            if (!parts.length) return resolve(null);
                            // Manual attribute concat (BufferGeometryUtils isn't loaded).
                            const total = parts.reduce((n, g) => n + g.getAttribute('position').count, 0);
                            const pos = new Float32Array(total * 3);
                            const nrm = new Float32Array(total * 3);
                            const uv = new Float32Array(total * 2);
                            let off = 0;
                            for (const g of parts) {
                                const p = g.getAttribute('position');
                                const n = g.getAttribute('normal');
                                const u = g.getAttribute('uv');
                                pos.set(p.array, off * 3);
                                if (n) nrm.set(n.array, off * 3);
                                if (u) uv.set(u.array, off * 2);
                                off += p.count;
                            }
                            const merged = new THREE.BufferGeometry();
                            merged.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                            merged.setAttribute('normal', new THREE.BufferAttribute(nrm, 3));
                            merged.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
                            // computeTangents REQUIRES an index; the merge is
                            // non-indexed, so give it a trivial sequential one —
                            // real tangents instead of the constant fallback.
                            const idx = new Uint32Array(total);
                            for (let ii = 0; ii < total; ii++) idx[ii] = ii;
                            merged.setIndex(new THREE.BufferAttribute(idx, 1));
                            resolve(normalizeGeometry(merged));
                        } catch (e) {
                            console.warn('shaderball merge failed:', e);
                            resolve(null);
                        }
                    }, undefined, (e) => {
                        console.warn('shaderball load failed:', e);
                        resolve(null);
                    });
                });
            }
            return shaderballPromise;
        };

        // Build the selected preview geometry; shaderball falls back to the
        // sphere when the GLB can't be fetched.
        const buildPreviewGeometry = async (which) => {
            if (which === 'cube') {
                return normalizeGeometry(new THREE.BoxGeometry(1.3, 1.3, 1.3));
            }
            if (which === 'shaderball') {
                const g = await getShaderballGeometry();
                if (g) return g.clone();
            }
            return new THREE.SphereGeometry(1, 64, 64);
        };

        // Resolve how to preview a node from its nodedefs. Handles:
        //  - overloaded defs (e.g. add: float/color3/vector3/... variants)
        //  - MULTI-OUTPUT defs (many noise nodes expose out/outr/outg/...):
        //    we pick the FIRST viewable output.
        // Returns { kind, outType, outputName, multiOutput } where kind is
        // 'surface' | 'bsdf' | 'color' | null. outputName is the specific
        // output to tap (null = the def's single/default output). multiOutput
        // is true when the node instance must be created as type 'multioutput'.
        const COLOR_VIEWABLE = ['color3', 'color4', 'float', 'vector2', 'vector3', 'vector4'];
        const resolveNodeKind = (doc, nodeName) => {
            const defs = vecToArray(doc.getMatchingNodeDefs(nodeName));
            // Flatten every def into candidate outputs.
            const candidates = []; // { type, outputName, multiOutput }
            const allTypes = [];
            for (const def of defs) {
                const outs = vecToArray(def.getOutputs ? def.getOutputs() : null);
                const multiOutput = (def.getType && def.getType() === 'multioutput') || outs.length > 1;
                if (outs.length === 0) {
                    const t = def.getType();
                    allTypes.push(t);
                    candidates.push({ type: t, outputName: null, multiOutput: false });
                } else {
                    for (const o of outs) {
                        const t = o.getType();
                        allTypes.push(t);
                        // With a single output, downstream doesn't need an
                        // explicit output name; with several, it does.
                        candidates.push({
                            type: t,
                            outputName: multiOutput ? o.getName() : null,
                            multiOutput,
                        });
                    }
                }
            }

            // Priority: surface shader > BSDF > first viewable color/vector.
            const surf = candidates.find((c) => c.type === 'surfaceshader');
            if (surf) return { kind: 'surface', ...surf };
            const bsdf = candidates.find((c) => c.type === 'BSDF');
            if (bsdf) return { kind: 'bsdf', ...bsdf };
            for (const t of COLOR_VIEWABLE) {
                const hit = candidates.find((c) => c.type === t);
                if (hit) return { kind: 'color', outType: t, outputName: hit.outputName, multiOutput: hit.multiOutput };
            }
            return { kind: null, types: allTypes };
        };

        // Synthesize a small equirectangular environment (LDR, safe to filter
        // and mip on WebGL2) so image-based lighting has something to sample:
        // a sky-to-ground gradient with a soft overhead "sun" for speculars.
        // Real previews would load an HDR; this keeps the viewer self-contained.
        const makeEnvTexture = (w, h, blurred) => {
            const data = new Uint8Array(w * h * 4);
            const sky = [150, 190, 235], horizon = [225, 225, 220], ground = [70, 66, 60];
            for (let y = 0; y < h; y++) {
                const v = y / (h - 1);                     // 0 top .. 1 bottom
                for (let x = 0; x < w; x++) {
                    let r, g, b;
                    if (v < 0.5) {
                        const t = v / 0.5;
                        r = sky[0] + (horizon[0] - sky[0]) * t;
                        g = sky[1] + (horizon[1] - sky[1]) * t;
                        b = sky[2] + (horizon[2] - sky[2]) * t;
                    } else {
                        const t = (v - 0.5) / 0.5;
                        r = horizon[0] + (ground[0] - horizon[0]) * t;
                        g = horizon[1] + (ground[1] - horizon[1]) * t;
                        b = horizon[2] + (ground[2] - horizon[2]) * t;
                    }
                    if (!blurred) {
                        // soft sun highlight near the top-center
                        const u = x / (w - 1);
                        const d = Math.hypot((u - 0.5), (v - 0.18));
                        const sun = Math.max(0, 1 - d / 0.16);
                        const s = sun * sun * 255;
                        r = Math.min(255, r + s); g = Math.min(255, g + s); b = Math.min(255, b + s);
                    }
                    const i = (y * w + x) * 4;
                    data[i] = r; data[i + 1] = g; data[i + 2] = b; data[i + 3] = 255;
                }
            }
            const tex = new THREE.DataTexture(data, w, h, THREE.RGBAFormat);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.ClampToEdgeWrapping;
            tex.minFilter = blurred ? THREE.LinearFilter : THREE.LinearMipmapLinearFilter;
            tex.magFilter = THREE.LinearFilter;
            tex.generateMipmaps = !blurred;
            tex.needsUpdate = true;
            return tex;
        };

        // Path to a user-supplied equirectangular (lat-long) environment map.
        // Drop a file next to the page and point this at it. .hdr is loaded via
        // RGBELoader (true HDR lighting); .jpg/.png/.exr* load via TextureLoader.
        // Leave as-is / remove the file to fall back to the synthesized sky.
        const ENV_MAP_URL = './san_giuseppe_bridge.hdr';

        // Load the environment ONCE and reuse across previews. Resolves to
        // { radiance, irradiance, mips } or null if no file is present, in
        // which case the caller uses the synthesized makeEnvTexture sky.
        let envPromise = null;
        // ---- Environment preparation: OFFICIAL VIEWER PARITY ----
        // The official viewer (main.js) does, per texture:
        //   prepareEnvTexture: DataTexture(RGBA), RepeatWrapping (S), max
        //   anisotropy, LinearMipmapLinearFilter, generateMipmaps = TRUE.
        // and loads TWO files: a radiance env and a PREFILTERED IRRADIANCE
        // env ('Lights/irradiance/<same>.hdr'). Mips are essential: the FIS
        // specular lookup picks its LOD from roughness — without a mip chain
        // every roughness samples the razor-sharp base level, which reads as
        // "too reflective" and makes the highlight pattern swim ("rotate")
        // as roughness changes.
        //
        // r128 gotcha (cause of an earlier all-black regression): RGBELoader's
        // half-float path outputs RGB-format data, and RGB16F is NOT
        // color-renderable, so gl.generateMipmap fails → incomplete texture →
        // samples black. Official three's loader emits RGBA. Fix: pad RGB →
        // RGBA before upload, THEN mipmapping is safe.
        const padToRGBA = (tex) => {
            const img = tex.image;
            if (!img || !img.data) return tex;
            const n = img.width * img.height;
            if (img.data.length >= n * 4) return tex; // already RGBA
            const C = img.data.constructor;
            const out = new C(n * 4);
            const one = (C === Uint16Array) ? 0x3C00 /* half 1.0 */ : 1.0;
            for (let i = 0; i < n; i++) {
                out[i * 4] = img.data[i * 3];
                out[i * 4 + 1] = img.data[i * 3 + 1];
                out[i * 4 + 2] = img.data[i * 3 + 2];
                out[i * 4 + 3] = one;
            }
            return new THREE.DataTexture(out, img.width, img.height, THREE.RGBAFormat, tex.type);
        };
        const prepareEnv = (tex) => {
            const t = padToRGBA(tex);
            t.mapping = THREE.EquirectangularReflectionMapping;
            t.wrapS = THREE.RepeatWrapping;
            t.wrapT = THREE.ClampToEdgeWrapping;
            t.minFilter = THREE.LinearMipmapLinearFilter;
            t.magFilter = THREE.LinearFilter;
            t.generateMipmaps = true;
            t.anisotropy = 8; // three clamps to the device max at upload
            t.encoding = THREE.LinearEncoding;
            t.needsUpdate = true;
            return t;
        };

        const _f32 = new Float32Array(1);
        const _u32 = new Uint32Array(_f32.buffer);
        const floatToHalf = (val) => {
            _f32[0] = val;
            const x = _u32[0];
            const sign = (x >> 16) & 0x8000;
            const exp = ((x >> 23) & 0xFF) - 127 + 15;
            if (exp <= 0) return sign;                 // underflow → signed 0
            if (exp >= 31) return sign | 0x7BFF;       // clamp to max half
            return sign | (exp << 10) | ((x & 0x7FFFFF) >> 13);
        };
        const halfToFloat = (h) => {
            const sign = (h & 0x8000) ? -1 : 1;
            const exp = (h >> 10) & 0x1F;
            const frac = h & 0x3FF;
            if (exp === 0) return sign * frac * Math.pow(2, -24);
            if (exp === 31) return frac ? NaN : sign * Infinity;
            return sign * (1 + frac / 1024) * Math.pow(2, exp - 15);

        // Fallback when no prefiltered irradiance file exists: box-average the
        // radiance down to 64x32. Not a true cosine convolution, but close
        // enough that diffuse stops mirroring the environment.
        const downsampleIrradiance = (tex) => {
            try {
                const img = tex.image;
                const W = 64, H = 32;
                const stride = img.data.length / (img.width * img.height); // 3 or 4
                const isHalf = img.data.constructor === Uint16Array;
                const out = new Uint16Array(W * H * 4);

                const by = Math.max(1, Math.floor(img.height / H));

                        let r = 0, g = 0, b = 0, cnt = 0;
                        for (let sy = 0; sy < by; sy++) {

                                g += isHalf ? halfToFloat(img.data[px + 1]) : img.data[px + 1];
                                b += isHalf ? halfToFloat(img.data[px + 2]) : img.data[px + 2];
                                cnt++;

                        const o = (y * W + x) * 4;
                        out[o] = floatToHalf(r / cnt);
                        out[o + 1] = floatToHalf(g / cnt);
                        out[o + 2] = floatToHalf(b / cnt);
                        out[o + 3] = 0x3C00;

        const loadHDR = (url) => new Promise((resolve) => {
            if (!THREE.RGBELoader) return resolve(null);

                // data only built-in materials can decode); HalfFloatType makes
                // it decode to linear float at load.
                new THREE.RGBELoader()
                    .setDataType(THREE.HalfFloatType)
                    .load(url, resolve, undefined, () => resolve(null));
            } catch (e) { resolve(null); }
        });
        const getEnvironment = () => {
            if (!envPromise) {
                envPromise = Promise.all([
                    loadHDR(ENV_MAP_URL),
                    loadHDR(IRRADIANCE_MAP_URL),
                ]).then(([radRaw, irrRaw]) => {
                    if (!radRaw) return null; // no file → synthesized sky
                    const radiance = prepareEnv(radRaw);
                    // Prefer the prefiltered irradiance file (drop the official
                    // viewer's Lights/irradiance/<name>.hdr next to the app as
                    // ./irradiance.hdr for exact parity); else downsample.
                    const irrSrc = irrRaw || downsampleIrradiance(radRaw);
                    const irradiance = irrSrc ? prepareEnv(irrSrc) : radiance;
                    const img = radiance.image;
                    const mips = Math.trunc(Math.log2(Math.max(img.width, img.height))) + 1;

                });
            }
            return envPromise;
        };

        // Standard MaterialX color spaces accepted on filename inputs.
        // Changing one is a CODEGEN decision (the CMS inserts the transform
        // into the shader), so the picker goes through the regen override
        // path, not a uniform.
        const COLORSPACES = ['srgb_texture', 'lin_rec709', 'g22_rec709', 'g18_rec709',
            'acescg', 'lin_ap1', 'srgb_displayp3', 'lin_displayp3', 'adobergb', 'lin_adobergb', 'none'];

        const Node3DPreview = ({ nodeName, enabled, onEnable }) => {
            const canvasRef = React.useRef(null);
            // The live three.js uniforms object — mutated directly by the
            // parameter UI so edits render on the next frame with no shader
            // regeneration.
            const uniformsRef = React.useRef(null);
            const [error, setError] = React.useState(null);
            // Informational "can't preview this" (vs a real failure): both
            // render as a slim text row INSTEAD of the viewport box.
            const [notice, setNotice] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            // [{ uniform, label, type, def, min, max, enumNames, enumValues }]
            const [params, setParams] = React.useState([]);
            const [values, setValues] = React.useState({});
            // Mirrors of the live edit state that SURVIVE re-inits, so switching
            // geometry (or a string/colorspace regen) does NOT reset the user's
            // parameter edits. Cleared only when the NODE changes.
            const valuesRef = React.useRef({});
            const pickedTexRef = React.useRef({});
            const prevNodeRef = React.useRef(null);
            // Bumped on reset and included in each control's React key: this
            // REMOUNTS every input, guaranteeing the DOM redraws from the
            // default even when a field has drifted (e.g. cleared/partially
            // typed text that onChange rejected as NaN — React won't rewrite
            // a controlled input whose value prop didn't change).
            const [resetNonce, setResetNonce] = React.useState(0);
            // Overrides for inputs that AREN'T live uniforms (string/enum inputs
            // select a code path at generation time). Changing one re-runs the
            // effect (it's in the dep array) so the shader is regenerated with
            // the new value applied to the node instance. Map: inputName ->
            // { value, type }.
            const [overrides, setOverrides] = React.useState({});
            const overridesRef = React.useRef(overrides);
            overridesRef.current = overrides;
            // The node these overrides belong to — guards against applying one
            // node's string edits to another after a selection change.
            const overridesNodeRef = React.useRef(null);
            // Clear overrides when the selected node changes (only when there
            // are any, to avoid a redundant regen pass).
            React.useEffect(() => {
                setOverrides((prev) => (Object.keys(prev).length ? {} : prev));
            }, [nodeName]);

            });
            const pickGeom = (g) => {
                try { localStorage.setItem('mtlx_preview_geom', g); } catch (e) { /* best-effort */ }
                setGeom(g);
            };

            // a ref so toggling doesn't re-init the whole preview.
            const [paused, setPaused] = React.useState(false);
            const controlsRef = React.useRef(null);
            const togglePaused = () => setPaused((p) => {
                const np = !p;

                return np;
            });
            // Metadata for the .mtlx export (node element type, kind).
            const exportMetaRef = React.useRef(null);
            // Live document + created node handles for the doc-based export.
            const exportDocRef = React.useRef(null);

            // Write a plain JS value (number / bool / array) into the matching
            // three.js uniform. Arrays map onto Vector2/3/4 via .set(...).
            const setUniformFromPlain = (p, v) => {
                const store = uniformsRef.current;
                const u = store ? store[p.uniform] : null;
                if (!u) return;
                if (Array.isArray(v)) {
                    if (u.value && u.value.set) u.value.set.apply(u.value, v);

            };
            const onParamChange = (p, v) => {
                if (p.readonly) return;
                valuesRef.current = Object.assign({}, valuesRef.current, { [p.uniform]: v });
                setValues((prev) => Object.assign({}, prev, { [p.uniform]: v }));
                if (p.live) {
                    // Numeric/vector/color/bool backed by a uniform → update in
                    // place; renders next frame, no regeneration.
                    setUniformFromPlain(p, v);
                } else if (p.regen) {
                    // String/enum (compile-time) → apply to the node instance and
                    // regenerate by bumping `overrides` (in the effect deps).

                    setOverrides((prev) => Object.assign({}, prev, { [p.input]: { value: v, type: p.type } }));
                }
            };
            // Colorspace picker for a filename input → override + regen.
            // '(nodedef default)' removes the override so the nodedef's own
            // colorspace applies again.
            const onColorspacePick = (p, cs) => {
                valuesRef.current = Object.assign({}, valuesRef.current, { ['cs::' + p.input]: cs || undefined });
                setValues((prev) => Object.assign({}, prev, { ['cs::' + p.input]: cs || undefined }));
                overridesNodeRef.current = nodeName;
                setOverrides((prev) => {
                    const next = Object.assign({}, prev);
                    if (cs) next[p.input] = { value: cs, type: 'colorspace' };
                    else delete next[p.input];
                    return next;
                });
            };
            // Load a user image into a filename sampler uniform (live).
            const onFilePick = (p, file) => {
                if (!file) return;

                    configureLoadedTexture(tex);

                    pickedTexRef.current[p.uniform] = tex;
                    const store = uniformsRef.current;
                    if (store && store[p.uniform]) store[p.uniform].value = tex;

                }, undefined, () => URL.revokeObjectURL(url));
                valuesRef.current = Object.assign({}, valuesRef.current, { [p.uniform]: file.name });
                setValues((prev) => Object.assign({}, prev, { [p.uniform]: file.name }));
            };
            const onResetDefaults = () => {
                const next = {};
                const store = uniformsRef.current;
                for (const p of params) {
                    if (p.readonly) continue;
                    if (p.type === 'filename') {
                        if (store && store[p.uniform]) store[p.uniform].value = getDefaultTexture();
                        next[p.uniform] = null;
                        continue;
                    }
                    const v = Array.isArray(p.def) ? p.def.slice() : p.def;
                    if (p.live) setUniformFromPlain(p, v);
                    next[p.uniform] = v;
                }
                valuesRef.current = next;
                pickedTexRef.current = {};
                setValues(next);
                // Clearing overrides regenerates from nodedef defaults (only if
                // any string/enum input had been changed).
                setOverrides((prev) => (Object.keys(prev).length ? {} : prev));
                // Remount every control (see resetNonce comment): without this,

            // nodes get a surfacematerial wrapper for drop-in use.

                const meta = exportMetaRef.current;

                const fmt = (p, v) => {
                    if (p.type === 'boolean') return v ? 'true' : 'false';
                    if (Array.isArray(v)) return v.map(num).join(', ');
                    if (p.type === 'string' || p.type === 'filename') return String(v);
                    return num(v);
                };

                //    current UI values. Inputs not yet on the instance are
                //    created bare and then copyContentFrom the nodedef's own

                //    C++, so no type string crosses the JS/wasm boundary
                //    (both addInput's type argument and setType produced

            React.useEffect(() => {
                let reqId;
                let renderer;
                let resizeObs;
                let mounted = true;

                // machines pay nothing while browsing docs.

                    setLoading(false);
                    setError(null);
                    setNotice(null);
                    setParams([]);
                    setValues({});
                    uniformsRef.current = null;
                    return () => { mounted = false; };

                    setLoading(true);
                    setError(null);
                    setNotice(null);
                    setParams([]);
                    setValues({});

                        mxRef = mx;

                            if (grp.toLowerCase() === 'translation') translationDef = defs0[0];

                        exportMetaRef.current = {

                                ? (multiOutput ? 'multioutput' : outType)
                                : (rk.type || (kind === 'bsdf' ? 'BSDF' : 'surfaceshader')),
                            // Wiring needed to re-emit the EXACT previewed graph

                            multiOutput,

                        let needsLighting = false;

                            input.setNodeName(srcNode);

                            // Ignore overrides left over from a different node.
                            if (overridesNodeRef.current && overridesNodeRef.current !== nodeName) return;

                                try {
                                    // The JS embind addInput can DROP/DEFAULT the
                                    // type argument, leaving the input typed
                                    // 'color3' — which breaks nodedef resolution
                                    // ("Could not find a nodedef for node ...",
                                    // reproduced against real MaterialX with a
                                    // mistyped input). Force the type explicitly.

                            }

                        // copyContentFrom transfers the nodedef input's type
                        // (and default) verbatim inside C++. A verification +

                            let inp = (inst.getInput && inst.getInput(inputName)) || null;
                            let how = 'existing';
                            if (!inp) {
                                let defInput = null;

                                    const cat = inst.getCategory ? inst.getCategory() : nodeName;
                                    for (const d of vecToArray(doc.getMatchingNodeDefs(cat))) {

                                        if (defInput) break;
                                    }
                                } catch (e) { defInput = null; }
                                inp = inst.addInput(inputName);
                                how = 'added-bare';
                                if (defInput) {
                                    try {
                                        inp.copyContentFrom(defInput);
                                        how = 'copied-from-nodedef';
                                        // The copy brings the nodedef's UI/doc
                                        // metadata along — meaningless on an
                                        // instance and noisy in exports.
                                        for (const attr2 of ['uimin', 'uimax', 'uisoftmin', 'uisoftmax', 'uistep',
                                            'uiname', 'uifolder', 'uiadvanced', 'doc', 'enum', 'enumvalues']) {
                                            try { inp.removeAttribute(attr2); } catch (e2) { /* absent */ }
                                        }
                                    } catch (e) { /* verify below */ }
                                }
                            }
                            let got = '';
                            try { got = String(inp.getType()); } catch (e) { got = '?'; }
                            if (wantedType && got !== wantedType && how !== 'copied-from-nodedef') {
                                try {
                                    if (typeof inp.setType === 'function') inp.setType(wantedType);
                                    else inp.setAttribute('type', wantedType);
                                    got = String(inp.getType());
                                } catch (e) { /* keep got */ }

                            }
                            return inp;
                        };

                            renderable = doc.addNode(nodeName, 'preview_surface', 'surfaceshader');
                            applyOverrides(renderable);
                            previewInstance = renderable;
                            createdNodes.push(renderable);
                            needsLighting = true;
                        } else if (kind === 'bsdf') {
                            previewInstance = doc.addNode(nodeName, 'preview_bsdf', 'BSDF');
                            applyOverrides(previewInstance);
                            createdNodes.push(previewInstance);
                            renderable = doc.addNode('surface', 'preview_surface', 'surfaceshader');
                            addTypedInput(renderable, 'bsdf', 'BSDF').setNodeName('preview_bsdf');
                            createdNodes.push(renderable);
                            needsLighting = true;
                        } else if (kind === 'translation') {
                            // Translation node (multi-output) + the TARGET shader
                            // it translates to + a material. Every translation
                            // output wires to the target's same-named input —
                            // outputs carry an `_out` suffix the inputs don't
                            // (verified against real MaterialX: all four stdlib
                            // translation nodes map fully and generate).
                            previewInstance = doc.addNode(nodeName, 'preview_node', 'multioutput');
                            applyOverrides(previewInstance);
                            createdNodes.push(previewInstance);
                            const targetCat = nodeName.split('_to_')[1];
                            renderable = doc.addNode(targetCat, 'preview_surface', 'surfaceshader');
                            createdNodes.push(renderable);
                            for (const out of vecToArray(translationDef.getOutputs ? translationDef.getOutputs() : null)) {
                                const oName = out.getName();
                                const iName = oName.slice(-4) === '_out' ? oName.slice(0, -4) : oName;
                                const oT = out.getType ? out.getType() : 'color3';
                                const oTypeStr = (oT && oT.getName) ? oT.getName() : String(oT);
                                const inp = addTypedInput(renderable, iName, oTypeStr);
                                inp.setNodeName('preview_node');
                                inp.setAttribute('output', oName);
                            }
                            const mat = doc.addNode('surfacematerial', 'preview_material', 'material');
                            addTypedInput(mat, 'surfaceshader', 'surfaceshader').setNodeName('preview_surface');
                            createdNodes.push(mat);
                            needsLighting = true;
                        } else if (kind === 'color') {
                            // Multi-output nodes must be instantiated as
                            // 'multioutput'; the tapped output is selected via
                            // the downstream input's `output` attribute.
                            previewInstance = doc.addNode(nodeName, 'preview_node', multiOutput ? 'multioutput' : outType);
                            applyOverrides(previewInstance);
                            createdNodes.push(previewInstance);
                            let srcName = 'preview_node';
                            if (outType !== 'color3' || outputName) {
