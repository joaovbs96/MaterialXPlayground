<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaterialX Node Previewer</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-8 font-sans">
    <div id="root" class="max-w-6xl mx-auto"></div>

    <script type="text/babel">
        // When hosted (e.g. GitHub Pages), the viewer auto-loads this file
        // from the same directory as the page. If the fetch fails (file
        // missing, or opening the HTML locally via file://), the manual
        // upload input still works as before.
        const DATA_URL = 'nodes.json';

        // Turn a normalized header key back into a display label,
        // e.g. "accepted_values" -> "Accepted Values".
        const headerLabel = (key) =>
            key.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

        // ------------------------------------------------------------------
        // Rich text: node prose may contain $inline$ / $$display$$ math
        // spans (preserved verbatim by the parser) and footnote references
        // like [^Oren1994]. Math renders via KaTeX; footnote refs render as
        // superscript numbered links into the node's reference list. If
        // KaTeX failed to load or a span doesn't parse, the raw text shows
        // instead so nothing is ever lost.
        // ------------------------------------------------------------------
        const RICH_SPLIT_RE = /(\$\$[^$]+\$\$|\$[^$\n]+\$|\[\^[^\]\s]+\])/g;
        const FOOTNOTE_RE = /^\[\^([^\]\s]+)\]$/;

        function MathText({ text, refs }) {
            if (text == null || text === '') return null;
            const parts = String(text).split(RICH_SPLIT_RE);
            return (
                <React.Fragment>
                    {parts.map((part, i) => {
                        if (!part) return null;

                        // Footnote reference -> superscript link [n]
                        const fn = part.match(FOOTNOTE_RE);
                        if (fn) {
                            const ref = refs && refs[fn[1]];
                            if (ref) {
                                const marker = `[${ref.n}]`;
                                return (
                                    <sup key={i} className="text-blue-400">
                                        {ref.url ? (
                                            <a href={ref.url} target="_blank" rel="noreferrer"
                                               title={ref.text || fn[1]}
                                               className="hover:underline">{marker}</a>
                                        ) : (
                                            <span title={ref.text || fn[1]}>{marker}</span>
                                        )}
                                    </sup>
                                );
                            }
                            return <span key={i}>{part}</span>; // unknown key: keep raw
                        }

                        // Math span -> KaTeX
                        const isDisplay = part.length > 4 && part.startsWith('$$') && part.endsWith('$$');
                        const isInline = !isDisplay && part.length > 2 && part.startsWith('$') && part.endsWith('$');
                        if ((isDisplay || isInline) && window.katex) {
                            const src = isDisplay ? part.slice(2, -2) : part.slice(1, -1);
                            try {
                                const html = window.katex.renderToString(src, {
                                    displayMode: isDisplay,
                                    throwOnError: true,
                                });
                                return <span key={i} dangerouslySetInnerHTML={{ __html: html }} />;
                            } catch (err) {
                                return <span key={i}>{part}</span>;
                            }
                        }
                        return <span key={i}>{part}</span>;
                    })}
                </React.Fragment>
            );
        }

        // Renders multi-paragraph prose (description / notes): paragraphs
        // are separated by \n\n; a paragraph starting with '#'s is a
        // sub-heading (e.g. "#### Reflectance Equations"); a standalone
        // "$$...$$" paragraph becomes a centered display equation.
        const SUBHEADING_RE = /^#{1,6}\s+(.*)$/;

        function RichBlocks({ text, refs, className }) {
            if (!text) return null;
            return (
                <div className={className}>
                    {text.split('\n\n').map((block, i) => {
                        const h = block.match(SUBHEADING_RE);
                        if (h) {
                            return (
                                <h4 key={i} className="text-sm font-semibold text-gray-200 uppercase tracking-wider mt-5 mb-2">
                                    {h[1]}
                                </h4>
                            );
                        }
                        return (
                            <p key={i} className="mb-3">
                                <MathText text={block} refs={refs} />
                            </p>
                        );
                    })}
                </div>
            );
        }

        // Normalize a node entry so the viewer supports both the new
        // schema ({ port_tables: [{headers, ports}, ...] }) and the old
        // one ({ ports: {...} }).
        const getPortTables = (nodeInfo) => {
            if (Array.isArray(nodeInfo.port_tables)) return nodeInfo.port_tables;
            if (nodeInfo.ports && Object.keys(nodeInfo.ports).length > 0) {
                const firstRow = Object.values(nodeInfo.ports)[0] || {};
                return [{ headers: ['port', ...Object.keys(firstRow)], ports: nodeInfo.ports }];
            }
            return [];
        };

        // A node counts as undocumented when it has no port tables, no
        // notes, and no real description (the parser emits the fallback
        // string "No documentation available." for spec-less nodedefs).
        const isUndocumented = (info) => {
            if (getPortTables(info).length > 0) return false;
            if (info.notes) return false;
            const desc = (info.description || '').trim();
            return desc === '' || desc === 'No documentation available.';
        };

        // ------------------------------------------------------------------
        // Shared column layout: every table of a node renders the SAME
        // columns in the SAME order with FIXED widths, so stacked tables
        // line up instead of each computing its own widths.
        // ------------------------------------------------------------------
        const CANONICAL_ORDER = ['port', 'description', 'type', 'default', 'accepted_values'];
        const COL_WIDTHS = {
            port: 'w-40',
            type: 'w-48',
            default: 'w-36',
            accepted_values: 'w-44',
            // description gets whatever space is left
        };
        const CELL_STYLES = {
            port: 'font-medium text-blue-400 font-mono break-words',
            type: 'font-mono text-xs text-purple-400 break-words',
            default: 'font-mono text-xs text-yellow-300 break-words',
            accepted_values: 'font-mono text-xs text-green-400 break-words',
        };

        const unionColumns = (tables) => {
            const seen = new Set();
            tables.forEach(t => (t.headers || []).forEach(h => seen.add(h)));
            tables.forEach(t => Object.values(t.ports || {}).forEach(row =>
                Object.keys(row).forEach(k => seen.add(k))
            ));
            seen.add('port');
            const ordered = CANONICAL_ORDER.filter(c => seen.has(c));
            [...seen].sort().forEach(c => { if (!CANONICAL_ORDER.includes(c)) ordered.push(c); });
            return ordered;
        };

        // ------------------------------------------------------------------
        // Signature labels: derive "inputs → output" type summaries from
        // each table, resolving "Same as <port>" references, so headings
        // read e.g. "surfaceshader" or "boolean → float, integer" instead
        // of just "Signature 2 of 3".
        // ------------------------------------------------------------------
        const SAME_AS_RE = /^same as\s+(\S+?)(?:\s+or\s+(.+))?$/i;

        const resolveType = (ports, portName, seen) => {
            seen = seen || new Set();
            const row = ports[portName];
            if (!row || seen.has(portName)) return '';
            seen.add(portName);
            const t = (row.type || '').trim();
            const m = t.match(SAME_AS_RE);
            if (!m) return t;
            const resolved = resolveType(ports, m[1], seen);
            if (!resolved) return t; // unresolvable reference: keep raw text
            return m[2] ? `${resolved}, ${m[2]}` : resolved;
        };

        const isOutputPort = (name, row) =>
            name === 'out' || /^output\b/i.test(row.description || '');

        // Split resolved type strings ("colorN, vectorN") into individual
        // tokens and dedupe at token level, so "Same as in1 or float" on a
        // matrixNN input yields "matrixNN, float" rather than
        // "matrixNN, matrixNN, float".
        const uniqTypeTokens = (typeStrings) => {
            const seen = new Set();
            const out = [];
            typeStrings.filter(Boolean).forEach(s =>
                s.split(',').map(t => t.trim()).filter(Boolean).forEach(t => {
                    if (!seen.has(t)) { seen.add(t); out.push(t); }
                })
            );
            return out;
        };

        const signatureLabel = (table) => {
            const ports = table.ports || {};
            const names = Object.keys(ports);
            const inTypes = uniqTypeTokens(names
                .filter(n => !isOutputPort(n, ports[n]))
                .map(n => resolveType(ports, n)));
            const outTypes = uniqTypeTokens(names
                .filter(n => isOutputPort(n, ports[n]))
                .map(n => resolveType(ports, n)));
            if (!inTypes.length && !outTypes.length) return null;
            const inStr = inTypes.join(', ');
            const outStr = outTypes.join(', ');
            if (!outStr || inStr === outStr) return inStr || outStr;
            if (!inStr) return `→ ${outStr}`;
            return `${inStr} → ${outStr}`;
        };

        function PortTable({ table, columns, refs }) {
            return (
                <div className="overflow-x-auto rounded-lg border border-gray-700">
                    <table className="w-full table-fixed text-sm text-left text-gray-300">
                        <colgroup>
                            {columns.map(col => (
                                <col key={col} className={COL_WIDTHS[col] || ''} />
                            ))}
                        </colgroup>
                        <thead className="text-xs text-gray-400 uppercase bg-gray-900 border-b border-gray-700">
                            <tr>
                                {columns.map(col => (
                                    <th key={col} scope="col" className="px-4 py-3">{headerLabel(col)}</th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {Object.entries(table.ports).map(([portName, portData]) => (
                                <tr className="border-b border-gray-700 last:border-b-0 hover:bg-gray-750" key={portName}>
                                    {columns.map(col => (
                                        <td key={col} className={`px-4 py-3 align-top ${CELL_STYLES[col] || ''}`}>
                                            {col === 'port'
                                                ? portName
                                                : <MathText text={portData[col] || ''} refs={refs} />}
                                        </td>
                                    ))}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        function App() {
            const [jsonData, setJsonData] = React.useState(null);
            const [selectedNode, setSelectedNode] = React.useState(null);

            // KaTeX loads with `defer`; if React renders before it's ready,
            // poll briefly and re-render once it arrives so math spans
            // upgrade from raw text to rendered output.
            const [, setKatexReady] = React.useState(!!window.katex);
            React.useEffect(() => {
                if (window.katex) return;
                const timer = setInterval(() => {
                    if (window.katex) {
                        setKatexReady(true);
                        clearInterval(timer);
                    }
                }, 200);
                return () => clearInterval(timer);
            }, []);

            // State to keep track of which tree folders are open
            const [expandedLibs, setExpandedLibs] = React.useState({});
            const [expandedGroups, setExpandedGroups] = React.useState({});

            // Shared initialization for both auto-loaded and uploaded data.
            const applyData = (parsedData, source) => {
                setJsonData(parsedData);
                setSelectedNode(null);
                setDataSource(source);

                // Expand the first library and group by default for convenience
                const firstLib = Object.keys(parsedData)[0];
                if (firstLib) {
                    setExpandedLibs({ [firstLib]: true });
                    const firstGroup = Object.keys(parsedData[firstLib])[0];
                    if (firstGroup) {
                        setExpandedGroups({ [`${firstLib}-${firstGroup}`]: true });

                        // Select the first node
                        const firstNode = Object.keys(parsedData[firstLib][firstGroup])[0];
                        if (firstNode) {
                            setSelectedNode({
                                lib: firstLib,
                                group: firstGroup,
                                name: firstNode,
                                info: parsedData[firstLib][firstGroup][firstNode]
                            });
                        }
                    }
                }
            };

            // Auto-load the JSON sitting next to the page (works on any web
            // host incl. GitHub Pages; fails silently on file:// or 404,
            // leaving the upload input as the way in).
            const [autoLoad, setAutoLoad] = React.useState('loading'); // loading | done | failed
            const [dataSource, setDataSource] = React.useState(null);
            React.useEffect(() => {
                fetch(DATA_URL)
                    .then(res => {
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        return res.json();
                    })
                    .then(parsed => {
                        applyData(parsed, DATA_URL);
                        setAutoLoad('done');
                    })
                    .catch(() => setAutoLoad('failed'));
            }, []);

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parsedData = JSON.parse(e.target.result);
                        applyData(parsedData, file.name);
                    } catch (error) {
                        alert("Error parsing JSON file. Make sure it's valid.");
                        console.error(error);
                    }
                };
                reader.readAsText(file);
            };

            const toggleLib = (lib) => {
                setExpandedLibs(prev => ({ ...prev, [lib]: !prev[lib] }));
            };

            const toggleGroup = (lib, group) => {
                const key = `${lib}-${group}`;
                setExpandedGroups(prev => ({ ...prev, [key]: !prev[key] }));
            };

            // ----------------------------------------------------------------
            // Documentation stats + "no docs" filter + name search
            // ----------------------------------------------------------------
            const [undocFilter, setUndocFilter] = React.useState(false);
            const [searchQuery, setSearchQuery] = React.useState('');

            const stats = React.useMemo(() => {
                if (!jsonData) return null;
                let total = 0, undoc = 0;
                Object.values(jsonData).forEach(groups =>
                    Object.values(groups).forEach(nodes =>
                        Object.values(nodes).forEach(info => {
                            total++;
                            if (isUndocumented(info)) undoc++;
                        })
                    )
                );
                return { total, undoc };
            }, [jsonData]);

            // The tree renders from treeData: the full data, narrowed by the
            // "no docs" filter and/or the search query, with empty
            // groups/libs pruned.
            const treeData = React.useMemo(() => {
                if (!jsonData) return jsonData;
                const query = searchQuery.trim().toLowerCase();
                if (!undocFilter && !query) return jsonData;
                const filtered = {};
                Object.entries(jsonData).forEach(([lib, groups]) => {
                    Object.entries(groups).forEach(([group, nodes]) => {
                        const kept = {};
                        Object.entries(nodes).forEach(([name, info]) => {
                            if (undocFilter && !isUndocumented(info)) return;
                            if (query && !name.toLowerCase().includes(query)) return;
                            kept[name] = info;
                        });
                        if (Object.keys(kept).length > 0) {
                            if (!filtered[lib]) filtered[lib] = {};
                            filtered[lib][group] = kept;
                        }
                    });
                });
                return filtered;
            }, [jsonData, undocFilter, searchQuery]);

            // While searching, show all matches regardless of stored
            // expansion state; clearing the query restores the prior state.
            const forceOpen = searchQuery.trim() !== '';
            const matchCount = React.useMemo(() => {
                if (!treeData || !forceOpen) return null;
                let n = 0;
                Object.values(treeData).forEach(gs =>
                    Object.values(gs).forEach(ns => { n += Object.keys(ns).length; }));
                return n;
            }, [treeData, forceOpen]);

            // Expand/collapse the whole (visible) tree at once.
            const expandAll = () => {
                const libs = {}, groups = {};
                Object.entries(treeData || {}).forEach(([lib, gs]) => {
                    libs[lib] = true;
                    Object.keys(gs).forEach(g => { groups[`${lib}-${g}`] = true; });
                });
                setExpandedLibs(libs);
                setExpandedGroups(groups);
            };
            const collapseAll = () => {
                setExpandedLibs({});
                setExpandedGroups({});
            };

            const toggleUndocFilter = () => {
                const next = !undocFilter;
                setUndocFilter(next);
                if (next && jsonData) {
                    // Expand everything that contains undocumented nodes so the
                    // filtered view is a complete overview, not collapsed folders.
                    const libs = {}, groups = {};
                    Object.entries(jsonData).forEach(([lib, gs]) => {
                        Object.entries(gs).forEach(([group, nodes]) => {
                            if (Object.values(nodes).some(isUndocumented)) {
                                libs[lib] = true;
                                groups[`${lib}-${group}`] = true;
                            }
                        });
                    });
                    setExpandedLibs(libs);
                    setExpandedGroups(groups);
                }
            };

            // Chevron icons for the tree view
            const ChevronRight = () => (
                <svg className="w-4 h-4 inline-block mr-1 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>
            );
            const ChevronDown = () => (
                <svg className="w-4 h-4 inline-block mr-1 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
            );

            const portTables = selectedNode ? getPortTables(selectedNode.info) : [];
            // One shared column set for all tables of the selected node,
            // so the stacked tables align perfectly.
            const columns = portTables.length > 0 ? unionColumns(portTables) : [];
            // Footnote references: map key -> {n, url, text}, numbered by
            // order of first appearance (the parser preserves that order).
            const references = (selectedNode && selectedNode.info.references) || [];
            const refs = {};
            references.forEach((r, i) => { refs[r.key] = { n: i + 1, url: r.url, text: r.text }; });

            return (
                <div className="space-y-6">
                    <div className="border-b border-gray-700 pb-4">
                        <h1 className="text-3xl font-bold text-blue-400">MaterialX Node Previewer</h1>
                        <p className="text-gray-400 mt-2">Upload your generated <code>materialx_rich_docs.json</code> to preview the documentation.</p>
                    </div>

                    {/* Data source: auto-load status + manual upload/override */}
                    <div className="bg-gray-800 p-4 rounded-lg shadow border border-gray-700">
                        {autoLoad === 'loading' && (
                            <div className="text-sm text-gray-400">Loading <code>{DATA_URL}</code>…</div>
                        )}
                        {autoLoad === 'done' && dataSource === DATA_URL && (
                            <div className="text-sm text-gray-400 mb-3">
                                Loaded <code className="text-gray-200">{DATA_URL}</code> automatically.
                                Upload a different file below to override.
                            </div>
                        )}
                        {autoLoad === 'failed' && !jsonData && (
                            <div className="text-sm text-gray-400 mb-3">
                                No <code>{DATA_URL}</code> found next to this page — upload one below.
                            </div>
                        )}
                        {autoLoad !== 'loading' && (
                            <input
                                type="file"
                                accept=".json"
                                onChange={handleFileUpload}
                                className="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer"
                            />
                        )}
                    </div>

                    {jsonData && stats && (
                        <div className="flex items-center gap-3 flex-wrap text-sm">
                            <span className="bg-gray-800 border border-gray-700 text-gray-200 px-3 py-1.5 rounded-lg">
                                <span className="font-semibold text-white">{stats.total}</span> nodes total
                            </span>
                            <button
                                onClick={stats.undoc > 0 ? toggleUndocFilter : undefined}
                                disabled={stats.undoc === 0}
                                title={stats.undoc === 0
                                    ? "Every node has documentation"
                                    : (undocFilter ? "Click to show all nodes again" : "Click to show only nodes without documentation")}
                                className={`px-3 py-1.5 rounded-lg border transition-colors ${
                                    stats.undoc === 0
                                        ? 'bg-gray-800 border-gray-700 text-gray-500 cursor-default'
                                        : undocFilter
                                            ? 'bg-amber-600 border-amber-500 text-white'
                                            : 'bg-gray-800 border-amber-700/60 text-amber-400 hover:bg-gray-700 cursor-pointer'
                                }`}
                            >
                                <span className="font-semibold">{stats.undoc}</span> without docs
                                {undocFilter && <span className="ml-2 text-amber-100 text-xs">✕ filtering — click to clear</span>}
                            </button>
                        </div>
                    )}

                    {jsonData && (
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6">

                            {/* Left Sidebar: Hierarchical Tree Menu */}
                            <div className="md:col-span-1 bg-gray-800 p-4 rounded-lg shadow border border-gray-700 max-h-[75vh] overflow-y-auto custom-scrollbar">
                                <div className="flex items-center justify-between mb-4 border-b border-gray-700 pb-2">
                                    <h3 className="text-sm font-semibold text-gray-400 uppercase tracking-wider">
                                        Node Library
                                        {undocFilter && <span className="ml-2 normal-case tracking-normal text-amber-400 font-normal">(no docs only)</span>}
                                    </h3>
                                    <div className="flex items-center gap-1">
                                        <button
                                            onClick={expandAll}
                                            title="Expand all"
                                            className="p-1 rounded text-gray-500 hover:text-gray-200 hover:bg-gray-700"
                                        >
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 5l5 5 5-5M7 14l5 5 5-5" />
                                            </svg>
                                        </button>
                                        <button
                                            onClick={collapseAll}
                                            title="Collapse all"
                                            className="p-1 rounded text-gray-500 hover:text-gray-200 hover:bg-gray-700"
                                        >
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 10l5-5 5 5M7 19l5-5 5 5" />
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                                <div className="relative mb-3">
                                    <input
                                        type="text"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        placeholder="Search nodes..."
                                        className="w-full bg-gray-900 border border-gray-700 rounded px-3 py-1.5 pr-8 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-blue-500"
                                    />
                                    {searchQuery && (
                                        <button
                                            onClick={() => setSearchQuery('')}
                                            title="Clear search"
                                            className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-200"
                                        >
                                            ✕
                                        </button>
                                    )}
                                </div>
                                {matchCount !== null && (
                                    <div className="text-xs text-gray-500 mb-2">
                                        {matchCount} {matchCount === 1 ? 'match' : 'matches'}
                                    </div>
                                )}
                                {(undocFilter || forceOpen) && Object.keys(treeData).length === 0 && (
                                    <div className="text-xs text-gray-500 italic">No matching nodes.</div>
                                )}
                                <div className="space-y-1 text-sm">
                                    {Object.entries(treeData).map(([lib, groups]) => (
                                        <div key={lib} className="select-none">
                                            {/* Library Level */}
                                            <div
                                                className="flex items-center cursor-pointer hover:text-blue-400 text-gray-200 font-medium py-1"
                                                onClick={() => toggleLib(lib)}
                                            >
                                                {(expandedLibs[lib] || forceOpen) ? <ChevronDown /> : <ChevronRight />}
                                                {lib.toUpperCase()}
                                            </div>

                                            {/* Group Level */}
                                            {(expandedLibs[lib] || forceOpen) && (
                                                <div className="ml-4 border-l border-gray-700 pl-2 space-y-1 mt-1">
                                                    {Object.entries(groups).map(([group, nodes]) => {
                                                        const groupKey = `${lib}-${group}`;
                                                        return (
                                                            <div key={groupKey}>
                                                                <div
                                                                    className="flex items-center cursor-pointer hover:text-blue-300 text-gray-400 py-1"
                                                                    onClick={() => toggleGroup(lib, group)}
                                                                >
                                                                    {(expandedGroups[groupKey] || forceOpen) ? <ChevronDown /> : <ChevronRight />}
                                                                    {group}
                                                                </div>

                                                                {/* Node Level */}
                                                                {(expandedGroups[groupKey] || forceOpen) && (
                                                                    <div className="ml-4 border-l border-gray-700 pl-2 space-y-1 mt-1">
                                                                        {Object.entries(nodes).map(([nodeName, nodeInfo]) => {
                                                                            // A node name can exist in several groups (e.g. the
                                                                            // color `mix` and the shader `mix`), so selection is
                                                                            // keyed on lib + group + name.
                                                                            const isSelected = selectedNode
                                                                                && selectedNode.name === nodeName
                                                                                && selectedNode.lib === lib
                                                                                && selectedNode.group === group;
                                                                            return (
                                                                                <div
                                                                                    key={nodeName}
                                                                                    onClick={() => setSelectedNode({ lib, group, name: nodeName, info: nodeInfo })}
                                                                                    className={`cursor-pointer py-1 px-2 rounded font-mono text-xs ${isSelected ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-700 hover:text-gray-200'}`}
                                                                                >
                                                                                    {nodeName}
                                                                                </div>
                                                                            )
                                                                        })}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Right Content Area: Node Details */}
                            <div className="md:col-span-3 bg-gray-800 p-6 rounded-lg shadow border border-gray-700 max-h-[75vh] overflow-y-auto custom-scrollbar">
                                {selectedNode ? (
                                    <div>
                                        <div className="flex items-center gap-3 mb-2 flex-wrap">
                                            <h2 className="text-3xl font-bold text-white font-mono">{selectedNode.name}</h2>
                                            <span className="bg-gray-700 text-gray-300 text-xs px-2 py-1 rounded border border-gray-600">
                                                {selectedNode.lib} / {selectedNode.group}
                                            </span>
                                            {selectedNode.info.section && (
                                                <span className="bg-gray-700 text-gray-400 text-xs px-2 py-1 rounded border border-gray-600">
                                                    spec: {selectedNode.info.section}
                                                </span>
                                            )}
                                        </div>

                                        {/* Description: paragraphs before the first table */}
                                        <RichBlocks
                                            text={selectedNode.info.description}
                                            refs={refs}
                                            className="text-gray-300 leading-relaxed mb-8 text-lg"
                                        />

                                        {/* One rendered table per markdown table in the spec */}
                                        {portTables.length > 0 ? (
                                            <div className="space-y-6">
                                                {portTables.map((table, i) => {
                                                    const label = signatureLabel(table);
                                                    return (
                                                        <div key={i}>
                                                            {portTables.length > 1 && (
                                                                <div className="flex items-baseline gap-2 mb-2">
                                                                    {label ? (
                                                                        <span className="font-mono text-sm text-gray-200">{label}</span>
                                                                    ) : (
                                                                        <span className="text-xs font-semibold text-gray-400 uppercase tracking-wider">
                                                                            Signature {i + 1} of {portTables.length}
                                                                        </span>
                                                                    )}
                                                                    {label && (
                                                                        <span className="text-xs text-gray-500">
                                                                            {i + 1} / {portTables.length}
                                                                        </span>
                                                                    )}
                                                                </div>
                                                            )}
                                                            <PortTable table={table} columns={columns} refs={refs} />
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        ) : (
                                            <div className="bg-gray-900 border border-gray-700 rounded p-4 text-sm text-gray-500 italic">
                                                No specific ports defined or extracted for this node.
                                            </div>
                                        )}

                                        {/* Notes: prose after/between tables (sub-headings, equations, ...) */}
                                        {selectedNode.info.notes && (
                                            <RichBlocks
                                                text={selectedNode.info.notes}
                                                refs={refs}
                                                className="text-gray-300 leading-relaxed mt-8 pt-6 border-t border-gray-700"
                                            />
                                        )}

                                        {/* References: footnotes cited by this node */}
                                        {references.length > 0 && (
                                            <div className="mt-8 pt-6 border-t border-gray-700">
                                                <h4 className="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">References</h4>
                                                <ol className="space-y-2 text-sm text-gray-400">
                                                    {references.map((r, i) => (
                                                        <li key={r.key} className="flex gap-2">
                                                            <span className="text-gray-500 shrink-0">[{i + 1}]</span>
                                                            <span>
                                                                {r.text || r.key}
                                                                {r.url && (
                                                                    <a href={r.url} target="_blank" rel="noreferrer"
                                                                       className="ml-2 text-blue-400 hover:underline break-all">
                                                                        {r.url}
                                                                    </a>
                                                                )}
                                                            </span>
                                                        </li>
                                                    ))}
                                                </ol>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="text-gray-500 flex items-center justify-center h-full">
                                        Select a node from the tree to view its details.
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        /* Custom scrollbar to match the dark theme */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1f2937;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #4b5563;
        }
    </style>
</body>
</html>
