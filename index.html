                            </a>
                            <a
                                href={SPEC_DOCS_URL} target="_blank" rel="noopener noreferrer"
                                title="MaterialX specification & documentation (version reported by the MaterialX JS API)"
                                className="text-xs px-3 py-1.5 rounded-lg border bg-gray-800 border-gray-600 text-gray-300 hover:bg-gray-700 transition-colors"
                            >
                                Spec/Docs: {mtlxVersion ? 'v' + mtlxVersion : '…'}
                            </a>
                            <button
                                onClick={togglePreviews}
                                title="Globally enable/disable the WebGL node previews (saves resources on slow machines)"
                                className={`text-xs px-3 py-1.5 rounded-lg border transition-colors ${
                                    showPreviews
                                        ? 'bg-gray-800 border-gray-600 text-gray-200 hover:bg-gray-700'
                                        : 'bg-gray-800 border-amber-700/60 text-amber-400 hover:bg-gray-700'
                                }`}
                            >
                                3D previews: {showPreviews ? 'On' : 'Off'}
                            </button>
                        </div>
                    </div>

                    {/* Data source status: visible only while loading or on failure */}
                    {autoLoad === 'loading' && (
                        <div className="bg-gray-800 p-4 rounded-lg shadow border border-gray-700 text-sm text-gray-400">
                            Loading <code>{DATA_URL}</code>…
                        </div>
                    )}
                    {autoLoad === 'failed' && (
                        <div className="bg-gray-800 p-4 rounded-lg shadow border border-amber-700/60 text-sm text-gray-300">
                            Could not load <code className="text-amber-400">{DATA_URL}</code>.
                        </div>
                    )}

                    {jsonData && stats && (
                        <div className="flex items-center gap-3 flex-wrap text-sm">
                            <span className="bg-gray-800 border border-gray-700 text-gray-200 px-3 py-1.5 rounded-lg">
                                <span className="font-semibold text-white">{stats.total}</span> nodes total
                            </span>
                            <span className={`px-3 py-1.5 rounded-lg border ${
                                stats.undoc > 0
                                    ? 'bg-gray-800 border-amber-700/60 text-amber-400'
                                    : 'bg-gray-800 border-gray-700 text-gray-500'
                            }`}>
                                <span className="font-semibold">{stats.undoc}</span> without docs
                            </span>
                            <div className="inline-flex rounded-lg border border-gray-700 overflow-hidden" role="group" aria-label="Documentation filter">
                                {[
                                    { mode: 'all', label: 'Show all' },
                                    { mode: 'documented', label: 'Only documented' },
                                    { mode: 'undocumented', label: 'Only undocumented' },
                                ].map(({ mode, label }, i) => (
                                    <button
                                        key={mode}
                                        onClick={() => applyDocFilter(mode)}
                                        className={`px-2 sm:px-3 py-1.5 text-xs sm:text-sm transition-colors ${i > 0 ? 'border-l border-gray-700' : ''} ${
                                            docFilter === mode
                                                ? 'bg-blue-600 text-white'
                                                : 'bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-gray-200'
                                        }`}
                                    >
                                        {label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {jsonData && (
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-3 sm:gap-6">

                            {/* Left Sidebar: Hierarchical Tree Menu */}
                            <div className="md:col-span-1 bg-gray-800 rounded-lg shadow border border-gray-700 max-h-[45vh] md:max-h-[75vh] overflow-y-auto custom-scrollbar">
                                {/* Sticky header: title, expand/collapse, search stay
                                    visible while the tree scrolls underneath. The scroll
                                    container itself is unpadded; the sticky block and the
                                    tree wrapper carry their own padding so the sticky
                                    element sits flush at top with no overlap. */}
                                <div className="sticky top-0 z-10 bg-gray-800 px-4 pt-4 pb-1">
                                    <div className="flex items-center justify-between mb-3 border-b border-gray-700 pb-2">
                                        <h3 className="text-sm font-semibold text-gray-400 uppercase tracking-wider">
                                            Node Library
                                        </h3>
                                        <div className="flex items-center gap-1">
                                            <button
                                                onClick={expandAll}
                                                title="Expand all"
                                                className="p-1 rounded text-gray-500 hover:text-gray-200 hover:bg-gray-700"
                                            >
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 5l5 5 5-5M7 14l5 5 5-5" />
                                                </svg>
                                            </button>
                                            <button
                                                onClick={collapseAll}
                                                title="Collapse all"
                                                className="p-1 rounded text-gray-500 hover:text-gray-200 hover:bg-gray-700"
                                            >
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 10l5-5 5 5M7 19l5-5 5 5" />
                                                </svg>
                                            </button>
                                        </div>
                                    </div>
                                    <div className="relative pb-2">
                                        <input
                                            type="text"
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                            placeholder="Search nodes..."
                                            className="w-full bg-gray-900 border border-gray-700 rounded px-3 py-1.5 pr-8 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-blue-500"
                                        />
                                        {searchQuery && (
                                            <button
                                                onClick={() => setSearchQuery('')}
                                                title="Clear search"
                                                className="absolute right-2 top-[0.9rem] -translate-y-1/2 text-gray-500 hover:text-gray-200"
                                            >
                                                ✕
                                            </button>
                                        )}
                                    </div>
                                    {matchCount !== null && (
                                        <div className="text-xs text-gray-500 pb-1">
                                            {matchCount} {matchCount === 1 ? 'match' : 'matches'}
                                        </div>
                                    )}
                                </div>
                                <div className="px-4 pb-4 pt-1">
                                {docFilter !== 'all' && !forceOpen && Object.keys(treeData).length === 0 && (
                                    <div className="text-xs text-gray-500 italic">No matching nodes.</div>
                                )}
                                <div className="space-y-1 text-sm">
                                    {Object.entries(treeData).map(([lib, groups]) => (
                                        <div key={lib} className="select-none">
                                            {/* Library Level */}
                                            <div
                                                className="flex items-center cursor-pointer hover:text-blue-400 text-gray-200 font-medium py-1"
                                                onClick={() => toggleLib(lib)}
                                            >
                                                {(expandedLibs[lib] || forceOpen) ? <ChevronDown /> : <ChevronRight />}
                                                {lib.toUpperCase()}
                                            </div>

                                            {/* Group Level */}
                                            {(expandedLibs[lib] || forceOpen) && (
                                                <div className="ml-4 border-l border-gray-700 pl-2 space-y-1 mt-1">
                                                    {Object.entries(groups).map(([group, nodes]) => {
                                                        const groupKey = `${lib}-${group}`;
                                                        return (
                                                            <div key={groupKey}>
                                                                <div
                                                                    className="flex items-center cursor-pointer hover:text-blue-300 text-gray-400 py-1"
                                                                    onClick={() => toggleGroup(lib, group)}
                                                                >
                                                                    {(expandedGroups[groupKey] || forceOpen) ? <ChevronDown /> : <ChevronRight />}
                                                                    {group}
                                                                </div>

                                                                {/* Node Level */}
                                                                {(expandedGroups[groupKey] || forceOpen) && (
                                                                    <div className="ml-4 border-l border-gray-700 pl-2 space-y-1 mt-1">
                                                                        {Object.entries(nodes).map(([nodeName, nodeInfo]) => {
                                                                            // A node name can exist in several groups (e.g. the
                                                                            // color `mix` and the shader `mix`), so selection is
                                                                            // keyed on lib + group + name.
                                                                            const isSelected = selectedNode
                                                                                && selectedNode.name === nodeName
                                                                                && selectedNode.lib === lib
                                                                                && selectedNode.group === group;
                                                                            return (
                                                                                <div
                                                                                    key={nodeName}
                                                                                    onClick={() => setSelectedNode({ lib, group, name: nodeName, info: nodeInfo })}
                                                                                    className={`cursor-pointer py-1 px-2 rounded font-mono text-xs ${isSelected ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-700 hover:text-gray-200'}`}
                                                                                >
                                                                                    {nodeName}
                                                                                </div>
                                                                            )
                                                                        })}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                </div>
                            </div>

                            {/* Right Content Area: Node Details */}
                            <div className="md:col-span-3 bg-gray-800 p-4 sm:p-6 rounded-lg shadow border border-gray-700 md:max-h-[75vh] md:overflow-y-auto custom-scrollbar">
                                {selectedNode ? (
                                    <div>
                                        <div className="mb-4">
                                            <h2 className="text-xl sm:text-3xl font-bold text-white font-mono break-words min-w-0">{selectedNode.name}</h2>
                                            <div className="flex items-center gap-2 flex-wrap mt-2">
                                                <span className="bg-gray-700 text-gray-300 text-xs px-2 py-1 rounded border border-gray-600">
                                                    {selectedNode.lib} / {selectedNode.group}
                                                </span>
                                                {selectedNode.info.section && (
                                                    <span className="bg-gray-700 text-gray-400 text-xs px-2 py-1 rounded border border-gray-600">
                                                        spec: {selectedNode.info.section}
                                                    </span>
                                                )}
                                                {isUndocumented(selectedNode.info) ? (
                                                    // No spec entry exists — a link would
                                                    // land nowhere useful, so show it
                                                    // disabled instead.
                                                    <span
                                                        title="This node has no entry in the official specification documents"
                                                        className="bg-gray-800 text-gray-600 text-xs px-2 py-1 rounded border border-gray-700 cursor-not-allowed select-none"
                                                    >
                                                        Official spec {'\u2197'}
                                                    </span>
                                                ) : (
                                                    <a
                                                        href={specUrlForNode(selectedNode)}
                                                        target="_blank" rel="noopener noreferrer"
                                                        title="Open this node in the official MaterialX specification on GitHub"
                                                        className="bg-gray-700 text-blue-300 hover:text-blue-200 text-xs px-2 py-1 rounded border border-gray-600 hover:border-blue-500/60 transition-colors"
                                                    >
                                                        Official spec {'\u2197'}
                                                    </a>
                                                )}
                                                <button
                                                    onClick={copyPermalink}
                                                    title="Copy a direct link to this node"
                                                    className={`text-xs px-2 py-1 rounded border transition-colors flex items-center gap-1 ${
                                                        copied
                                                            ? 'bg-green-700/30 border-green-600/60 text-green-300'
                                                            : 'bg-gray-700 border-gray-600 text-gray-300 hover:text-white hover:border-blue-500/60'
                                                    }`}
                                                >
                                                    {copied ? (
                                                        <React.Fragment>
                                                            <svg viewBox="0 0 20 20" className="w-3.5 h-3.5" fill="currentColor" aria-hidden="true"><path fillRule="evenodd" d="M16.7 5.3a1 1 0 010 1.4l-7.5 7.5a1 1 0 01-1.4 0L3.3 9.7a1 1 0 011.4-1.4l3.3 3.29 6.8-6.79a1 1 0 011.4 0z" clipRule="evenodd"/></svg>
                                                            Copied
                                                        </React.Fragment>
                                                    ) : (
                                                        <React.Fragment>
                                                            <svg viewBox="0 0 20 20" className="w-3.5 h-3.5" fill="currentColor" aria-hidden="true"><path d="M8.5 3A3.5 3.5 0 005 6.5v1a1 1 0 002 0v-1A1.5 1.5 0 018.5 5h5A1.5 1.5 0 0115 6.5v5A1.5 1.5 0 0113.5 13h-1a1 1 0 000 2h1a3.5 3.5 0 003.5-3.5v-5A3.5 3.5 0 0013.5 3h-5z"/><path d="M6.5 7A3.5 3.5 0 003 10.5v5A3.5 3.5 0 006.5 19h5a3.5 3.5 0 003.5-3.5v-1a1 1 0 00-2 0v1a1.5 1.5 0 01-1.5 1.5h-5A1.5 1.5 0 015 15.5v-5A1.5 1.5 0 016.5 9h1a1 1 0 000-2h-1z"/></svg>
                                                            Copy link
                                                        </React.Fragment>
                                                    )}
                                                </button>
                                            </div>
                                        </div>

                                        {/* INJECTED 3D PREVIEW */}
                                        <Node3DPreview
                                            nodeName={selectedNode.name}
                                            enabled={showPreviews}
                                            onEnable={togglePreviews}
                                        />

                                        {/* Description: paragraphs before the first table */}
                                        <RichBlocks
                                            text={selectedNode.info.description}
                                            refs={refs}
                                            className="text-gray-300 leading-relaxed mb-8 text-base sm:text-lg"
                                        />

                                        {/* Port tables: from the spec, or — for
                                            undocumented nodes — synthesized from
                                            the MaterialX nodedef with a disclaimer. */}
                                        {effectiveTables.length > 0 ? (
                                            <div className="space-y-6">
                                                {isAutoTable && (
                                                    <div className="bg-blue-950/40 border border-blue-800/60 text-blue-200/90 text-sm rounded-lg px-4 py-3 flex items-start gap-2">
                                                        <span aria-hidden="true">{'\u2139\uFE0F'}</span>
                                                        <span>
                                                            <span className="font-semibold text-blue-200">Auto-generated from the nodedef.</span>{' '}
                                                            This node has no specification documentation, so its ports,
                                                            types, and defaults were read directly from the MaterialX
                                                            node definition. Descriptions are unavailable and the
                                                            details may differ from an official write-up.
                                                        </span>
                                                    </div>
                                                )}
                                                {effectiveTables.map((table, i) => {
                                                    const label = signatureLabel(table);
                                                    return (
                                                        <div key={i}>
                                                            {effectiveTables.length > 1 && (
                                                                <div className="flex items-baseline gap-2 mb-2">
                                                                    {label ? (
                                                                        <span className="font-mono text-xs sm:text-sm text-gray-200 break-words min-w-0">{label}</span>
                                                                    ) : (
                                                                        <span className="text-xs font-semibold text-gray-400 uppercase tracking-wider">
                                                                            Signature {i + 1} of {effectiveTables.length}
                                                                        </span>
                                                                    )}
                                                                    {label && (
                                                                        <span className="text-xs text-gray-500">
                                                                            {i + 1} / {effectiveTables.length}
                                                                        </span>
                                                                    )}
                                                                </div>
                                                            )}
                                                            <PortTable table={table} columns={columns} refs={refs} />
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        ) : autoLoading ? (
                                            <div className="bg-gray-900 border border-gray-700 rounded p-4 text-sm text-gray-500 italic">
                                                Generating a port table from the node definition…
                                            </div>
                                        ) : (
                                            <NodeDefPortsTable nodeName={selectedNode.name} />
                                        )}

                                        {/* Notes: prose after/between tables (sub-headings, equations, ...) */}
                                        {selectedNode.info.notes && (
                                            <RichBlocks
                                                text={selectedNode.info.notes}
                                                refs={refs}
                                                className="text-gray-300 leading-relaxed mt-8 pt-6 border-t border-gray-700"
                                            />
                                        )}

                                        {/* References: footnotes cited by this node */}
                                        {references.length > 0 && (
                                            <div className="mt-8 pt-6 border-t border-gray-700">
                                                <h4 className="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">References</h4>
                                                <ol className="space-y-2 text-sm text-gray-400">
                                                    {references.map((r, i) => (
                                                        <li key={r.key} className="flex gap-2">
                                                            <span className="text-gray-500 shrink-0">[{i + 1}]</span>
                                                            <span>
                                                                {r.text || r.key}
                                                                {r.url && (
                                                                    <a href={r.url} target="_blank" rel="noreferrer"
                                                                       className="ml-2 text-blue-400 hover:underline break-all">
                                                                        {r.url}
                                                                    </a>
                                                                )}
                                                            </span>
                                                        </li>
                                                    ))}
                                                </ol>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="text-gray-500 flex items-center justify-center h-full">
                                        Select a node from the tree to view its details.
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Disclaimer: previews are experimental; the spec MD files
                        in the MaterialX repository are the source of truth. */}
                    <div className="bg-amber-950/40 border border-amber-700/60 text-amber-300/90 text-sm rounded-lg px-4 py-3">
                        <span className="font-semibold text-amber-300">{'\u26A0'} Experimental Preview:</span>{' '}
                        The 3D node previews and parameter values shown here are under development and may not
                        match reference renders. For any bugs, please report them in the {' '}
                        <a
                            href={ISSUES_URL}
                            target="_blank" rel="noopener noreferrer"
                            className="underline text-amber-200 hover:text-amber-100"
                        >
                            Node Previewer repository.
                        </a>{' '}
                    </div>
                    <div className="text-sm text-gray-400">
                        This website is an independent open-source project and is not officially affiliated with the MaterialX project or the Academy Software Foundation.
                        For all intents and purposes, in case of any differences, assume the Markdown specification files in the{' '}
                        <a
                            href="https://github.com/AcademySoftwareFoundation/MaterialX/tree/main/documents/Specification"
                            target="_blank" rel="noopener noreferrer"
                            className="underline text-gray-200 hover:text-gray-100"
                        >
                            official MaterialX repository
                        </a>{' '}
                        are the source of truth.
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        /* Port tables on small screens: enforce the per-table minimum
           width computed from their columns (set as --tbl-min inline),
           so the wrapper scrolls horizontally instead of crushing the
           columns together. Desktop (md+) keeps the fluid layout. */
        @media (max-width: 767px) {
            .port-table { min-width: var(--tbl-min, 46rem); }
        }

        /* KaTeX on small screens: display equations get their own
           horizontal scroll instead of overflowing the page, and the
           whole thing scales down a notch. */
        .katex-display {
            overflow-x: auto;
            overflow-y: hidden;
            padding: 0.25rem 0.1rem;
            margin: 0.5rem 0;
            -webkit-overflow-scrolling: touch;
        }
        .katex-display::-webkit-scrollbar {
            height: 6px;
        }
        .katex-display::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }
        @media (max-width: 640px) {
            .katex { font-size: 0.95em; }
            .katex-display .katex { font-size: 1em; }
        }

        /* Custom scrollbar to match the dark theme */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1f2937;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #4b5563;
        }
    </style>
</body>
</html>
